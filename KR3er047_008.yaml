body:
  text: 卷八清陽長露爰開七竅精神魂魄之所發聲色臭味之所司也先聖既沒千載如夢扶陰抑陽辭喬入谷箝娥青之舌杜儀秦之口塞瞽曠之耳膠離朱之目禍流今古痛積人神僕也輕試老拳道宗目眇略嬰利鏃夏侯睛傷雙睛莫莫原非大眼將軍一目䀮䀮竟作小冠子夏渺爾遊魂不絶如線操觚含毫悲憤橫集作七竅解七竅解耳目根原耳目者清陽之門戶也陰位於下左升而化清陽陽位於上右降而化濁陰濁陰降泄則開竅於下清陽升露則開竅於上莫濁於渣滓故陰竅於二便而傳糞溺莫清於神氣故陽竅於五官而司見聞清陽上達則七竅空明濁陰上逆則五官晦塞晦則不睹塞則不聞明則善視空則善聽木主五色以血藏於肝血華則為色也血陰也而陽魂生焉故血之內華者則為色而魂之外光者則為視金主五聲以氣藏於肺氣發則為聲也氣陽也而陰魄生焉故氣之外發者則為聲而魄之內涵者則為聞木火升清清升則陽光外發而為兩目金水降濁濁降則陽體內存而為雙耳蓋神明而精暗氣虛而血實外明乃見內虛乃聞木火陰體而陽用魂中有魄外明內暗故能見不能聞金水陽體而陰用魄中有魂內虛外實故能聞不能見目以用神耳以體靈用神則明體靈則聰木火之用金水之體皆陽也體善存而用善發是以聰明而神靈耳聾者善視陽體已敗故神於用目瞽者善聽陽用既廢故靈於體所謂絶利一源用師十倍也清陽一敗體用皆亡濁陰逆上孔竅障塞則熟視不睹泰山靜聽不聞雷霆耳目之官廢矣目病根原目病者清陽之上衰也金水為陰陰降則精盈木火為陽陽升則神化精濁故下暗神清故上光而清陽之上發必由於脈脈主於心而上絡於目心目者皆宗脈之所聚也內經心者宗脈之所聚也又曰目者宗脈之所聚也宗脈之陽上達九天陽氣清明則虛靈而神發所謂心藏脈而脈舍神也靈樞經語神氣發現開雙竅而為精明素問夫精明者所以別白黑視長短目者神氣之所遊行而出入也竅開而光露是以無微而不燭一有微陰不降則雲霧曖空神氣障蔽陽陷而光損矣清升濁降全賴於土水木隨己土左升則陰化而為清陽火金隨戊土右降則陽化而為濁陰陰暗而陽明夜晦而晝光自然之理也後世庸工無知妄作補陰瀉陽避明趨暗其輕者遂焉盲瞽之子其重者竟成夭枉之民愚謬之惡決海難流也慨自師曠哲人不能回既霍之目子夏腎者不能復已喪之明況委之愚妄粗工之手雖有如炬之光如星之曜安得不殞滅而亡失乎然千古之人未有如師曠子夏之明者所謂盲於目而不盲於心也古之明者察於未象視於無形夫未象可察則象為糟粕無形可視則形為贅疣官骸者必敝之物神明者不朽之靈達人不用其官用其神官雖止而神自行神宇泰而天光發不飲上池而見垣人不燃靈犀而察淵魚葉蔽兩目而無遠弗照云礙雙睛而無幽不燭如是則聽不用耳視不用目可以耳視可以目聽此之謂千古之明者何事乞照於庸工希光於下士也疼痛眼病疼痛悉由濁氣逆沖目居清陽之位神氣衝和光彩發露未有一線濁陰若使濁陰沖逆遏逼清氣清氣升發而濁氣遏之二氣壅迫兩相擊撞是以作疼而濁氣之上逆全緣辛金之不斂金收而水藏之則濁陰歸於九地之下金不能斂斯水不能藏故濁陰逆填於清位金水逆升濁陰填塞則甲木不得下行而衝擊於頭目頭目之痛者甲木之邪也甲木化氣於相火隨辛金右轉而溫水臟甲木不降相火上炎而刑肺金肺金被爍故白珠紅腫而熱滯也手足少陽之脈同起於目鋭眥而手之三陽陽之清者足之三陽陽之濁者清則上升濁則下降手之三陽自手走頭其氣皆升足之三陽自頭走足其氣皆降手三陽病則下陷足三陽病則上逆凡下熱之證因手少陽三焦之陷上熱之證因足少陽膽經之逆故眼病之熱赤獨責甲木而不責於三焦也其疼痛而赤熱者甲木逆而相火旺其疼痛而不赤熱者甲木逆而相火虛也赤痛之久濁陰矇蔽清陽不能透露則雲翳生而光華礙雲翳者濁氣之所鬱結也陽氣未陷續自升發則翳退而明覆陽氣一陷翳障堅老而精明喪矣其疼痛者濁氣之衝突其盲瞽者清陽陷敗而木火不升也木火之升機在己土金水之降機在戊土己土左旋則和煦而化陽神戊土右轉則凝肅而産陰精陰精之魄藏於肺金精魄重濁是以沉降陽神之魂藏於肝木神魂輕清是以浮升本乎天者親上本乎地者親下自然之性也脾升胃降則在中氣中氣者脾胃旋轉之樞軸水火升降之關鍵偏濕則脾病偏燥則胃病偏熱則火病偏寒則水病濟其燥濕寒熱之偏而歸於平則中氣治矣柴胡芍藥丹皮湯黃芩三錢酒炒柴胡三錢白芍藥三錢甘草二錢丹皮三錢煎半杯熱服治左目赤痛者百合五味湯百合三錢五味子一錢研半夏三錢甘草二錢丹皮三錢芍藥三錢煎半杯熱服治右目赤痛者熱甚加石膏知母百合五味姜附湯百合三錢五味一錢芍藥三錢甘草二錢茯苓三錢半夏三錢乾薑三錢附子三錢煎大半杯溫服治水土寒濕而上熱赤痛者或不赤不熱而作疼痛是無上熱去百合芍藥加桂枝茯澤石膏湯茯苓三錢澤瀉三錢梔子三錢甘草二錢半夏三錢石膏三錢煎大半杯熱服治濕熱熏蒸目珠黃赤者桂枝丹皮首烏湯桂枝三錢丹皮三錢首烏三錢甘草二錢茯苓三錢半夏三錢乾薑三錢龍眼十個肉煎大半杯熱服治昏花不明而無赤痛者桂枝菖蒲湯柴胡三錢桂枝三錢丹皮三錢生薑三錢甘草二錢菖蒲二錢煎半杯熱服治瞳子縮小者烏梅山萸湯五味一錢烏梅三錢肉山萸三錢肉甘草二錢首烏三錢芍藥三錢龍骨二錢牡蠣二錢煎半杯熱服治瞳子散大者薑桂參苓首烏湯人參三錢桂枝三錢甘草二錢茯苓三錢首烏三錢乾薑三錢煎半杯溫服治目珠塌陷者芍藥棗仁柴胡湯芍藥三錢甘草三錢首烏三錢棗仁三錢生研柴胡三錢丹皮三錢煎半杯熱服治目珠突出者醫書自唐以後無通者而尤不通者則為眼科庸妄之徒造孽誤人毒流千古甚可痛恨謹為洗髮原委略立數法以概大意酌其臟腑燥濕寒熱而用之乃可奏效若內傷不精但以眼科名家此千古必無之事也耳病根原耳病者濁陰之上填也陽性虛而陰性實濁陰下降耳竅乃虛虛則清徹而靈通以其沖而不盈也目者木火之終氣耳者金水之始基木火外明故神清而善發金水內虛故氣空而善內凡大塊之噫氣生物之息吹有竅則聲入聲入則籟發非關聲音之巨細也窾竅空洞翕聚而鼓蕩之故聲入而響達譬之空谷傳聲萬壑皆振聲不傳於崇山而獨振於空谷者以其虛也聲之入也以其虛而響之聞也以其靈聲入於聽宮而響達於靈府是以無微而不聞也濁氣一升孔竅堵塞則聲入而不通矣人之衰者脾陷胃逆清氣不升濁氣不降虛靈障蔽重聽不聞陰日長而陽日消竅日閉而聰日損氣化自然之數也然竅閉於天而靈開於人達者於是有卻年還聰之術也疼痛耳病疼痛悉由濁氣壅塞耳以沖虛之官空靈洞徹萬籟畢收有濁則降微陰不存若使濁氣升填結滯壅腫則生疼痛久而堅實牢硬氣阻而為熱血鬱而化火肌肉腐潰則成癰膿濁氣之上逆緣於辛金之失斂甲木之不降甲木上衝聽宮脹塞相火鬱遏經氣壅迫是以疼痛而熱腫凡頭耳之腫痛皆甲木之邪也手足少陽之脈俱絡於耳而少陽一病則三焦之氣善陷膽經之氣善逆耳病之癰腫盡甲木之為害於三焦無關也甲木逆升相火鬱發則為熱腫木邪衝突則為疼痛木氣堵塞則為重聽仲景傷寒少陽中風兩耳無所聞太陽傷寒病人叉手自冒心師因教試令咳而不咳者此必兩耳無聞也以重發汗虛故如此耳聾者手少陽之陰虛而足少陽之陽敗耳癰者手少陽之火陷而足少陽之火逆也欲升三焦必升己土欲降甲木必降戊土中氣不運不能使濁降而清升也柴胡芍藥茯苓湯芍藥三錢柴胡二錢茯苓三錢半夏三錢甘草二錢桔梗三錢煎半杯熱服治耳內熱腫疼痛者熱甚加黃芩膿成加丹皮桃仁苓澤芍藥湯茯苓三錢澤瀉三錢半夏三錢杏仁三錢柴胡三錢芍藥三錢煎半杯熱服治耳流黃水者參茯五味芍藥湯茯苓三錢半夏三錢甘草二錢人參三錢橘皮三錢五味一錢芍藥三錢煎半杯溫服治耳漸重聽者鼻口根原鼻口者手足太陰之竅也脾竅於口而司五味肺竅於鼻而司五臭人身之氣陽降而化濁陰陰升而化清陽清則沖虛濁則滯塞沖虛則生其清和滯塞則鬱為煩熱上竅沖虛而不滯塞清和而不煩熱者清氣升而濁氣降也濁降而清升故口知五味而鼻知五臭而口鼻之司臭味非第脾肺之能也其權實由於心以心竅於舌心主臭而口主味鼻之知五臭者心也口之知五味者舌也心為君火膽與三焦為相火三焦升則為清陽膽木降則為濁陰三焦陷而膽木逆清氣降而濁氣升則鼻口滯塞而生煩熱臭味不知矣而清氣之升由鼻而上達濁氣之降自口而下行蓋鼻竅於喉口通於咽鼻者清氣之所終口者濁氣之所始也喉通於臟咽通於腑喉者地氣之既升咽者天氣之初降也濁氣不降而清氣下陷則病見於口清氣不升而濁氣上逆則病見於鼻故鼻病者升其清而並降其濁口病者降其濁而兼升其清升清之權在於太陰太陰陷則乙木不能升其清降濁之機在於陽明陽明逆則辛金不能降其濁得升降之宜則口鼻之竅和暢而清通矣鼻病根原鼻病者手太陰之不清也肺竅於鼻司衛氣而主降斂宗氣在胸衛陽之本貫心肺而行呼吸出入鼻竅者也肺降而宗氣清肅而鼻通肺逆則宗氣壅阻而鼻塞涕者肺氣之熏蒸也肺中清氣氤氳如霧霧氣飄灑化為雨露而輸膀胱則痰涕不生肺金不清霧氣瘀濁不能化水則凝鬱於胸膈而痰生熏蒸於鼻竅而涕化痰涕之作皆由於辛金之不降也肺金生水而主皮毛肺氣內降則通達於膀胱肺氣外行則熏澤於皮毛外感風寒而皮毛閉祕臟腑郁遏內不能降外不能泄蓄積莫容則逆行於鼻竅鼻竅窄狹行之不及故沖激而為嚏噴肺氣熏騰淫蒸鼻竅是以清涕流溢涓涓而下也肺氣初逆則涕清遲而肺氣堙郁清化為濁則滯塞而膠黏遲而濁菀陳腐白化為黃則臭敗而穢惡久而不愈色味如膿謂之鼻癰皆肺氣逆行之所致也其中氣不運肺金壅滿即不感風寒而濁涕時下是謂鼻淵鼻淵者濁涕下不止也素問語肺氣之郁總由土濕而胃逆胃逆則濁氣填塞肺無降路故也桔梗元參湯桔梗三錢元參三錢杏仁三錢橘皮三錢半夏三錢茯苓三錢甘草二錢生薑三錢煎半杯熱服治肺氣鬱升鼻塞涕多者五味石膏湯五味一錢石膏三錢杏仁三錢半夏三錢元參三錢茯苓三錢桔梗三錢生薑三錢煎半杯熱服治肺熱鼻塞濁涕黏黃者胃寒加乾薑黃芩貝母湯黃芩三錢柴胡三錢芍藥三錢元參三錢桔梗三錢杏仁三錢五味一錢貝母三錢去心煎半杯熱服治鼻孔發熱生瘡者苓澤姜蘇湯茯苓三錢澤瀉三錢生薑三錢杏仁三錢甘草二錢橘皮三錢柴蘇葉三錢煎半杯熱服治鼻塞聲重語言不清者口病根原口病者足陽明之不降也脾主肌肉而竅於口口唇者肌肉之本也素問語脾胃同氣脾主升清而胃主降濁清升濁降則唇口不病病者太陰己土之陷而陽明戊土逆也陽明逆則甲木不降而相火上炎於是唇口疼痛而熱腫諸病生焉脾胃不病則口中清和而無味木鬱則酸火鬱則苦金鬱則辛水鬱則咸自鬱則甘口生五味者五臟之郁而不得土氣則味不自生以五味司於脾土也心主五臭入腎為腐心為火而腎為水土者水火之中氣水泛於土則濕生火鬱於土則熱作濕熱熏蒸則口氣腐穢而臭惡太陰以濕土主令陽明從燥金化氣脾病則陷胃病則逆口唇之病燥熱者多濕寒者少責在陽明不在太陰然陽明上逆而生燥熱半因太陰下陷而病濕寒清潤上焦之燥熱而不助下焦之濕寒則得之矣甘草黃芩湯甘草二錢黃芩二錢茯苓三錢半夏三錢石膏三錢煎半杯熱服治濕熱熏蒸口氣穢惡者貝母元參湯貝母三錢元參三錢甘草二錢黃芩二錢煎半杯熱嗽徐咽熱甚加黃連石膏治口瘡熱腫桂枝姜苓湯芍藥四錢桂枝二錢乾薑三錢茯苓三錢甘草二錢元參三錢煎大半杯溫服治脾胃濕寒膽火上炎而生口瘡者舌病心竅於舌舌者心之官也心屬火而火性升其下降者胃土右轉金斂而水臟之也胃逆而肺金失斂則火遂其炎上之性而病見於舌疼痛熱腫於是作焉火之為性降則通暢升則堙郁鬱則胎生舌苔者心液之瘀結也鬱於土則苔黃鬱於金則苔白火盛而金燥則舌苔白澀火衰而金寒則舌苔白滑火衰而土濕則舌苔黃滑火盛而土燥則舌苔黃澀五行之理旺則侮其所不勝衰則見侮於所勝水者火之敵水勝而火負則苔黑而滑水負而火勝則苔黑而澀凡光滑滋潤者皆火衰而寒凝凡芒刺焦裂者皆火盛而燥結也心主言而言語之機關則在於舌舌之屈伸上下者筋脈之柔和也筋司於肝肝氣鬱則筋脈短縮而舌卷不能言靈樞經脈足厥陰氣絶則筋絶筋者聚於陰器而脈絡於舌本脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮足太陰氣絶則脈不榮其唇舌脈不榮則舌萎人中滿素問熱論少陰脈貫腎絡於肺擊舌本故口燥舌乾而渴足三陰之脈皆絡於舌凡舌病之疼痛熱腫則責君火之升炎若其滑澀燥濕攣縮張長諸變當於各經求之也芩連芍藥湯黃芩三錢黃連一錢甘草二錢貝母二錢去心丹皮三錢芍藥三錢煎半杯熱服治舌瘡疼痛熱腫桂枝地黃湯桂枝三錢芍藥三錢生地三錢阿膠三錢當歸三錢甘草二錢煎大半杯溫服治肝燥舌卷者若中風強舌語拙或雜證舌萎言遲皆脾腎濕寒不宜清涼滋潤勿服此方牙痛牙痛者足陽明之病也手陽明之經起於手之次指上頸貫頰而入下齒足陽明之經起於鼻之交頞下循鼻外而入上齒手之三陽陽之清者足之三陽陽之濁者濁則下降清則上升手陽明升足陽明降濁氣不至上壅是以不痛手陽明以燥金主令足陽明以戊土而化氣於燥金戊土之降以其燥也太陰盛而陽明虛則戊土化濕逆而不降並阻少陽甲木之經不得下行牙狀者胃土所司胃土不降濁氣壅迫甲木逆沖攻突牙狀是以腫痛甲木化氣於相火相火失根逆行而上炎是以熱生蟲牙者木鬱而為蠹也甲木鬱於濕土之中腐敗蠹朽故蟲生而齒壞牙齒為骨之餘氣足少陰腎水之所生也水盛於下而根於上牙者水之方芽於火位而未盛者也五行之理水能勝火而火不勝水水火一病則水勝而火負事之常也而齒牙之位以癸水之始基微陰初凝根痎未壯一遭相火逆升熏蒸炎烈挾焦石流金之力而勝杯水勢自易易以少水而爍於壯火未可以勝負尋常之理相提而並論也黃芩石膏湯黃芩三錢石膏三錢甘草二錢生半夏三錢升麻二錢芍藥三錢煎半杯熱服徐咽治牙疼齦腫柴胡桃仁湯柴胡三錢桃仁三錢石膏三錢骨碎補三錢煎半杯熱服徐咽治蟲牙咽喉咽喉者陰陽升降之路也靈樞經脈胃足陽明之脈循喉嚨而入缺盆脾足太陰之脈挾咽而連舌本心手少陰之脈挾咽而擊目系小腸手太陽之脈循咽而下胸膈腎足少陰之脈循喉嚨而挾舌本肝足厥陰之脈循喉嚨而入頏顙五臟六腑之經不盡循於咽喉而咽為六腑之通衢喉為五臟之總門脈有歧出而呼吸升降之氣則別無他經也六腑陽也而陽中有陰則氣降故濁陰由咽而下達五臟陰也而陰中有陽則氣升故清陽自喉而上騰蓋六腑者傳化物而不藏不藏則下行是天氣之降也五臟者藏精氣而不泄不泄則上行是地氣之升也地氣不升則喉病喉病者氣塞而食通天氣不降則咽病咽病者氣通而食塞先食阻而後氣梗者是臟完而腑傷之也先氣梗而後食阻者是腑完而臟傷之也而總之咽通六腑而胃為之主喉通五臟而肺為之宗陽衰土濕肺胃不降濁氣堙郁則病痹塞相火升炎則病腫痛下竅為陰上竅為陽陰之氣濁陽之氣清清氣涼而濁氣熱故清氣下陷則涼泄於魄門濁氣上逆則熱結於喉嚨也甘草桔梗射干湯甘草二錢生桔梗三錢半夏三錢射干三錢煎半杯熱嗽徐服治咽喉腫痛生瘡者貝母升麻鱉甲湯貝母三錢升麻二錢丹皮三錢元參三錢鱉甲三錢煎半杯熱嗽徐服治喉瘡膿成者聲音聲音者手太陰之所司也肺藏氣而氣之激宕則為聲故肺病則聲為之不調氣病則聲為之不暢而氣之所以病者由於己土之濕手陽明主令於燥金手太陰化氣於濕土陽明旺則金燥而響振太陰盛則土濕而聲喑譬之琴瑟簫鼓遇晴明而清越值陰晦而沉濁燥濕之不同也燥為陽而濕為陰陽旺則氣聚而不泄氣通而不塞聚則響而通則嗚唇缺齒落而言語不清者氣之泄也涕流鼻淵而聲音不亮者氣之塞也然聲出於氣而氣使於神靈樞憂恚無言喉嚨者氣之所以上下者也會厭者聲音之戶也口唇者聲音之扇也舌者聲音之機也懸雍者聲音之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也蓋門戶之開闔機關之啓閉氣為之也而所以司其遲疾時其高下開闔適宜而啓閉中節者神之所使也是故久嗽而音啞者病在聲氣中風而不言者病在神明聲氣病則能言而不能響神明病則能響而不能言聲氣出於肺神明藏於心四十九難肺主五聲入心為言緣聲由氣動而言以神發也聞之婦人在軍金鼓不振李少卿軍中有女子擊鼓起士而鼓不鳴然則調聲音者益清陽而驅濁陰一定之理也茯苓橘皮杏仁湯茯苓三錢半夏三錢杏仁三錢百合三錢橘皮三錢生薑三錢煎半杯熱服治濕旺氣鬱聲音不亮者百合桔梗雞子湯百合三錢桔梗三錢五味一錢雞子白一枚煎半杯去滓入雞子清熱服治失聲喑啞者鬚髮鬚髮者手足六陽之所榮也靈樞陰陽二十五人手三陽之上者皆行於頭陽明之經其榮髭也少陽之經其榮眉也太陽之經其榮須也足三陽之上者亦行於頭陽明之經其榮髯也少陽之經其榮須也太陽之經其榮眉也凡此六經血氣盛則美而長血氣衰則惡而短夫鬚髮者榮血之所滋生而實衛氣之所發育也血根於上而盛於下氣根於下而盛於上鬚髮上盛而下衰者手足六陽之經氣盛於上故也靈樞決氣上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣冬時陽氣內潛而爪發枯脆夏日陽氣外浮而爪須和澤緣鬚髮之生血以濡之所以滋其根痎氣以煦之所以榮其枝葉也宦者傷其宗筋血泄而不滋則氣脫而不榮是以無須與婦人正同然則須落髮焦者血衰而實氣敗當於營衛二者雙培其本枝則得之矣桂枝柏葉湯首烏三錢桂枝三錢丹皮三錢生地三錢柏葉三錢生薑三錢人參三錢阿膠三錢煎大半杯溫服治須落髮焦枯燥不榮黃澀早白加桑椹黑豆陽衰土濕者加乾薑茯苓肺氣不充重用黃耆肺主皮毛故也
