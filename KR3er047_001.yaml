body:
  text: 卷一昔在黃帝咨於岐伯作內經以究天人之奧其言曰善言天者必有驗於人然則善言人者必有驗於天矣天人一也未識天道焉知人理慨自越人仲景而後祕典弗著至教無傳嘆帝宰之杳茫悵民義之幽深徒託大象不測其原空撫渺躬莫解其要人有無妄之疾醫乏不死之方群稱乳虎衆號蒼鷹哀彼下泉之人念我同門之友作天人解天人解陰陽變化陰陽未判一氣混茫氣含陰陽則有清濁清則浮升濁則沉降自然之性也升則為陽降則為陰陰陽異位兩儀分焉清濁之間是謂中氣中氣者陰陽升降之樞軸所謂土也樞軸運動清氣左旋升而化火濁氣右轉降而化水化火則熱化水則寒方其半升未成火也名之曰木木之氣溫升而不已積溫成熱而化火矣方其半降未成水也名之曰金金之氣涼降而不已積涼成寒而化水矣水火金木是名四象四象即陰陽之升降陰陽即中氣之浮沉分而名之則曰四象合而言之不過陰陽分而言之則曰陰陽合而言之不過中氣所變化耳四象輪旋一年而周陽升於歲半之前陰降於歲半之後陽之半升則為春全升則為夏陰之半降則為秋全降則為冬春生夏長木火之氣也故春溫而夏熱秋收冬藏金水之氣也故秋涼而冬寒土天專位寄旺於四季之月各十八日而其司令之時則在六月之間土合四象是謂五行也五行生剋五行之理有生有克木生火火生土土生金金生水水生木木剋土土剋水水剋火火剋金金剋木其相生相剋皆以氣而不以質也成質則不能生克矣蓋天地之位北寒南熱東溫西涼陽升於東則溫氣成春升於南則熱氣成夏陰降於西則涼氣成秋降於北則寒氣成冬春之溫生夏之熱夏之熱生秋之涼秋之涼生冬之寒冬之寒生春之溫土為四象之母實生四象曰火生土者以其寄宮在六月火令之後六月濕盛濕為土氣也其實水火交蒸乃生濕氣六月之時火在土上水在土下寒熱相逼是以濕動濕者水火之中氣土寄位於西南南熱而西涼故曰火生土土生金也相剋者制其太過也木性發散斂之以金氣則木不過散火性升炎伏之以水氣則火不過炎土性濡濕疏之以木氣則土不過濕金性收斂溫之以火氣則金不過收水性降潤滲之以土氣則水不過潤皆氣化自然之妙也臟腑生成人與天地相參也陰陽肇基爰有祖氣祖氣者人身之太極也祖氣初凝美惡攸分清濁純雜是不一致厚薄完缺亦非同倫後日之靈蠢壽夭貴賤貧富悉於此判所謂命秉於生初也祖氣之內含抱陰陽陰陽之間是謂中氣中者土也土分戊己中氣左旋則為己土中氣右轉則為戊土戊土為胃己土為脾已土上行陰升而化陽陽升於左則為肝升於上則為心戊土下行陽降而化陰陰降於右則為肺降於下則為腎肝屬木而心屬火肺屬金而腎屬水是人之五行也五行之中各有陰陽陰生五臟陽生六腑腎為癸水膀胱為壬水心為丁火小腸為丙火肝為乙木膽為甲木肺為辛金大腸為庚金五行各一而火分君相臟有心主相火之陰腑有三焦相火之陽也氣血原本肝藏血肺藏氣而氣原於胃血本於脾蓋脾土左旋生髮之令暢故溫暖而生乙木胃土右轉收斂之政行故清涼而化辛金午半陰生陰生則降三陰右降則為肺金肺金即心火之清降者也故肺氣清涼而性收斂子半陽生陽生則升三陽左升則為肝木肝木即腎水之溫升者也故肝血溫暖而性生髮腎水溫升而化木者緣己土之左旋也是以脾為生血之本心火清降而化金者緣戊土之右轉也是以胃為化氣之原氣統於肺凡臟腑經絡之氣皆肺氣之所宣布也其在臟腑則曰氣而在經絡則為衛血統於肝凡臟腑經絡之血皆肝血之所流注也其在臟腑則曰血而在經絡則為營營衛者經絡之氣血也精神化生肝血溫升升而不已溫化為熱則生心火肺氣清降降而不已清化為寒則生腎水水之寒者六腑之悉凝也陰極則陽生故純陰之中又含陽氣火之熱者六腑之盡發也陽極則陰生故純陽之中又胎陰氣陰中有陽則水溫而精盈陽中有陰則氣清而神旺神發於心方其在肝神未旺也而已現其陽魂精藏於腎方其在肺精未盈也而先結其陰魄素問隨神往來者謂之魂並精出入者謂之魄蓋陽氣方升未能化神先化其魂陽氣全升則魂變而為神魂者神之初氣故隨神而往來陰氣方降未能生精先生其魄陰氣全降則魄變而為精魄者精之始基故並精而出入也形體結聚肝主筋其榮爪心主脈其榮色脾主肉其榮唇肺主皮其榮毛腎主骨其榮發凡人之身骨以立其體干筋以束其關節脈以通其營衛肉以培其部分皮以固其肌膚皮毛者肺金之所生也肺氣盛則皮毛緻密而潤澤肌肉者脾土之所生也脾氣盛則肌肉豐滿而充實脈絡者心火之所生也心氣盛則脈絡疏通而條達筋膜者肝木之所生也肝氣盛則筋膜滋榮而和暢髓骨者腎水之所生也腎氣盛則髓骨堅凝而輕利五氣皆備形成而體具矣五官開竊肝竅於目心竅於舌脾竅於口肺竅於鼻腎竅於耳五臟之精氣開竅於頭上是謂五官手之三陽自手走頭足之三陽自頭走足頭為手足六陽之所聚會五臟陰也陰極生陽陽性清虛而親上清虛之極神明出焉五神發露上開七竅聲色臭味於此攸辨官竅者神氣之門戶也清陽上升則七竅空靈濁陰上逆則五官窒塞清升濁降一定之位人之少壯清升而濁降故上虛而下實人之衰老清陷而濁逆故下虛而上實七竅之空靈者以其上虛五官之窒塞者以其上實其實者以其虛也其虛者以其實也五氣分主肝屬木其色青其臭臊其味酸其聲呼其液泣心屬火其臭焦其味苦其聲笑其液汗其色赤脾屬土其味甘其聲歌其液涎其色黃其臭香肺屬金其聲哭其液涕其色白其臭腥其味辛腎屬水其液唾其色黑其臭腐其味鹹其聲呻蓋肝主五色五臟之色皆肝氣之所入也人心為赤入脾為黃入肺為白入腎為黑心主五臭五臟之臭皆心氣之所入也入脾為香入肺為腥入腎為腐入肝為臊脾主五味五臟之味皆脾氣之所入也入肺為辛入腎為咸入肝為酸入心為苦肺主五聲五臟之聲皆肺氣之所入也入腎為呻入肝為呼入心為言入脾為歌腎主五液五臟之液皆腎氣之所入也入肝為淚入心為汗入脾為涎入肺為涕五味根原木曰曲直曲直作酸火曰炎上炎上作苦金曰從革從革作辛水曰潤下潤下作咸土爰稼穡稼穡作甘火性炎上上炎則作苦水性潤下下潤則作咸木性升發直則升而曲則不升鬱而不升是以作酸金性降斂從則降而革則不降滯而不降是以作辛使坎離交姤龍虎回環則火下炎而不苦水上潤而不咸木直升而不酸金從降而不辛金木者水火所由以升降也木直則腎水隨木而左升金從則心火隨金而右降木曲而不直故腎水下潤金革而不從故心火上炎而交濟水火升降金木之權總在於土土者水火金木之中氣左旋則化木火右轉則化金水實四象之父母也不苦不咸不酸不辛是以味甘己土不升則水木下陷而作酸鹹戊土不降則火金上逆而作苦辛緣土主五味四象之酸苦辛鹹皆土氣之中郁也四象之內各含土氣土鬱則傳於四臟而作諸味調和五臟之原職在中宮也五情緣起肝之氣風其志為怒心之氣熱其志為喜肺之氣燥其志為悲腎之氣寒其志為恐脾之氣濕其志為思蓋陽升而化火則熱陰降而化水則寒離火上熱泄而不藏斂之以燥金則火交於坎腑坎水下寒藏而不泄動之以風木則水交於離宮木生而火長金收而水藏當其半生未能茂長則鬱勃而為怒既長而神氣暢達是以喜也當其半收將至閉藏則牢落而為悲既藏而志意幽淪是以恐也物情樂升而惡降升為得位降為失位得位則喜未得則怒失位則恐將失敗悲自然之性如此其實總土氣之回周而變化也己土東升則木火生長戊土西降則金水收藏生長則為喜怒收藏則為悲恐若輪樞莫運升降失職喜怒不生悲恐弗作則土氣凝滯而生憂思心之志喜故其聲笑笑者氣之升達而酣適也腎之志恐故其聲呻呻者氣之沉陷而幽菀也肝之志怒故其聲呼呼者氣方升而未達也肺之志悲故其聲哭哭者氣方沉而將陷也脾之志憂故其聲歌歌者中氣結郁故長歌以泄懷也精華滋生陰生於上胃以純陽而含陰氣有陰則降濁陰下降是以清虛而善容納陽生於下脾以純陰而含陽氣有陽則升清陽上升是以溫暖而善消磨水殼入胃脾陽磨化渣滓下傳而為糞溺精華上奉而變氣血氣統於肺血藏於肝肝血溫升則化陽神肺氣清降則産陰精五臟皆有精悉受之於腎五臟皆有神悉受之於心五臟皆有血悉受之於肝五臟皆有氣悉受之於肺總由土氣之所化生也土爰稼穡稼穡作甘穀味之甘者秉土氣也五殼香甘以養脾胃土氣充盈分輸四子己土左旋穀氣歸於心肺戊土右轉穀精歸於腎肝脾胃者倉稟之官水穀之海人有胃氣則生絶胃氣則死胃氣即水穀所化食為民天所關非細也糟粕傳導水穀入胃消於脾陽水之消化較難於谷緣脾土磨化全賴於火火為土母火旺土燥力能剋水脾陽蒸動水穀精華化為霧氣遊溢而上歸於肺家肺金清肅霧氣降灑化而為水如釜水沸騰氣蒸為霧也氣化之水有精有粗精者入於臟腑而為津液粗者入於膀胱而為溲溺溲溺通利胃無停水糟粕後傳是以便乾靈樞營衛生會上焦如霧中焦如漚下焦如瀆氣水變化於中焦漚者氣水方化而未盛也及其已化則氣騰而上盛於胸膈故如霧露水流而下盛於膀胱故如川瀆川瀆之決由於三焦素問靈蘭祕典三焦者決瀆之官水道出焉蓋三焦之火祕則上溫脾胃而水道通三焦之火泄則下陷膀胱而水竅閉靈樞本輸三焦者足太陽少陰之所將太陽之別也上踝五寸別入貫腨腸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺以水性蟄藏太陽寒水蟄藏三焦之火祕於腎臟則內溫而外清水府清通上竅常開是以氣化之水滲於膀胱而小便利若太陽寒水不能蟄藏三焦之火泄於膀胱膀胱熱癃水竅不開脾胃寒鬱但能消穀不能消水水不化氣上騰爰與谷滓併入二腸而為泄利泄利之家水入二腸而不入膀胱是以小便不利所謂實則閉癃者三焦之火泄於膀胱也經脈起止膽胃大腸小腸三焦膀胱是謂六腑肝心脾肺腎心包是謂六臟六臟六腑是生十二經經有手足不同陽明大腸太陽小腸少陽三焦是謂手之三陽經陽明胃太陽膀胱少陽膽是謂足之三陽經太陰脾少陰腎厥陰肝是謂足之三陰經太陽肺少陰心厥陰心主是謂手之三陰經手之三陽自手走頭手陽明自次指出合谷循臂上廉上頸入下齒左之右右之左上挾鼻孔手太陽自小指從手外側循臂下廉上頸至目內眥手少陽自名指循手表出臂外上頸至目鋭眥三經皆自臂外而走頭陽明在前太陽在後少陽在中足之三陽自頭走足足陽明行身之前自鼻之交頞循喉嚨入缺盆下乳挾臍循脛外入大指次指足太陽行身之後自目內眥上額交巔下項挾脊抵腰貫臀入膕中出外踝至小指足少陽行身之側自目鋭眥從耳後下頸入缺盆下胸循脅從膝外廉出外踝入名指三經皆自腿外而走足陽明在前太陽在後少陽在中足之三陰自足走胸足太陰行身之前自大指上內踝入腹上膈足少陰行身之後自小指循內踝貫脊上膈注胸中足厥陰行身之側自大指上內踝抵小腹貫膈布脅肋三經皆自腿里而走胸太陰在前少陰在後厥陰在中手之三陰自胸走手手太陰自胸出腋下循臑內前廉入寸口至大指手少陰自胸出腋下循臑內後廉抵掌後至小指手厥陰自胸出腋下循臑內入掌中至中指三經皆自臂里而走手太陰在前少陰在後厥陰在中手三陽之走頭足三陽之走足皆屬其本府而絡其所相表裡之藏足三陰之走胸手三陰之走手皆屬其本藏而絡其所相表裡之腑手陽明與手太陰為表裡足陽明與足太陰為表裡手太陽與手少陰為表裡足太陽與足少陰為表裡手少陽與手厥陰為表裡足少陽與足厥陰為表裡六陽六陰分行於左右手足是謂二十四經也奇經部次奇經八脈督任沖帶陽蹺陰蹺陽維陰維督脈行於身後起於下極之俞併入脊裡上至風府入屬於腦諸陽之綱也任脈行於身前起於中極之下循腹裡上關元入目絡舌諸陰之領也衝脈起於氣衝並足少陰挾臍上行至胸中而散諸經之海也帶脈起於季脅回身一周環腰如帶諸經之約也陽蹺起於跟中循外踝上行入於風池主左右之陽也陰蹺起於跟中循內踝上行交貫衝脈主左右之陰也陽維起於諸陽會維絡於身主一身之表也陰維起於諸陰交維絡於身主一身之裡也陽蹺陰維者足太陽之別陰蹺陽維者足少陰之別凡此八脈者經脈之絡也經脈隆盛入於絡脈絡脈滿溢不拘於經內溉臟腑外濡腠理別道自行謂之奇經也營氣運行水穀入胃化生氣血氣之剽悍者行於脈外命之曰衛血之精專者行於脈中命之曰營營衛運行一日一夜周身五十度人一呼脈再動一吸脈再動呼吸定息脈五動閏以太息脈六動一息六動人之常也一動脈行一寸六動脈行六寸靈樞脈度手之六陽從手至頭長五尺五六三丈手之六陰從手至胸長三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足至頭長八尺六八四丈八尺足之六陰從足至胸長六尺五寸六六三丈六尺五六三尺合三丈九尺蹺脈從足至目長七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈長四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺平人一日一夜一萬三千五百息一息脈行六寸十息脈行六尺一日百刻一刻一百三十五息人氣半周於身脈行八丈一尺兩刻二百七十息人氣一周於身脈行十六丈二尺百刻一萬三千五百息人氣五十周於身脈行八百一十丈營氣之行也常於平旦寅時從手太陰之寸口始自手太陰注手陽明足陽明注足太陰手少陰注手太陽足太陽注足少陰手厥陰注手少陽足少陽注足厥陰終於兩蹺督任是謂一周也二十八脈周而復始陰陽相貫如環無端五十周畢明日寅時又會於寸口此營氣之度也衛氣出入衛氣書行陽經二十五周夜行陰臟二十五周衛氣之行也常於平旦寅時從足太陽之睛明始晴明在目之內眥足太陽之穴也平旦陽氣出於目目張則氣上行於頭循項下足太陽至小指之端別入目內眥下手太陽至小指之端別入目鋭眥下足少陽至小指次指之端上循手少陽之分側下至名指之端別入耳前下足陽明至中指之端別入耳下下手陽明至次指之端其至於足也入足心出內踝下入足少陰經陰蹺者足少陰之別屬於目內眥自陰蹺而復合於目交於足太陽之晴明是謂一周如此者二十五周日入陽盡而陰受氣矣於是內入於陰藏其入於陰也常從足少陰之經而注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎是謂一周如此者二十五周平旦陰盡而陽受氣矣於是外出於陽經其出於陽也常從腎至足少陰之經而復合於目衛氣入於陰則寐出於陽則寤一日百刻周身五十此衛氣之度也難經營衛相隨之義言營行脈中衛行脈外相附而行非謂其同行於一經也
