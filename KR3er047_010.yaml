body:
  text: 卷十婦人之證率與男子無殊惟其經脈胎産三十六病則與丈夫不同其源流通塞實資於調燮花萼長消端賴於栽培降自後世此義遂乖傷暘谷之忽寒嘆溫泉之遽沍泛桃花之巨浪決瓠子洪波乃使春華易蔞秋實難成胎傷卵破女德無終玉折蘭摧婦怨何極僕本恨人痛心在目作婦人解婦人解經脈根原經脈者風木之所化生也人與天地相參也與日月相應也靈樞經語男子應日女子應月月滿則海水西盛魚腦充蚌蛤實經脈溢月晦則海水東盛魚腦減蚌蛤虛經脈衰月有圓缺陰有長消經脈調暢盈縮按時月滿而來月虧而止者事之常也金主收斂木主疏泄金斂而木不能泄則過期不來木疏而金不能斂則先期而至收斂之極乃斷絶而不行疏泄之甚故崩漏而不止木鬱或中變為熱水鬱則始終皆寒其重者亡身而殞命其輕者絶産而不生非細故也其凝而不解者水寒而木鬱也腎肝陰旺經脈凝沍既堙鬱而腐敗乃成塊而紫黑調經養血之法首以崇陽為主也蓋經水之原化於己土脾陽左旋溫升而生營血所謂中焦受氣取汁變化而赤是謂血也靈樞經語血藏於肝而總統於衝任陰中陽盛生意沛然一承雨露煦濡長養是以成孕而懷子譬之於土陽氣冬藏水泉溫暖春木發揚凍解冰消暖氣升騰故萬物生焉使冬無地下之暖雖有陽和司令亦成寒谷不生矣後世庸工全昧此理滋陰涼血伐瀉生陽變膏腴之壞作不毛之地推後凋之木為朝華之草目擊此風良深永嘆仲景垂溫經一法吹鄒子之暖律飄虞地之薰風古訓昭然來者當熟復而詳味也閉結經脈閉結緣於肝木之郁血者木中之津液也木性喜達木氣條達故經脈流行不至結澀木氣鬱陷發生不遂則經血凝滯閉結生焉乙木既陷甲木必逆乙木遏陷溫氣不揚則生下熱甲木沖逆相火不歸則生上熱經脈燔蒸而升降阻格內無去路則蒸發皮毛泄而為汗汗出熱退皮毛既闔而經熱又作熱日作而血日耗汗日泄而陽日敗久而困憊尫羸眠食廢損人知其經熱之盛而不知其脾陽之虛誤以涼營瀉熱之藥投之脾陽頽敗速之死矣其肝膽固屬燥熱其脾腎則是濕寒治當分別而調劑之未可專用清涼也蓋木生於水而長於土乙木之溫即脾陽之左升也水寒土濕木氣不達抑鬱盤塞則經脈不通以其生氣失政而疏泄不行也未有脾陽健運木陷而血瘀者其肝木之陷咎在於脾其膽木之逆咎在於胃己土不升則戊土不降中氣莫運故四維不轉非第肝膽之過也若見其閉結輒用開通中氣已虧再遭攻下強者幸生弱者立斃十全二三甚非良法也桂枝丹皮桃仁湯桂枝三錢芍藥三錢丹皮三錢桃仁三錢甘草二錢茯苓三錢丹參三錢煎大半杯溫服上熱加黃芩中寒加乾薑中氣不足加人參血塊堅硬加鱉甲蟅蟲脾郁加砂仁崩漏經脈崩漏因於肝木之陷肝木主生生意暢遂木氣條達則經血溫升不至下泄生意郁陷木氣不達經血陷流則病崩漏木氣疏泄血臟肝木而不致疏泄者氣舉之也氣性降而血性升氣降於下又隨肝木而左升血升於上又隨肺金而右降血之在上者有氣以降之血之在下者有氣以升之是以藏而不泄也肝木鬱陷升發不遂氣愈鬱而愈欲泄木欲泄而金斂之故梗澀而不利金欲斂而木泄之故淋漓而不收金能斂而木不能泄則凝瘀而結塞木能泄而金不能斂則滂沛而橫行其原全由於土敗土者血海之堤防也堤防堅固則瀾安而波平堤防潰敗故泛濫而傾注崩者堤崩而河決漏者堤漏而水滲也緣乙木生長於水土水旺土濕脾陽陷敗不能發達木氣升舉經血於是肝氣下郁而病崩漏也後世庸醫崩漏之法荒唐悖謬何足數也桂枝薑苓湯甘草二錢茯苓三錢桂枝三錢芍藥三錢乾薑三錢丹皮三錢首烏三錢煎大半杯溫服治經漏桂枝薑苓牡蠣湯甘草二錢茯苓三錢桂枝三錢芍藥三錢乾薑三錢丹皮三錢首烏三錢牡蠣三錢煎大半杯溫服治血崩氣虛加人參先期後期先期者木氣之疏泄崩漏之機也後期者木氣之遏郁閉結之機也其原總由於脾濕而肝陷木氣鬱陷不得發揚則經血凝瘀莫能通暢無論先期後期血必結澀而不利其通多而塞少者木氣泄之故先期而至以經血上行則血室不見其有餘必月滿陰盈而後來血陷則未及一月而血室已盈是以來早其塞多而通少者木不能泄則後期而至以木氣鬱遏疏泄不行期過一月而積蓄既多血室莫容然後續下是以來遲也桂枝薑苓湯丹皮三錢甘草二錢茯苓三錢首烏三錢乾薑三錢桂枝三錢芍藥三錢煎大半杯溫服治經水先期薑苓阿膠湯丹皮三錢甘草二錢桂枝三錢茯苓三錢乾薑三錢丹參三錢首烏三錢阿膠三錢煎大半杯溫服治經水後期結瘀紫黑經水結瘀紫黑血室寒沍而凝澀也血之為性溫則行寒則滯滯久則堙鬱而腐敗是以成塊而不鮮此以土濕水寒木氣鬱塞之故庸工謂之血熱據其木鬱生熱而昧其水土之濕寒禍世非小也苓桂丹參湯丹皮三錢甘草二錢乾薑三錢茯苓三錢桂枝三錢丹參三錢煎大半杯溫服經行腹痛經行腹痛肝氣鬱塞而刑脾也緣其水土濕寒乙木抑遏血脈凝澀不暢月滿血盈經水不利木氣壅迫疏泄莫遂鬱勃衝突克傷脾臟是以腹痛中氣不運胃氣上逆則見噁心嘔吐之證血下以後經脈疏通木氣松和是以痛止此多絶産不生溫燥水土通經達木經調痛去然後懷子其痛在經後者血虛肝燥風木剋土也以經後血虛肝木失榮枯燥生風賊傷上氣是以痛作也苓桂丹參湯丹皮三錢甘草二錢丹參三錢乾薑三錢桂枝三錢茯苓三錢煎大半杯溫服治經前腹痛歸地芍藥湯當歸三錢地黃三錢甘草二錢桂枝三錢茯苓三錢首烏三錢芍藥三錢煎大半杯溫服治經後腹痛熱入血室經水適來之時外感中風發熱惡寒七八日後六經既遍表解脈遲熱退身涼而胸脅痞滿狀如結胸語言譫妄神識不清此謂熱入血室也以少陽之經下胸貫膈而循脅裡少陽厥陰表裡同氣血藏於厥陰熱入血室同氣相感自厥陰而傳少陽甲木逆升經氣不降橫塞胸脅故狀如結胸君相感應相火升炎而爍心液故作譫語肝主血心主脈血行脈中血熱則心病也蓋經下之時血室新虛風傷衛氣衛氣閉斂營鬱熱發熱自經絡而入血室勢所自然宜清厥陰少陽之經瀉熱而涼血也柴胡地黃湯柴胡三錢黃芩三錢甘草二錢芍藥三錢丹皮三錢地黃三錢煎大半杯溫服表未解者加蘇葉生薑雜病根原婦人之病多在肝脾兩經土濕木鬱生氣不達奇邪淫泆百病叢生而陽虛積冷者多陰虛結熱者少以其燥熱在肝膽濕寒在脾腎土濕木鬱而生表熱者十之八九土燥水虧而生裡熱者百無一二也帶下帶下者陰精之不藏也相火下衰腎水澌寒經血凝瘀結於少腹阻格陰精上濟之路腎水失藏肝木疏泄故精液淫泆流而為帶帶者任脈之陰旺帶脈之不引也五臟之陰精皆統於任脈任中陽祕帶脈橫束環腰如帶為之收引故精斂而不泄任脈寒沍帶脈不引精華流溢是謂帶下水下泄則火上炎故多有夜熱毛蒸掌煩口燥之證而下寒上熱之原則過不在於心腎而在於脾胃之濕蓋氣根於腎坎之陽也升於木火而藏於肺血根於心離之陰也降於金水而藏於肝金性收斂而木性生髮金隨胃降收斂之政行離陰下潛而化濁陰是心氣涼而水暖木從脾升生髮之令暢坎陽上達而化清陽是以血溫而火清陽不鬱則熱不生陰不鬱則寒不作也土濕則脾胃不運陰陽莫交陽上鬱而熱生於氣陰下鬱而寒生於血血寒故凝澀而瘀結也仲景溫經一湯溫中去濕清金榮木活血行瘀誠為聖法至於瘀血堅凝則用土瓜根散精液滑泄則用礬石丸法更密矣溫經湯人參三錢甘草二錢乾薑三錢桂枝三錢茯苓三錢丹皮三錢當歸三錢阿膠三錢麥冬三錢芍藥三錢芎藭二錢茱萸二錢半夏三錢煎一杯溫服治婦人帶下及少腹寒冷久不受胎或崩漏下血或經來過多或至期不來陰精流瀉加牡蠣瘀血堅硬加桃仁鱉甲骨蒸骨蒸者肝木之不達也肝木生於腎水陽根在水春氣一交隨脾土左升則化肝木木氣升發和煦溫暢及臻夏令水中之陽盡達於九天則木化而為火木火生長是以骨髓清涼下熱不生水寒土濕肝木不升溫氣下郁陷於腎水則骨蒸夜熱於是病焉以腎主骨也肝木鬱陷而生下熱則膽木沖逆而生上熱肝木下陷必克脾土膽木上逆必克胃土脾胃俱病上不能容而下不能化飲食減損肌肉消瘦淹滯纏綿漸至不起庸醫不解以為陰虛率以滋陰瀉熱之劑愈敗土氣土敗陽傷無有不死也是宜燥土暖水升達木氣木鬱條達熱退風清骨蒸自愈原非陰虛血熱之證清涼之品未可過用以伐中氣也苓桂柴胡湯茯苓三錢甘草二錢丹皮三錢桂枝三錢芍藥三錢柴胡三錢半夏三錢煎大半杯溫服熱蒸不減加生地黃芩蒸退即用乾薑附子以溫水土胎妊解胎妊者土氣所長養也兩精相搏二氣妙凝清升濁降陰陽肇基血以濡之化其神魂氣以煦之化其精魄氣統於肺血藏於肝而氣血之根總原於土土者所以滋生氣血培養胎妊之本也木火以生長之金水以收成之土氣充用四維寄旺涵養而變化之五氣皆足十月而生矣土衰而四維失灌藏氣不厚則木不能生生氣不厚則火不能長長氣不厚則金不能收收氣不厚則水不能成生長之氣薄則胎不發育收成之氣薄斯胎不堅完木火衰乃傷墮於初結之月金水弱乃殞落於將成之時血生於木火氣化於水金而土則四象之中氣也故養胎之要首在培土土運則清其火金而上不病熱暖其水木而下不病寒木溫而火清則血流而不凝也金涼而水暖則氣行而不滯也氣血環抱而煦濡之形神鞏固永無半産之憂矣結胎胎妊之胎生長資乎木火收成藉乎金水土者四象之母其絪縕變化煦濡滋養全賴乎土脾以己土而主升升則化陽而善消胃以戊土而主降降則化陰而善受胎之初結中氣凝蹇升降之機乍而堙郁沖和之氣漸而壅滿其始胃氣初郁滋味厭常而喜新及其兩月胎成則胃氣阻逆噁心嘔吐食不能下遲而中氣回環胃土續降然後能食胃土降則心火下行而化水脾土升則腎水上交而化火胎氣在中升降不利乃水偏於下潤而火偏於上炎水潤下者火不交水而坎陽虛也火炎上者水不濟火而離陰弱也是故妊娠之證下寒而上熱妊娠之脈尺微而寸洪仲景金匱婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠寸為陽尺為陰陰脈小弱者尺之微也素問平人氣象論婦人手少陰脈動甚者妊子也手少陰之經循臑內後廉而走小指脈動在神門神門在掌後鋭骨之中雖非寸口然太陰之左寸亦可以心候神門脈動者寸口必動手少陰脈動者寸之洪也推之左寸脈動者右寸必動男胎動於左寸女胎動於右寸亦自然之理也十九難男脈在關上女脈在關下男子寸大而尺小女子寸小而尺大者常也胎氣一結虛實易位大小反常緣於中氣之壅阻也陰陽郁格最易為病法宜行郁理氣為主未可遽用填補之劑也豆蔻苓砂湯白蔻一錢生研杏仁二錢甘草一錢砂仁一錢炒研芍藥二錢丹皮三錢茯苓三錢橘皮一錢煎大半杯溫服治胎孕初結噁心嘔吐昏暈燥渴證緣中氣鬱阻胃土不降以此開鬱降濁清膽火而行肝血內熱加清涼之味內寒加溫暖之品酌其臟腑陰陽而調之墮胎胎之結也一月二月木氣生之三月四月火氣長之五月六月土氣化之七月八月金氣收之九月十月水氣成之五氣皆足胎完而生矣而土為四象之母始終全藉乎土土中陽旺則胎氣發育十月滿足不至於墜蓋胎妊之理生髮乎木火收藏於金水而四象之推遷皆中氣之轉運也陽蟄地下左旋而化乙木和煦溫暢萬物資生者己土之東升也陰凝天上右轉而化辛金清涼肅殺萬寶告成者戊土之西降也木升火化而胎氣暢茂金降水生而胎氣堅完生長之氣衰則胎墜於初結收成之力弱則胎殞於將完其實皆土氣之虛也土生於火而克於木火旺則土燥而木達火衰則土濕而木鬱乙木鬱陷而克己土土氣困敗胎妊失養是以善墜胎妊欲墜腰腹必痛痛者木陷而剋土也木生於水而長於土土濕水寒乙木乃陷三十六難命門者諸精神之民舍原氣之所繫男子以藏精女子以擊胞命門陽敗腎水澌寒侮土滅火不生肝木木氣鬱陷而賊脾土此胎孕墜傷之原也薑桂苓參湯甘草二錢人參三錢茯苓三錢乾薑三錢桂枝三錢丹皮三錢煎大半杯溫服腹痛加砂仁芍藥胎漏結胎之後經水滋養子宮化生血肉無有贏餘是以斷而不行其胎結而經來者必有瘀血阻格緣胎成經斷血室盈滿不復流溢肝脾陽弱莫能行血養胎之餘易致堙瘀瘀備蓄積阻礙經絡胎妊漸長隧道壅塞此後之血不得上濟月滿陰盈於是下漏按其胎之左右必有癥塊或其平日原有宿癥亦能致此若內無瘀血則是肝脾下陷經血亡脫其胎必墜若血下而腹痛者則是胞氣壅礙土鬱木陷肝氣賊脾也金匱名為胞阻宜疏木達郁而潤風燥其漏血腹痛自止桂枝地黃阿膠湯甘草二錢地黃三錢阿膠三錢當歸三錢桂枝三錢芍藥三錢茯苓三錢丹皮三錢煎大半杯溫服治妊娠下血腹痛者桂枝茯苓湯桂枝三錢茯苓三錢甘草二錢丹皮三錢芍藥三錢桃仁三錢煎大半杯溫服治妊娠下血癥塊連胎者輕者作丸緩以消之産後根原産後血虛氣憊諸病叢生病則永年畢世不得平復彌月之後氣血續旺乃可無慮蓋妊娠之時胎成一分則母氣盜泄一分胎氣漸成母氣漸泄十月胎完而母氣耗損十倍尋常不過數胎而人已衰矣母氣傳子子壯則母虛自然之理也但十月之內形體雖分而呼吸關通子母同氣胎未離腹不覺其虛及乎産後胎妊已去氣血未復空洞虛豁不得充灌動即感傷最易為病胎時氣滯血瘀積瘀未盡癥瘕續成者事之常也氣血虧乏脾虛肝燥鬱而剋土腹痛食減者亦復不少而痙冒便難尤為易致是謂産後三病血弱經虛表疏汗泄感襲風寒是以病痙痙者筋脈攣縮頭搖口噤項強而背折也氣損陽虧凝郁內陷群陰閉束是以病冒冒者清氣幽埋不能透發昏潰而迷罔也津枯腸燥陰凝氣結關竅閉澀是以便難便難者糟粕艱阻不得順下原於道路之梗塞非關陽旺而火盛也總之胎氣生長盜泄肝脾土虛木賊為諸病之本土氣不虧不成大病也桃仁鱉甲湯桃仁三錢鱉甲三錢丹皮三錢丹參三錢桂枝三錢甘草二錢煎大半杯溫服治瘀血蓄積木鬱腹痛者內熱加生地內寒加乾薑桂枝丹皮地黃湯桂枝三錢芍藥三錢甘草二錢丹皮三錢地黃三錢當歸三錢煎大半杯溫服治脾虛肝燥木鬱剋土腹痛食減渴欲飲水者氣虛加人參水寒土濕加乾薑茯苓桂枝栝蔞首烏湯桂枝三錢芍藥三錢栝蔞根三錢首烏三錢生薑三錢大棗三枚甘草二錢煎大半杯溫服治風傷衛氣而病柔痙發熱汗出者葛根首烏湯桂枝三錢芍藥三錢甘草二錢葛根三錢麻黃一錢首烏三錢生薑三錢大棗三枚煎大半杯溫服治寒傷營血而病剛痙發熱無汗者桂枝茯苓人參湯人參三錢甘草二錢茯苓三錢桂枝三錢生薑三錢大棗三枚煎大半杯溫服治陽虛鬱冒蓯蓉杏仁湯甘草二錢杏仁二錢白蜜一兩肉蓯蓉三錢煎大半杯入白蜜溫服治津虧木燥大便艱難薑桂苓砂湯茯苓三錢甘草二錢乾薑三錢桂枝三錢芍藥三錢砂仁一錢煎大半杯入砂仁末溫服治飲食不消
