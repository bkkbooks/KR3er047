body:
  text: 卷七雜病解下中風根原中風者土濕陽衰四肢失秉而外感風邪者也四肢諸陽之本營衛之所起止而追其根原實秉氣於脾胃脾土左旋水升而化血胃土右轉火降而化氣血藏於肝氣統於肺而行於經絡則曰營衛四肢之輕健而柔和者營衛之滋榮而即脾胃之灌注也陽虧土濕中氣不能四達四支經絡凝澀不運衛氣阻梗則生麻木麻木者肺氣之郁肺主皮毛衛氣鬱遏不能煦濡皮毛故皮膚枯稿而頑廢也諸筋者司於肝而會於節土濕木鬱風動血耗筋脈結澀故支節枯硬一日七情郁傷八風感襲閉其皮毛而鬱其經藏經絡之燥盛則筋脈急攣支節拳縮屈而不伸痹而不仁也臟腑之濕盛則化生敗濁堵塞清道神迷言拙頑昧不靈也人身之氣愈鬱則愈盛皮毛被感孔竅不開郁其筋節之燥故成癱瘓郁其心肺之濕故作癡喑臟腑者支節之根本支節者臟腑之枝葉根本既拔枝葉必瘁非盡關風邪之為害也風者百病之長變無常態實以病家本氣之不一因人而變而風未嘗變風無刻而不揚人有時而病作風同而人異也此與外感風傷衛氣之風原無懸殊粗工不解謬分西北東南真假是非之名以誤千古良可傷也桂枝烏苓湯桂枝三錢芍藥三錢甘草二錢首烏三錢茯苓三錢砂仁一錢煎大半杯溫服治左半偏枯者中下寒加乾薑附子黃耆薑苓湯黃耆三錢人參三錢甘草二錢茯苓三錢半夏三錢生薑三錢煎大半杯溫服治右半偏枯者中下寒加乾薑附子病重者黃耆生薑可用一二兩中風之證因於土濕土濕之故原於水寒寒水侮土土敗不能行氣於四肢一當七情內傷八風外襲則病中風肝藏血而左升肺藏氣而右降氣分偏虛則病於右血分偏虛則病於左隨其所虛而病枯稿故曰偏枯左半偏枯應病在足大指足厥陰肝經行於足大指也若手大指亦病拳曲則是血中之氣滯也右半偏枯應病在手大指手太陰肺經行於手大指也若足大指亦病拳曲則是氣中之血枯也究之左右偏枯足大指無不病者以足太陰脾行足大指太陰脾土之濕乃左右偏枯之原也土濕則腎水必寒其中亦有濕鬱而生熱者然熱在上而不在下熱在肝膽而不在脾腎而肝膽之燥熱究不及脾腎寒濕者之多總宜溫燥水土以達肝木之郁風襲於表郁其肝木木鬱風生耗傷津血故病攣縮木達風息血復筋柔則攣縮自伸其血枯筋燥未嘗不宜阿膠首烏之類要當適可而止過用則滋濕而敗脾陽不可不慎風家支節攣縮莫妙於尉法右半偏枯用黃耆茯苓生薑附子左半偏枯用首烏茯苓桂枝附子研末布包熱尉病處關節藥氣透徹則寒濕消散筋脈和柔拳曲自松藥用布巾縛住外以火爐溫之三四次後氣味稍減另易新者久而經絡溫暢發出臭汗一身氣息非常膠黏如飴則支體活軟屈伸如意矣其神迷不清者胃土之逆也其舌強不語者脾土之陷也以胃土上逆濁氣鬱蒸化生痰涎心竅迷塞故昏憒不知人事脾土下陷筋脈緊急牽引舌本短縮不舒故謇澀不能言語此總由濕氣之盛也仲景金匱邪入於腑即不識人邪入於臟舌即難言者風邪外襲郁其臟腑之氣非風邪之內入於臟腑也一切羌獨艽防驅風之法皆庸工之妄作切不可服惟經臟病輕但是鼻口偏邪可以解表用茯苓桂枝甘草生薑浮萍略取微汗偏斜即止其大便結燥緣於風動血耗而風動之由則因土濕而木鬱法宜阿膠蓯蓉清風潤燥以滑大腸結甚者重用蓯蓉滋生枯稿龜板地黃天冬之類滋濕伐陽慎不可用中氣一敗則大事去矣庸工至用大黃可恨之極其痰涎膠塞迷惑不清者用葶藶散下之痰去則神清葶藶散葶藶三錢白芥子三錢甘遂一錢研細每服五分宿痰即從便下歷節根原歷節者風寒濕之邪傷於筋骨者也膝踝乃衆水之溪壑諸筋之節奏寒則凝沍於溪谷之中濕則淫泆於關節之內故歷節病焉足之三陰起於足下內循踝膝而上胸中而少厥水木之升隨乎太陰之土土濕而不升則水木俱陷於是癸水之寒生乙木之風起肉主於脾骨屬於腎筋司於肝濕淫則肉傷寒淫則骨傷風淫則筋傷筋骨疼痛而肌肉臃腫者風寒濕之邪合傷於足三陰之經也其病成則內因於主氣其病作則外因於客邪汗孔開張臨風入水水濕內傳風寒外閉經熱鬱發腫痛如折雖原於客邪之侵陵實由於主氣之感召久而壅腫拳屈跛蹇疲癃此亦中風之類也而傷偏在足蓋以清邪居上濁邪居下寒濕地下之濁邪同氣相感故傷在膝踝諸如膝風腳氣色目非一而究其根原正自相同凡腿上諸病雖或木鬱而生下熱然熱在經絡不在骨髓其骨髓之中則是濕寒必無濕熱之理金匱義精而法良當思味而會其神妙也桂枝芍藥知母湯桂枝四錢芍藥三錢甘草二錢白朮二錢附子二錢知母四錢防風四錢麻黃二錢生薑五錢煎大半杯溫服歷節風證支節疼痛足腫頭眩短氣欲吐身羸發熱黃汗沾衣色如柏汁此緣飲酒汗出當風取涼酒氣在經為風所閉濕邪淫泆傷於筋骨濕旺土鬱汗從土化是以色黃其經絡之中則是濕熱其骨髓之內則是濕寒法宜朮甘培土麻桂通經知母芍藥瀉熱而清風防風附子去濕而濕寒濕寒內消濕熱外除腫痛自平若其病劇不能捷效加黃耆以行經絡烏頭以驅濕寒無有不愈一切膝風腳氣諸證不外此法烏頭用法炮去皮臍切片焙乾蜜煎取汁入藥湯服痙病根原痙病者汗亡津血而感風寒也太陽之脈自頭下項行身之背發汗太多傷其津血筋脈失滋復感風寒筋脈攣縮故頸項強急頭搖口噤脊背反折也素問診要經終論太陽之脈其終也戴眼反折瘛瘲即痙病之謂以背膂之筋枯硬而緊急故也太陽以寒水主令而實化於丙火蓋陰陽之理彼此互根清陽左旋則癸水上升而化君火濁陰右轉則丙火下降而化寒水汗亡津血陰虛燥動則丙火不化寒水而生上熱是以身首發熱而面目皆赤也寒水絶其上源故小便不利背者胸之府肺位於胸壬水生化之源也肺氣清降氤氳和洽蒸為雨露自太陽之經注於膀胱則胸膈清空而不滯太陽不降肺臟壅鬱故濁氣上衝於胸膈也太陽之經兼統營衛風寒傷人營衛攸分其發熱汗出不惡寒者名曰柔痙風傷衛也其發熱無汗反惡寒者名曰剛痙寒傷營也病得於亡汗失血之後固屬風燥而汗血外亡溫氣脫泄實是陽虛滋潤清涼之藥未可肆用也栝蔞桂枝湯栝蔞根四錢桂枝三錢芍藥三錢甘草二錢生薑三錢大棗四枚煎大半杯熱服覆衣飲熱稀粥取微汗治風傷衛氣發熱汗出者葛根湯葛根四錢麻黃三錢先煎去沫桂枝二錢芍藥二錢甘草二錢生薑三錢大棗四枚煎大半杯熱服覆衣取微汗治寒傷營血發熱無汗者痙病是太陽證亦有在陽明經者若胸滿口噤臥不著席腳攣齒齘者胃土燥熱筋脈枯焦之故宜重用清涼滋潤之味不可拘太陽經法甚者宜大承氣湯瀉其胃熱乃愈濕病根原濕病者太陰濕旺而感風寒也太陰以濕土主令肺以辛金而化濕陽明以燥金主令胃以戊上而化燥燥濕相敵是以不病人之衰也濕氣漸長而燥氣漸消及其病也濕盛者不止十九燥盛者未能十一陰易盛而陽易衰陽盛則壯陰盛則病理固然也膀胱者津液之府氣化則能出肺氣化水滲於膀胱故小便清長土濕則肺氣堙郁不能化水膀胱閉癃濕氣浸淫因而瀰漫於周身濕為陰邪其性親下雖周遍一身無處不到究竟膝踝關節之地承受為多一遇風寒感冒閉其皮毛通身經絡之氣壅滯不行則疼痛熱煩而皮膚熏黃濕陵上焦則痛在頭目濕淫下部則痛在膝踝濕侵肝腎則痛在腰腹濕遍一身上下表里無地不疼而關竅骨節更為劇焉其火盛者鬱蒸而為濕熱其水盛者淫泆而為濕寒而總之悉本於陽虛法當內通其膀胱外開其汗孔使之表裡雙瀉也茵陳五苓散白朮桂枝茯苓豬苓澤瀉等分為散每用五錢調茵陳蒿末一兩和勻空腹米飲調服一湯匙日三服多飲熱湯取汗濕家日晡煩疼以土旺午後申前時臨未支濕邪旺盛也若發熱惡寒是表邪閉固加紫蘇青萍以發其汗元滑苓甘散元明粉滑石茯苓甘草等分為末大麥粥汁和服一湯匙日三服濕從大小便去尿黃糞黑是其候也濕旺脾郁肺壅而生上熱小便黃澀法宜清金利水以瀉濕熱若濕邪在腹肺氣壅滯以致頭痛鼻塞聲音重濁神氣鬱煩當於發汗利水之中加橘皮杏仁以瀉肺氣苓甘梔子茵陳湯茵陳蒿三錢梔子二錢甘草二錢生茯苓三錢煎大半杯熱服治小便黃澀少腹滿脹者服此小便當利尿如皂角汁狀其色正赤一宿腹減濕從小便去矣濕家腹滿尿澀是木鬱而生下熱法當利水瀉濕而加梔子以清膀胱若濕熱在脾當加大黃芒硝如濕熱但在肝家而脾腎寒濕當加乾薑附子若膀胱無熱但用豬苓湯利其小便可也黃疸根原黃疸者土濕而感風邪也太陰濕土主令以陽明戊土之燥亦化而為太陰之濕設使皮毛通暢濕氣淫蒸猶得外泄一感風邪衛氣閉闔濕淫不得外達脾土堙郁遏其肝木肝脾雙陷水穀不消穀氣瘀濁化而為熱瘀熱前行下流膀胱小便閉澀水道不利膀胱瘀熱下無泄路熏蒸淫泆傳於周身於是黃疸成焉其病起於濕土而成於風木以黃為土色而色司於木木邪傳於濕土則見黃色也或傳於飲食或傷於酒色病因不同總由於陽衰而土濕濕在上者陽鬱而為濕熱濕在下者陰鬱而為濕寒乙木下陷而陽遏陰分亦化為濕熱甲木上逆而陰旺陽分亦化為濕寒視其本氣之衰旺無一定也其遊溢於經絡則散之於汗孔其停瘀於膀胱則泄之於水道近在胸膈則湧吐其腐敗遠在腸胃則推蕩其陳宿酌其溫涼寒熱四路滌清則證有變狀而雅無遁所凡諸疸病莫不應手消除也谷疸谷入於胃脾陽消磨蒸其精液化為肺氣肺氣宣揚外發皮毛而發汗內滲膀胱而為溺汗溺輸泄土不傷濕而木氣發達則疸病不作陽衰土濕水穀消遲穀精堙郁不能化氣陳腐壅遏阻滯脾土木氣遏陷土木鬱蒸則病黃疸中氣不運升降失職脾陷則大便滑溏胃逆則上脘痞悶濁氣熏騰噁心欲吐惡聞穀氣食則中氣愈郁頭眩心煩此當擴清其菀陳除舊而布新也酒疸酒醴之性濕熱之媒其濡潤之質入於臟腑則生下濕辛烈之氣騰於經絡則生上熱汗溺流通濕氣下泄而熱氣上達可以不病汗溺閉塞濕熱遏瘀乃成疸病其性嗜熱飲者則濡潤之下傷差少而辛烈之上傷頗重其性嗜冷飲者則辛烈之上傷有限而濕寒之下傷為多至於醉後發渴涼飲茶湯寒濕傷脾者不可勝數未可以濕熱概論也色疸腎主蟄藏相火之下祕而不泄者腎臟之也精去則火泄而水寒寒水泛濫浸淫脾土脾陽頽敗則濕動而寒生故好色之家久而火泄水寒土濕陽虧多病虛勞必然之理也水土寒濕不能生長木氣乙木遏陷則生下熱土木合邪傳於膀胱此疸病所由生也其濕熱在於肝膽濕寒在於脾腎人知其陰精之失亡而不知其相火之敗泄重以滋陰助濕之品敗其脾腎微陽是以十病九死不可活也甘草茵陳湯茵陳三錢梔子三錢大黃三錢甘草三錢生煎大半杯熱服治谷疸腹滿尿澀者服後小便當利尿如皂角汁狀其色正赤一宿腹減黃從小便去也茵陳五苓散白朮桂枝豬苓茯苓澤瀉等分為散每用五錢調茵陳蒿末一兩空腹米飲和服一湯匙日三服多飲熱湯取汗治日暮寒熱者硝黃梔子湯大黃四錢芒硝三錢梔子三錢煎大半杯熱服治汗出腹滿者梔子大黃湯梔子三錢香豉三錢大黃三錢枳實三錢煎一杯熱分三服治酒疸心中懊憹熱疼噁心欲吐者元滑苓甘散元明粉滑石甘草茯苓等分為末大麥粥汁和服一湯匙日三服治色疸額黑身黃者服後病從大小便去尿黃糞黑是其候也色疸日晡發熱惡寒膀胱急小便利大便黑溏五心熱腹脹滿身黃額黑此水土瘀濁之證宜瀉水去濕通其二便仲景用硝礬散硝石清熱礬石去濕此變而為滑石元明粉亦即硝礬之意用者酌量而通融之不可拘泥黃疸之家脾腎濕寒無內熱者當用薑附茵陳不可誤服硝黃也暍病根原暍病者暑熱而感風寒也熱則傷氣寒則傷形素問通評虛實論氣盛身寒得之傷寒氣虛身熱得之傷暑以寒性斂閉暑性疏泄寒閉其形而皮毛不開是以氣盛而身寒暑泄其氣而腠理不闔是以氣虛而身熱暍病則傷於暑而又傷於寒者也盛暑汗流元氣蒸泄披清風而浴寒水玄府驟閉素問玄府者汗孔也裡熱不宣故發熱惡寒口渴齒燥身重而疼痛脈細而芤遲也蓋氣不鬱則不病雖毒熱揮汗表裡燔蒸筋力懈惰精神委頓而新秋變敘暑退涼生肺腑清爽精力如初不遇風寒未嘗為病及熱傷於內寒傷於外壯火食氣而腠理忽斂氣耗而熱鬱於是病作也汗之愈泄其氣則惡寒益甚溫之愈助其火則發熱倍增下之愈亡其陽則濕動木鬱而淋澀彌加法當補耗散之元氣而不至於助火清煩郁之暑熱而不至於伐陽清金而瀉熱益氣而生津無如仲景人參白虎之為善也人參白虎湯石膏三錢知母三錢甘草二錢粳米半杯人參三錢米熟湯成取大半杯熱服霍亂根原霍亂者飲食寒冷而感風寒也夏秋飲冷食寒水穀不消其在上脘則為吐其在下脘則為泄或吐或泄不並作也一感風寒皮毛閉寒而宿物陳菀壅遏中氣盛滿莫容於是吐泄並作其吐者胃氣之上逆其泄者脾氣之下陷胃土之逆者膽木之上逼也脾土之陷者肝木之下侵也蓋中氣鬱塞脾胃不轉不能升降木氣木氣鬱迫而克中宮刑以膽木則胃逆賊以肝木則脾陷也肝膽主筋水土寒濕木氣不榮是以筋轉吐泄無餘寒瘀盡去土氣漸回陽和徐布中氣發揚表邪自解若其不解外有寒熱表證宜以麻桂發之而溫以理中四逆之輩表寒既退而臟腑鬆緩痛泄自止若其不能吐泄腹痛欲死可用大黃附子溫藥下之陳宿推蕩立刻輕安病在火令全屬寒因是以仲景立法率主理中四逆變通理中四逆之意則病有盡而法無窮矣倘泥時令而用清涼是粗工之下者也桂苓理中湯人參一錢茯苓二錢甘草一錢乾薑二錢桂枝三錢白朮三錢砂仁二錢生薑三錢煎大半杯溫服吐不止加半夏泄不止加肉蔻外有寒熱表證加麻黃轉筋痛劇加附子澤瀉痎瘧根原痎瘧者陰邪閉束郁其少陽之衛氣也人之六經三陰在裡三陰在表寒邪傷人同氣相感內舍三陰少陽之經在二陽之內三陰之外內與邪遇則相爭而病作其初與邪遇衛氣鬱阻不得下行漸積漸盛內與陰爭陰邪被逼外乘陽位里束衛氣閉藏而生外寒衛為陰束竭力外發重圍莫透鼓蕩不已則生戰栗少陽甲木從相火化氣及其相火鬱隆內熱大作陰退寒消則衛氣外發而病解焉衛氣晝行六經二十五周夜行五臟二十五周寒邪淺在陽經則晝與衛遇而日發深在五臟則夜與衛遇而暮發衛氣離則病休衛氣集則病作緣邪束於外則惡寒陽鬱於內則發熱陽旺而發之速則寒少而熱多陽虛而發之遲則寒多而熱少陽氣日盛則其作日早陽氣日衰則其作日晏陽氣退敗不能日與邪爭則間日乃作此以暑蒸汗泄浴於寒水寒入汗孔舍於腸胃之外經臟之間秋傷於風閉其腠理衛氣鬱遏外無泄路內陷重陰之中鼓動外發則成瘧病也溫瘧先傷於寒而後中於風先寒後熱是謂寒瘧先中於風而後傷於寒先熱後寒是謂溫瘧以冬中風邪泄其衛氣衛愈泄而愈閉郁為內熱又傷於寒束其皮毛熱無出路內藏骨髓之中春陽發動內熱外出而表寒閉束欲出不能遇盛暑毒熱或用力煩勞氣蒸汗流熱邪與汗皆出表裡如焚及其盛極而衰復反故位陰氣續復是以寒生也疸瘧其但熱而不寒者是謂疸瘧疸瘧即溫瘧之重者以其陽盛陰虛肺火素旺一當汗出而感風寒衛鬱熱發傷其肺氣手足如烙煩冤欲嘔陽亢陰枯是以但熱無寒其熱內藏於心外舍分肉之間令人神氣傷損肌肉消鑠瘧之最劇者也牝瘧其寒多而熱少者是謂牝瘧以其陰盛陽虛衛郁不能透發故寒多熱少蓋瘧病之寒因陰邪之束閉瘧病之熱緣衛陽之郁發其相火虛虧鬱而不發則純寒而無熱相火隆盛一郁即發則純熱而無寒其熱多者由相火之偏勝其寒多者因相火之偏虛也瘧在少陽其脈自弦弦數者火盛則多熱弦遲者水盛則多寒理自然耳柴胡栝蔞乾薑湯柴胡三錢黃芩三錢甘草二錢人參一錢生薑三錢大棗三枚乾薑三錢栝蔞三錢煎大半杯熱服覆衣嘔加半夏治寒瘧先寒後熱者柴胡桂枝幹薑湯柴胡三錢甘草二錢人參一錢茯苓三錢桂枝三錢乾薑三錢煎大半杯熱服覆衣治牝瘧寒多熱少或但寒不熱者白虎桂枝柴胡湯石膏三錢知母三錢甘草二錢粳米半杯桂枝三錢柴胡三錢煎大半杯熱服覆衣治溫瘧先熱後寒熱多寒少或但熱不寒者減味鱉甲煎丸鱉甲二兩四錢柴胡一兩二錢黃芩六錢人參二錢半夏二錢甘草二錢桂枝六錢芍藥一兩丹皮一兩桃仁四錢阿膠六錢大黃六錢乾薑六錢葶藶二錢為末用清酒一罐入灶下灰一升煮鱉甲消化絞汁去渣入諸藥煎濃留藥末調和為丸如梧子大空腹服七丸日三服治久瘧不愈結為癥瘕名曰瘧母傷風根原傷風者中虛而外感也陽衰土濕中脘不運胃土常逆肺金失降胸中宗氣不得四達時時鬱勃於皮毛之間遇飲食未消中氣脹滿阻格金火沉降之路肺金鬱發蒸泄皮毛宗氣外達是以不病一被風寒閉其皮毛肺氣壅遏不能外發故逆循鼻竅嚏噴而出濕氣淫蒸清涕流溢譬之水氣蒸騰滴而為露也水生於金肺氣上逆無以化水故小便不利素問風論勞風法在肺下巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死矣蓋膀胱之水全是肺氣所化水利則膀胱之郁濁下泄肺家之壅滯全消濕去而變燥故痰涕膠黏色化青黃出於口鼻肺臟不傷也少年陽衰未極肺不終郁則氣降而化水故引精於三日中年者五日末年陽衰不能引精者七日若其終不能引久而鬱熱蒸腐則肺傷而死矣太陽引精賴乎陽明之降中氣運轉陽明右降則肺金下達而化水尿積鬱始通陽明不降肺無下行之路太陽無引精之權也法宜瀉肺而開皮毛理中而瀉濕鬱濕消而鬱散氣通而水調無餘事己紫蘇薑苓湯蘇葉三錢生薑三錢甘草二錢茯苓三錢半夏三錢橘皮二錢乾薑三錢砂仁二錢煎大半杯熱服覆衣齁喘根原齁喘者即傷風之重者也其陽衰土濕中氣不運較之傷風之家倍甚脾土常陷胃土常逆水穀消遲濁陰莫降一遇清風感襲閉其皮毛中脘鬱滿胃氣愈逆肺臟壅塞表裡不得通達宗氣逆沖出於喉嚨而氣阻喉閉不得透泄於是壅悶喘急不可名狀此齁喘之由來也輕則但作於秋冬是緣風邪之外束重則兼發於夏暑乃由濕淫之內動濕居寒熱之中水火逼蒸則生濕氣濕氣在上則隨火而化熱濕氣在下則隨水而化寒火盛則上之濕熱為多水盛則下之濕寒斯甚此因水火之衰旺不同故其上下之寒熱亦殊而齁喘之家則上焦之濕熱不敵下焦之濕寒以其陽衰而陰旺火敗而水勝也此當溫中燥土助其推遷降戊土於坎中使濁陰下泄於水道升己土於離位使清陽上達於汗孔中氣一轉而清濁易位汗溺一行而鬱悶全消則肺氣清降喘阻不作若服清潤之劑中脘愈敗肺氣更逆是庸工之下者也柴蘇薑苓湯蘇葉三錢杏仁三錢橘皮三錢半夏三錢茯苓三錢乾薑三錢甘草二錢砂仁二錢生薑三錢煎大半杯熱服覆衣若皮毛閉束表邪不解則加麻黃若言語譫妄內熱不清則加石膏
