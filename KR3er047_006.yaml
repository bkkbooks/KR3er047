body:
  text: 卷六雜病解中腹痛根原腹痛者土濕而木賊之也乙木升於己土甲木降於戊土肝脾左旋膽胃右轉土氣回運而木氣條達故不痛也水寒土濕脾氣陷而胃氣逆肝膽郁遏是以痛作蓋乙木上升是為枝葉甲木下降是為根本脾陷則乙木之枝葉不能上發橫塞地下而克己土故痛在少腹胃逆則甲木之根本不能下培盤郁地上而克戊土故痛在心胸肝膽之經旁循脅肋左右並行而三陽之病則外歸於經三陰之病則內歸於藏以陰盛於內而陽盛於外故痛在臟腑者厥陰之邪痛在脅肋者少陽之邪也至於中氣頹敗木邪內侵則不上不下非左非右而痛在當臍更為劇也此其中間有木鬱而生風熱者肝以風木主令膽從相火化氣下痛者風多而熱少上痛者熱多而風少而究其根原總屬濕寒若有水穀停瘀當以溫藥下之仲景大黃附子湯最善之制也若宿物留滯而生鬱熱則厚朴七物湯是良法也如其瘀血堙塞氣道梗阻而生痛者則以破結行瘀之品利之桂枝茯苓丸下瘀血湯酌其寒熱而選用焉若無宿物法宜培土疏木溫寒去濕之劑大建中附子粳米烏頭石脂三方實諸痛證之準繩也姜苓桂枝湯桂枝三錢芍藥三錢甘草二錢茯苓三錢乾薑三錢煎大半杯溫服治脾肝下陷痛在少腹者柴胡桂枝鱉甲湯柴胡三錢鱉甲三錢醋炙甘草二錢桂枝三錢半夏三錢芍藥三錢茯苓三錢煎大半杯溫服治胃膽上逆痛在心胸者胃寒加乾薑川椒附子凡心腹疼痛率因水寒土濕木氣鬱沖所致心腹痛劇欲死四肢冰冷唇口指甲青白者宜薑椒附桂驅寒邪而達木鬱必重用苓甘瀉濕培土而緩其迫急其痛自止肝以風木主令膽從相火化氣其間木鬱風動火鬱熱發亦往往而有而推其脾腎無不濕寒之理即有風熱兼作用芍藥柴芩以瀉肝膽而脾腎之藥必宜溫燥此定法也肝主藏血風動血耗乙木枯槁生意不遂鬱怒而賊脾土則生疼痛若血枯木燥宜芍藥阿膠歸地首烏之類以滋風木木榮風退即當減去不可肆用以敗土氣血鬱痛作或內在臟腑或外在經絡其證肌膚甲錯兩目黯黑多怒而善忘以肝竅於目主藏血而華色血瘀不能外華故皮膚粗澀而黑黯也宜用丹皮桃仁破其瘀血若癥結難開加䗪蟲虻蟲之類行之尋常血瘀五靈脂山羊血功力亦良飲食停滯土困木鬱以致作痛用仲景溫下之法大黃薑附瀉其食水劇者少加巴霜一二鱉擴清陳宿功效最捷一切宿物壅阻並宜此法腰痛根原腰痛者水寒而木鬱也木生於水水暖木榮生髮而不鬱塞所以不痛腎居脊骨七節之中正在腰間水寒不能生木木陷於水結塞盤郁是以痛作木者水中之生意水泉溫暖生意升騰發於東方是以木氣根痎下萌正須溫養忽而水結冰澌根本失榮生氣抑遏則病腰痛腰者水之所在腹者土之所居土濕而木氣不達則痛在於腹水寒而木氣不生則痛在於腰然腰雖水位而木鬱作痛之原則必兼土病蓋土居水火之中火旺則土燥水旺則土濕太陰脾土之濕水氣之所移也土燥則木達而陽升土濕則木鬱而陽陷癸水既寒脾土秘濕濕旺木鬱肝氣必陷陷而不已墜於重淵故腰痛作也色過而腰痛者精亡而氣泄也精陰也而陰中之氣是謂陽根縱欲傷精陽根敗泄變溫泉而為寒冷之淵化火井而成冰雪之窟此木枯土敗之原疼痛所由來也緣陰陽生長之理本自循環木固生火而火亦生木少陰之火升於九天之上者木之子也少陽之火降於九地之下者木之母也其生於水者實生於水中之火水中之陽四象之根也難經所謂腎間動氣生氣之原也桂枝姜附阿膠湯茯苓三錢桂枝三錢甘草二錢乾薑三錢附子三錢阿膠三錢炒研煎大半杯溫服奔豚根原奔豚者腎家之積也平人君火上升而相火下蟄火分君相其實同氣君相皆蟄則腎水不寒火之下蟄實賴土氣胃氣右降金水收藏則二火沉潛而不飛揚土敗胃逆二火不降寒水漸冱陰氣凝聚久而堅實牢硬結於少腹是謂奔豚難經腎之積曰奔豚是也水邪既聚逢鬱則發奔騰逆上勢如驚豚腹脅心胸諸病皆作氣衝咽喉七竅火發危困欲死不可支也及其氣衰而還諸證乃止病勢之凶無如此甚然積則水邪而發則木氣其未發也心下先悸至其將發則臍下敢作以水寒木鬱則生振搖枝葉不寧則悸在心下根本不安則悸在臍間臍上悸生者是風木根搖故發奔豚仲景霍亂若臍上築者腎氣動也腎氣者風木搖撼之根而論其發作實是木邪木邪一發寒水上陵木則剋土而水則刑火火土雙敗正氣賊傷此奔豚所以危劇也悸者風木之郁沖驚者相火之浮宕火不勝水五行之常所恃者子土溫燥制伏陰邪培植陽根蟄於坎府根本不拔則膽壯而神謐土濕陽衰不能降蟄相火陽根泄露飄越無依寒水不凝陰邪無制巨寇在側而身臨敗地故動惕荒懸迄無寧宇凡驚悸一生即為奔豚欲發之兆不可忽也茯苓桂枝甘草大棗湯茯苓一兩桂枝四錢甘草二錢大棗十五枚甘瀾水四杯先煎茯苓減二杯入諸藥煎大半杯溫服日三劑作甘瀾水法大盆置水以勺揚之千百遍令水珠散亂千顆相逐乃取用之治汗後亡陽臍下悸動奔豚欲作者桂枝加桂湯桂枝五錢芍藥三錢甘草二錢生薑三錢大棗四枚煎大半杯溫服治奔豚方作氣從少腹上衝心部者奔豚湯甘草二錢半夏四錢芍藥二錢當歸二錢黃芩二錢生薑四錢芎藭三錢生葛五錢甘李根白皮三錢煎大半杯溫服治奔豚盛作氣上衝胸頭疼腹痛往來寒熱者奔豚之生相火升泄腎水下寒不能生木風木鬱沖相火愈逆故七竅皆熱少陽經氣被陰邪郁迫故有往來寒熱之證芎歸疏肝而滋風木芩芍瀉膽而清相火奔豚既發風熱上隆法應先清其上龍珠膏川椒五錢附子五錢烏頭五錢巴豆三錢研去油桂枝五錢茯芩八錢牡蠣五錢鱉甲五錢芝麻油黃丹熬膏加麝香阿魏研細布攤貼病塊奔豚已結氣塊堅硬本屬寒積但陰邪已盛稍服附子溫下寒邪不伏奔豚必發以邪深藥微非附子之過也不治則半年一載之間必至殞命此宜溫燥脾胃去其中焦濕寒土燥陽回力能制水然後以此膏貼之寒消塊化悉從大便而出滑白黏聯狀如凝脂濁瘀後泄少腹鬆軟重用附子暖水然後乃受瘕疝根原瘕疝者腎肝之積也木生於水水之為性得陽和而冰泮遭陰肅而凍合冰泮則木榮凍合則木枯腎水澌寒木氣菀遏擁腫結硬根於少腹而盤於陰丸是謂寒疝水凝則結而為內寒木鬱則發而為外熱內寒盛則牢堅而不出外熱作則奔突而不入大小無常動止莫測病發則痛楚欲死性命攸關非細故也此腎肝之邪而實原於任脈素問骨空論任脈為病男子內結七疝女子帶下瘕聚任者諸陰之純任少陰厥陰之氣總原於任脈腎中陽秘則冰消凍釋任中無固結之邪腎中陽泄水寒木鬱陰氣凝滯乃成疝瘕帶下之疾腎性蟄藏肝性疏泄水氣旺則結而為疝瘕木氣旺則流而為帶下無二理也任為陰而督為陽男則督旺女則任旺故男子之疝氣猶少而女子之瘕帶最多法宜溫水木之寒散腎肝之結結寒溫散瘕疝自消仲景大烏頭煎烏頭桂枝二方乃此病之良法也腎囊偏墜者謂之㿗疝是肝木之郁陷擁腫硬大常出而不入者其時時上下者謂之狐疝言如狐貍之出沒無常也茱萸澤瀉烏頭桂枝湯吳茱萸三錢炮澤瀉三錢烏頭三錢炮桂枝三錢芍藥三錢甘草二錢生薑三錢大棗四枚煎大半杯溫服仲景烏頭桂枝湯用烏頭湯一杯桂枝湯半杯合煎取一杯分五服不知再服其知者如醉狀得吐為中病今加茱萸澤瀉去其寒濕以絕疝瘕之根其擁腫偏墜者用此藥湯熱洗之或用藥末盛袋中熱熨之日作數次令其囊消而止其狐疝之偏有大小時時上下者仲景用蜘蛛散亦良蜘蛛散蜘蛛十四枚炒焦桂枝五分研末取八分一匕飲和日再服蜜丸亦可積聚根原積聚者氣血之凝瘀也血積為癥氣為瘕金匱婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者此為癥痼害所以血不止者其癥不去故也緣瘀血癥聚不在子宮三月胎長與癥痼相癥故血阻而下是癥病之為血也傷寒陽明病若中寒不能飲食小便不利手足濈然汗出此欲作痼瘕必大便初硬後溏所以然者以胃中冷水穀不別故也緣寒氣凝結水穀不消則大便泄利難經謂之大瘕泄是瘕病之為氣也癥瘕之病多見寒熱以氣血積聚陽不外達故內郁發熱陰不內斂故外束而惡寒氣統於肺血藏於肝氣聚者多下寒血積者多上熱蓋離陰右降而化金水及其成水而又抱陽氣故下焦不寒氣聚則金水失其收藏陽不下蟄是以寒生坎陽左升而化木火及其成火而又含陰精故上焦不熱血積則木火失其生長陰不上根是以熱作血性溫暖而左升至右降於金水則化而為清涼血之左積者木之不溫也血之右積者金之不涼也氣性清涼而右降至左升於木火則化為溫暖氣之右聚者金之不清也氣之左聚者木之不暖也而溯其原本總原於土己土不升則木陷血積戊土不降則金逆而氣聚中氣健運而金木旋轉積聚不生癥瘕弗病也化堅丸甘草二兩丹皮三兩橘皮三兩桃仁三兩杏仁三兩桂枝三兩煉蜜陳醋丸酸棗大米飲下三五丸日二次若癥瘕結硬難消須用破堅化癖之品內寒加巴豆川椒內熱加芒硝大黃積聚之病不過氣血左積者血多而氣少加鱉甲牡蠣右聚者氣多而血少加枳實厚朴總之氣不得血則不行血不得氣則不運氣聚者血無有不積血積者氣無有不聚但有微甚之分耳其內在臟腑者可以丸愈外在經絡者以膏藥消之化堅膏歸尾四錢鱉甲八錢巴豆四錢研黃連四錢三稜四錢莪朮四錢山甲一兩二錢筋餘一錢以上八味用芝麻油一斤淨丹八兩熬膏硼砂四兩硇砂四錢阿魏六錢炒研麝香二錢人參四錢三七四錢山羊血四錢肉桂四錢以上八味研細入膏火化攪勻稍冷傾入水盆浸二三日罐收狗皮攤皮硝水熱洗皮膚令透拭乾生薑切搽數十次貼膏一切癖塊積聚輕者一貼重者兩貼全消漸貼漸小膏漸離皮未消之處則膏黏不脫忌一切發病諸物惟豬犬鴨鳧有鱗河魚菘韭米面不忌其餘海味雞羊黃瓜凡有宿根之物皆忌若無鱗魚天鵝肉母豬蕎麥馬齒莧則忌之終身犯之病根立發若癖塊重發則不可救矣蛔蟲根原蛔蟲者厥陰肝木之病也木鬱則蠹生肝鬱則蟲化木以水為母而火為子乙木升於己土胎於癸水而生君火水升而化清陽是以火不上熱甲木降於戊土胎於壬水而生相火火降而化濁陰是以水不下寒肝升而膽降火清而水暖木氣溫暢故蠹蛔不生以其土運而木榮也土濕脾陷不能榮達肝木子母分離寒熱不交木以水火中氣堙於濕土不得上下調濟由是寒熱相逼溫氣中郁生意盤塞腐蠹朽爛而蛔蟲生焉凡物濕而得溫覆蓋不發則鬱蒸而蟲化或熱或寒不能生也故蟲不生於寒冰熱火之中而獨生於濕木者以木得五行之溫氣也溫氣中郁下寒上熱故仲景烏梅丸方連柏與薑附並用所以清子氣之上熱溫母氣之下寒也不去中下之濕寒而但事殺蛔土敗木枯則蛔愈殺而生愈繁此當溫燥水土以暢肝木則蛔蟲掃跡而去矣醫書殺蟲之方百試不效者也烏苓丸烏梅百枚米蒸搗膏人參二兩桂枝二兩乾薑二兩附子二兩川椒二兩去目炒當歸二兩茯苓三兩煉蜜同烏梅膏丸梧子大每服三十丸日二次若蟲積繁盛者加大黃二兩巴霜二錢下盡為佳蛔蟲生化原於土濕木鬱法以燥土疏木為主線白蟲證是肝木陷於大腸木鬱不達是以肛門作癢蟲生大腸之位從庚金化形故其色白而木陷之根總由土濕當於燥土疏木之中重用杏仁橘皮以瀉大腸滯氣佐以升麻升提手陽明經之墜陷也便堅根原便堅者手足陽明之病也手陽明以燥金主令足陽明從燥金化氣故手足陽明其氣皆燥然手陽明燥金也戊土從令而化燥足太陰濕土也辛金從令而化濕土濕者能化戊土而為濕不有變庚金之燥金燥者能化辛金而為燥不能變己土之濕以從令者易化而主令者難變也故傷寒陽明之便結腸胃之燥者也反胃噎膈之便結胃濕而腸燥者也傷寒陽明之便結腸胃之熱燥者也反胃噎膈之便結胃之寒濕而腸之寒燥者也以陽主開陰主闔陽盛則隧竅開通而便堅陰盛則關門閉澀而便結凡糞若羊矢者皆陰盛而腸結非關火旺也蓋腎司二便而傳送之職則在庚金疏泄之權則在乙木陰盛土濕乙木鬱陷傳送之竅既塞疏泄之令不行大腸以燥金之府閉澀不開是以糟粕零下而不黏聯道路梗阻而不滑利積日延久約而為丸其色黑而不黃者水氣旺而土氣衰也此證仲景謂之脾約脾約者陽衰濕盛脾氣鬱結不能腐化水穀使渣滓順下於大腸也誤用清潤之劑脾陽愈敗則禍變生矣阿膠麻仁湯生地三錢當歸三錢阿膠三錢研麻仁三錢研煎一杯去渣入阿膠火化溫服治陽盛土燥大便堅硬者結甚加白蜜半杯胃熱加芒硝大黃精液枯槁加天冬龜膠肉蓯蓉湯肉蓯蓉三錢麻仁三錢茯苓三錢半夏三錢甘草二錢桂枝三錢煎一杯溫服治陽衰土濕糞如羊矢者凡內傷雜病糞若羊矢結澀難下甚或半月一行雖系肝與大腸之燥而根緣土濕以脾不消磨穀精堙鬱而化痰涎肝腸失滋郁陷而生風燥故也法宜肉蓯蓉滋肝潤腸以滑大便一切硝黃歸地阿膠龜板天冬之類寒胃滑腸切不可用泄利根原泄利者肝脾之陷下也谷入於胃脾陽升磨精華歸於五臟而化氣血糟粕傳於大腸而為大便水入於胃脾陽消克化為霧氣上歸於肺肺氣降灑化而為水注於膀胱而為小便水入膀胱而不入大腸而後糟粕之後傳者不至於滑泄水之消化較難於谷陽衰土濕脾陽陷敗不能蒸水化氣則水穀混合下趨二腸而為泄利谷貯於大腸水滲於膀胱而其疏泄之權則在於肝今水入二腸而不入膀胱則乙木疏泄之令不行於膀胱而行於大腸是以泄而不藏也蓋木生於水而長於土水寒則生氣不旺而濕土鬱陷又復遏其發育之機生長之意不遂怒而生風愈欲疏泄膀胱空虛既無可泄之物大腸盈滿水穀停積故乙木後泄而為下利緣木氣抑遏鬱極而發為濕土所限不能上達勢必下行行則水穀摧注而下故也其發之過激衝突臟腑則生疼痛奔沖牴觸而不得上達盤鬱結塞則生脹滿其一切諸證皆緣土敗而木賊也苓蔻人參湯人參二錢甘草二錢白朮三錢乾薑三錢茯苓三錢肉蔻一錢煨研桂枝三錢煎大半杯溫服大便寒滑不收小便熱澀不利加石脂以固大腸粳米以通水道泄利緣腸胃寒滑法以仲景理中為主而加茯苓燥土肉蔻斂腸桂枝疏木泄利自止若滑泄不禁則用桃花湯乾薑溫其濕寒石脂固其滑脫粳米益其中氣而通水道無有不愈也泄利之原率因脾腎寒濕法宜濁燥間有木鬱而生風熱者投以溫燥泄利愈加然乙木雖為風熱而己土則是濕寒宜清潤其肝而溫燥其脾仲景烏梅丸方連柏與椒薑桂附並用治蛔厥而兼久利最善之方也傷寒太陽與少陽合病自下利者與黃芩湯若嘔者與黃芩半夏生薑湯以少陽甲木從相火化氣其經本隨陽明下降甲木不降上逆而克戊土戊土壅遏水穀盛滿莫容於是吐利皆作膽胃郁迫相火升炎而生燥熱此黃芩湯證也傷寒厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食則吐蛔下之利不止緣厥陰之經木鬱風動津液耗損故見消渴氣上衝心心中疼熱飢而不欲食食則吐蛔下之利不止緣厥陰之經木鬱風動津液耗損故見消渴風木鬱沖故心中疼熱下泄脾陽乙木愈郁己土被賊故下利不止此烏梅丸證也少陽之利但有上熱故第用芩芍以清膽火厥陰之利兼有下寒故以連柏清上而並以薑附溫下此雖傷寒之病而亦雜證所時有凡泄利之不受溫躁者皆此證也雜證濕寒者多燥熱者少千百之中偶爾見之不得與傷寒少陽之利同法治也泄利之家肝脾下陷則肺胃必上逆胃逆不能降攝甲木肺逆不能收斂相火相火上炎多生上熟久泄不已相火鬱升往往喉舌生瘡瘡愈則利作利止則瘡發口瘡者膽胃之逆甚下利者肝脾之陷劇也迭為盛衰累年不愈是宜溫燥水土驅其濕寒下利既瘳口瘡亦平庸工見其口瘡而清上熱則脾陽益泄利愈加而瘡愈增矣痢疾根原痢疾者庚金乙木之郁陷也金主氣而木主血金生於土木生於水水溫土燥則金融而氣調木榮而血暢水寒土濕不能升庚金而達乙木則金木俱陷魄門者腎之所司而陽明燥金之府也金性斂而木性泄其出而不至於遺矢者庚金斂之也其藏而不至於閉結者乙木泄之也濕土與金木俱陷則金愈鬱而愈欲斂木愈鬱而愈欲泄金愈欲斂故氣滯而不通木愈欲泄故血脫而不藏木氣疏泄而金強斂之隧路梗阻傳送艱難是以便數而不利金氣凝澀而木強泄之滯氣纏綿逼迫而下血液脂膏剝蝕摧傷是以腸胃痛切膿血不止其滑白而晶瑩者金色之下泄其後重而腥穢者金氣之脫陷也久而膏血傷殘臟腑潰敗則絕命而死矣此其病濕寒為本而濕熱為標病在少陰則始終皆寒病在厥陰則中變為熱故仲景於少陰膿血用桃花湯於厥陰下重用白頭翁湯緣水病則生寒木病則生熱而寒熱之原總歸於太陰之濕蓋土濕而水侮之則鬱而為濕寒土濕而木克之則鬱而為濕熱之故也桂枝蓯蓉湯甘草二錢桂枝三錢芍藥三錢丹皮三錢茯苓三錢澤瀉三錢橘皮三錢肉蓯蓉三錢煎大半杯溫服濕寒加乾薑濕熱加黃芩後重加升麻痢家肝脾濕陷脂血鬱腐法當燥濕疏木而以蓯蓉滋肝滑腸盡行腐瘀為善若結澀難下須用重劑蓯蓉盪滌陳宿使滯開痢止然後調其肝脾其脾腎寒濕則用桃花湯溫燥己土其木鬱生熱則用白頭翁涼瀉肝脾濕熱自當應藥而瘳也淋瀝根原淋瀝者乙木之陷於壬水也膀胱為太陽寒水之府少陽相火隨太陽而下行絡膀胱而約下焦實則閉癃虛則遺溺相火在下逢水則藏遇木則泄癸水藏之故泄而不至於遺溺乙木泄之故藏而不至於閉癃此水道所以調也水之能藏賴戊土之降降則氣聚也木之能泄賴己土之升升則氣達也胃逆而水不能藏是以遺溺脾陷而木不能泄是以閉癃淋者藏不能藏既病遺溺泄不能泄又苦閉癃水欲藏而木泄之故頻數而不收木欲泄而水藏之故梗澀而不利木欲泄而不能泄則溲溺不通水欲藏而不能藏則精血不秘緣木不能泄生氣幽鬱而為熱溲溺所以結澀水不能藏陽根泄露而生寒精血所以流溢而其寒熱之機悉由於太陰之濕濕則土陷而木遏疏泄不行淋痢皆作淋痢一理悉由木陷乙木後鬱於穀道則為痢前鬱於水府則為淋其法總宜燥土疏木土燥而木達則疏泄之令暢矣桂枝苓澤湯茯苓三錢澤瀉三錢甘草三錢生桂枝三錢芍藥三錢煎大半杯熱服肝燥發渴加阿膠脾為濕土凡病則濕肝為風木凡病則燥淋家土濕脾陷抑遏乙木發生之氣疏泄不暢故病淋澀木鬱風動津液耗損必生消渴其脾土全是濕邪而其肝木則屬風燥血藏於肝風動則血消此木燥之原也苓澤甘草培土而瀉濕桂枝芍藥疏木而清風此是定法土愈濕則木愈燥若風木枯燥之至芍藥不能清潤必用阿膠仲景豬苓湯善利小便茯苓豬苓澤瀉滑石利水而瀉濕阿膠清風而潤燥也水性蟄藏木性疏泄乙木生於癸水相火封藏癸水溫暖溫氣左升則化乙木生氣暢茂乙木發達疏泄之令既遂則水道清通而相火必秘土陷木遏疏泄不遂而愈欲疏泄則相火泄露而膀胱熱澀膀胱之熱澀者風木相火之雙陷於膀胱也足少陽甲木化氣於相火與手少陽三焦並溫水藏手少陽之相火泄則下陷於膀胱而病淋足少陽之相火泄則上逆於胸膈而病消其原總由於乙木之郁也膀胱熱澀之極者加梔子黃柏以清三焦之陷則水府清矣乙木之溫生化君火木鬱陽陷溫氣抑遏合之膀胱淪陷之相火故生下熱然熱在肝與膀胱而脾則是濕腎則是寒寒水侮土移於脾宮則脾不但濕而亦且病寒其肝與膀胱之熱不得不清而脾土濕寒則宜溫燥是宜並用乾薑以溫己土若過清肝熱而敗脾陽則木火增其陷泄膀胱熱澀水無止期矣惟溫腎之藥不宜早用恐助膀胱之熱若膀胱熱退則宜附子暖水以補肝木發生之根也腎主藏精肝主藏血木欲疏泄而水莫蟄藏則精血皆下其精液流溢宜薯蕷山茱以斂之其血塊注泄宜丹皮桃仁以行之淋家或下沙石或下白物砂石者膀胱熱癃溲溺煎熬所結水曰潤下潤下作咸溲溺之咸者水之潤下而成也百川下流則歸於海海水熬煉則結鹽塊膀胱即人身之海沙石即海水之鹽也白物者脾肺濕淫所化濕旺津凝則生痰涎在脾則克其所勝在肺則傳其所生皆入膀胱膀胱濕盛而下無泄竅濕氣淫泆化為帶濁白物黏聯成塊而下即帶濁之凝聚者也與脾肺生痰其理相同淋家下見白物上必多痰瀉濕宜重用苓澤若其痰多用仲景小半夏加茯苓橘皮以瀉之女子帶濁崩漏與男子白濁血淋同理皆濕旺木鬱之證內傷百病大率由於土濕往往兼病淋澀而鼓脹噎膈消渴黃疸之家更甚是緣陽虛土敗金木雙郁燥土溫中輔以清金疏木之品淋澀自開庸工見其下熱乃以大黃益敗脾陽謬妄極矣淋家下熱之至但有梔子黃柏證無有大黃芒硝證其熱不在脾胃也一切帶濁崩漏鼓脹黃疸凡是小便淋澀悉宜熏法用土茯苓茵陳蒿梔子澤瀉桂枝研末布包熱熨小腹外以手爐烘之熱氣透徹小便即行最妙之法
