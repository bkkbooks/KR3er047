body:
  text: 卷九瘡瘍之病因寒邪傷營血澀氣阻積鬱成熱肉腐為膿陽盛則紅腫而外發陰盛則黑塌而內陷其輕則疥癬之疾其重則腹內之病靈樞義皙而無方金匱法略而未備後世外科之家仰鑽莫入茫若其言玉版塵封金匱云埋知若亞父遭此難而身傾腎如伯牛構斯疾而命隕賢智不解其義而況餘子乎往年目病悔為庸妄所誤寒泄脾陽耳後壅腫清膿如注又幾誤於外科之手遊息浮揚一縷未斷念之至今病悸作瘡瘍解瘡瘍解癰疽根原癰疽者寒傷營血之病也血之為性溫則流行寒則凝澀寒傷營血凝澀不運衛氣鬱阻蓄而為熱熱盛則肉腐為膿膿瘀不泄爛筋而傷骨骨髓消爍經脈敗漏熏於五臟臟傷則死矣癰病淺而疽病深淺則輕而深則重癰者營衛之壅於外也疽者氣血之阻於內也營衛之壅遏有盛有不盛故腫有大小穴俞開而風寒入寒鬱為熱隨孔竅而外發故其形圓疽之外候皮夭而堅癰之外候皮薄而澤陰陽淺深之分也靈樞癰疽寒邪客於經脈之中則血澀血澀則不通不通則衛氣歸之不得復反故壅腫寒氣化為熱熱盛則腐肉肉腐則為膿癰成為熱則根原於外寒故癰疽初起當溫經而散寒行營而宣衛及其寒化為熱壅腫痛楚於此營衛遏閉之秋仍宜清散於經絡至於膿血潰泆經熱外泄營衛俱敗自非崇補氣血不能復也如其經絡陰凝腫熱外盛氣血虛寒膿汁清稀則更當溫散而暖補之不可緩也若夫瘡癤疥癬之類其受傷原淺但當發表而瀉衛無事他方也桂枝丹皮柴蘇湯桂枝三錢芍藥三錢甘草二錢丹皮三錢蘇葉三錢生薑三錢煎大半杯熱服覆取微汗治癰疽初起金匱諸脈浮數應當發熱而反灑淅惡寒若有痛處當發瘡癰癰疽因外感寒邪傷其營血營傷而裹束衛氣衛氣鬱阻不得外達故見惡寒衛鬱熱發肉腐膿化則成癰疽初起經絡郁遏必當發表表解汗出衛郁透泄經絡通暢則腫痛消除不作膿也若不得汗宜重用青萍發之表熱太盛用地黃天冬涼瀉經絡之郁衛氣太虛用黃耆益其經氣丹皮黃耆湯桂枝三錢桃仁三錢甘草二錢桔梗三錢丹皮三錢生薑三錢元參三錢黃耆三錢生煎大半杯熱服治皮肉壅腫癰疽已成者熱盛重用黃耆天冬地黃排膿湯甘草二錢炙桔梗三錢生薑三錢大棗三枚煎大半杯溫服治膿成熱劇皮肉鬆軟者桂枝人參黃耆湯人參三錢黃耆三錢炙桂枝三錢甘草二錢炙當歸三錢芍藥三錢茯苓三錢丹皮三錢煎大半杯溫服治膿泄熱退營衛雙虛者黃耆人參牡蠣湯黃耆三錢人參三錢甘草二錢五味一錢生薑三錢茯苓三錢牡蠣三錢煎大半杯溫服治膿泄後潰爛不能收口洗淨敗血腐肉用龍骨象皮細末少許收之貼仙靈膏仙靈膏地黃八兩當歸二兩甘草二兩黃耆二兩丹皮一兩桂枝一兩麻油一斤黃丹八兩熬膏入黃蠟白蠟乳香沒藥各一兩罐收膿後潰爛久不收口洗淨貼一日一換計日平復大黃牡丹湯大黃三錢芒硝三錢冬瓜子二錢桃仁三錢丹皮三錢煎大半杯熱服治疽近腸胃內熱鬱蒸者參耆苓桂乾薑湯人參三錢黃耆三錢甘草二錢茯苓三錢桂枝三錢乾薑三錢丹皮二錢煎大半杯溫服治陰盛內寒及膿清熱微者甚加附子仙掌丹斑蝥八錢去頭翅糯米炒黃用去米川産者良余處不可用前胡四分炒乳香一錢去油沒藥一錢去油血竭一錢元參四分冰片五分麝香五分研細瓶收凡陽證癰疽初起針破瘡頂點藥如芥粒外用膏藥貼之頃刻流滴黃水半日即消重者一日一換一兩日愈神效膿成無用陰證不治瘰癧根原瘰癧者足少陽之病也足少陽以甲木而化氣於相火其經自頭走足行身之旁目之外眥上循耳發從頸側而入缺盆下胸腋而行脅肋降於腎臟以溫癸水相火降蟄故癸水不至下寒而甲木不至上熱而甲木之降由於辛金之斂辛金之斂緣於戊土之右轉也戊土不降少陽逆行經氣壅遏相火上炎瘀熱搏結則瘰癧生焉肝膽主筋筋脈卷屈而壅腫故磊落歷碌頑硬而堅實也靈樞經脈膽足少陽之經是動則病口苦心脅痛缺盆中腫痛腋下腫馬刀挾癭馬力挾癭者足少陽之脈循缺盆挾胸膈而走脅肋其經彎如馬刀而癭瘤挾生也金匱痹挾背行若腸鳴馬刀挾癭者皆為勞得之此以勞傷中氣戊土逆升少陽經脈降路壅阻相火鬱蒸故令病此病在筋而不在肉故堅而不潰潰而不斂較之諸瘡最難平復而相火升炎上熱日增脾腎陽虧下寒日劇久而陽敗土崩遂傷性命非傷於血肉之潰乃死於中氣之敗也法當培中氣以降陽明肺胃右行相火下潛甲木榮暢而歸根則瘡自平矣柴胡芍藥半夏湯柴胡三錢芍藥三錢元參三錢甘草二錢半夏三錢丹皮三錢牡蠣三錢鱉甲三錢煎大半杯熱服上熱甚者加黃芩地黃血虛木燥加首烏腫痛加貝母膿成加桔梗癩風根原癩風者風傷衛氣而營郁未盡泄也衛性收斂營性發揚風傷衛氣開其皮毛風愈泄則衛愈閉其性然也衛閉則營血不得外發於是鬱蒸而生裡熱六日經盡營熱鬱發衛不能閉則腫透皮毛而見紅斑斑發熱除則病愈矣若衛閉不開斑點莫出營熱內遏臟腑蒸焚則成死證風以木氣而善疏泄其衛氣之閉者風泄之也其衛氣之閉而終開者亦風泄之也初時感冒經熱未盛則氣閉而風不能泄經盡之後營熱蒸發則風泄而氣不能閉是以疹見風有強弱之不同氣有盛衰之非一風強而氣不能閉則斑點盡出氣盛而風不能泄則斑點全無若風氣相搏勢力均平風強而外泄氣盛而內閉風強則內氣不能盡閉氣盛則外風不能盡泄泄之不透隱見於皮膚之內是謂癮疹氣之不透泄鬱而為癢癢者謂之泄風又曰脈風泄風者風之未得盡泄而遣熱於經脈之中也泄風不愈營熱內郁久而經絡蒸淫肌肉腐潰發為痂癩是名癩風肺司衛氣而主皮毛衛氣清和熏膚充身澤毛若霧露之溉焉則皮毛榮華衛氣鬱閉髮膚失其熏澤故膚腫而毛落肺竅於鼻宗氣之所出入宗氣者衛氣之本大氣之搏而不行積於胸中以貫心肺而行呼吸者也衛氣閉塞則宗氣蒸瘀失其清肅故鼻柱壞也大凡溫疫中風發表透徹紅斑散布毫髮無郁必無此病法宜瀉衛鬱而清營熱決腐敗而生新血經絡清暢痂癩自平矣柴蘇丹皮地黃湯蘇葉三錢生薑三錢甘草二錢丹皮三錢芍藥三錢地黃三錢煎大半杯熱服覆衣取汗若不得汗重用青萍發之外以青萍熱湯熏洗以開汗孔汗後用破郁行血之藥通其經絡退熱消蒸之劑清其營衛腐去新生自能平愈但涼營瀉熱之品久服則脾敗當酌加薑桂行經之藥不至內泄脾陽則善矣痔漏根原痔漏者手太陽之病也手之三陽自手走頭足之三陽自頭走足手三陽之走頭者清陽之上升也足三陽之走足者濁陰之下降也足三陽病則上逆而不降手三陽病則下陷而不升素問氣厥論小腸移熱於大腸為慮瘕為沉痔五行之理升極必降降極必升升則陰化為陽降則陽化為陰水本潤下足少陰以癸水而化君火者降極則升也火本炎上手太陽以丙火而化寒水者升極則降也手太陽病則丙火下陷不上升而化寒水是以小腸有熱五臟六腑病則傳其所勝以丙火而化庚金是以移熱於大腸魄門處大腸之末丙火傳金陷於至下之地是以痔生於肛也然病在於二腸而究其根原實因於脾素問生氣通天論因而飽食筋脈橫解腸澼為痔以過飽傷脾脾氣困敗不能消磨水穀莫化下趨二腸而為泄利泄則脾與二腸俱陷丙火陷於肛門此痔病所由生也氣統於肺而肺氣之降者胃土之右轉也血藏於肝而肝血之升者脾土之左旋也凡經絡臟腑之氣皆受於肺凡經絡臟腑之血皆受於肝戊土一降而諸氣皆降己土一升則諸血皆升脾土濕陷則肝木下鬱而血不上行故脫失於大便凝則為慮瘕流則為沉痔沉慮者皆肝血之下陷無二理也靈樞邪氣臟腑病形腎脈微澀為不月沉痔血流於後則為沉痔血凝於前則為不月不月即慮瘕也金匱少陽有寒者其人下重便血有熱者必痔痔與下重便血皆丙火之下陷火衰而陷者則下重便血而不痔火未衰而陷者則下重便血而痔生要之痔家熱在魄門而脾與小腸無不寒濕緣丙火不虛則不陷陷則下熱而中寒丙火上升而化寒水者常也下陷而不化寒水是以生熱陷而不升故熱在魄門而不在腸胃也此病一成凡遇中氣寒鬱則火陷而痔發無論其平日即其痔發肛熱之時皆其寒濕內作之會而醫工不知也經血陷流習為熟路歲久年深時常滴漏則為漏病譬如器漏而水泄也茯苓石脂湯茯苓三錢丹皮三錢桂枝三錢芍藥四錢甘草二錢乾薑二錢炒赤石脂三錢升麻一錢煎大半杯溫服治痔漏腫痛下血肛熱加黃連木燥加阿膠
