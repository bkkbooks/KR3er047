body:
  text: 卷三六腑化谷津液布揚流溢經絡會於氣口氣口成寸以決死生微妙在脈不可不察醫法無傳脈理遂湮金簡長封玉字永埋方書累架七診之義無聞醫錄連床九候之法莫著既迷罔於心中復綿昧於指下使踟躕之餘命飽庸妄之毒手顧此恨恨廢卷永懷作脈法解脈法解寸口脈法飲食入胃腐化消磨手太陰散其精華遊溢經絡以化氣血氣血周流現於氣口以成尺寸氣口者手太陰肺經之動脈也關前為寸關後為尺尺為陰而寸為陽關者陰陽之中氣也寸口在魚際之分關上在大淵之分尺中在經渠之分心與小腸候於左寸肺與大腸候於右寸肝膽候於左關脾胃候於右關腎與膀胱候於兩尺心主三焦隨水下蟄亦附此焉素問脈要精微論尺內兩傍則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾兩關部也上附上右外以候肺內以候胸中左外以候心內以候膻中兩寸部也前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也謹調尺寸而表裡上下於此得矣蓋肺主藏氣而朝百脈十二經之氣皆受之於肺平旦寅初肺氣流布起於寸口運行十二經中周而復始一日一夜五十度畢次日平旦寅初復會於寸口寸口者脈之大會此曰寸口乃寸尺三部之總名非但魚際己也故十二經之盛衰悉見於此靈樞經脈經脈者常不可見也其虛實也以氣口知之此氣口所以獨為五臟主也氣口即寸口手之三陽自手走頭大小腸腑雖至濁而經行頭上則為至清故與心肺同候於兩寸越人十難實為定法近人乃欲候大小腸於兩尺乖謬極矣寸口人迎脈法氣口者手太陰經之動脈在魚際之下人迎者足陽明經之動脈在結喉之旁太陰行氣於三陰故寸口可以候五臟陽明行氣於三陽故人迎可以候六腑以太陰為五臟之首陽明為六腑之長也臟陰盛則人迎小而寸口大虛則人迎大而寸口小腑陽衰則寸口大而人迎小旺則寸口小而人迎大靈樞禁服寸口主中人迎主外春夏人迎微大秋冬寸口微大如是者命曰平人人迎大一倍於寸口病在足少陽一倍而躁在手少陽人迎二倍病在足太陽二倍而躁在手太陽人迎三倍病在足陽明三倍而躁在手陽明盛則為熱虛則為寒緊則病痹代則乍甚乍閒人迎四倍且大且數名曰溢陽溢陽為外格死不治寸口大一倍於人迎病在足厥陰一倍而躁在手厥陰寸口二倍病在足少陰二倍而躁在手少陰寸口三倍病在足太陰三倍而躁在手太陰盛則脹滿寒中食不化虛則熱中出麋少氣溺色變緊則痛痹代則乍痛乍止寸口四倍且大且數名曰溢陰溢陰為內關死不治靈樞經脈人迎與脈口即寸口也俱盛四倍以上命曰關格關格者與之短期靈樞五色人迎盛堅者傷於寒氣口盛堅者傷於食以氣口主裡傷食則陰鬱於內故氣口盛堅人迎主表傷寒則陽鬱於外故人迎盛堅此診寸口人迎之法也寸口人迎之脈載在經文後世乃有左為人迎右為氣口之說無稽妄談不足辨也三部九候脈法十二經皆有動脈上部之動脈在頭中部之動脈在手下部之動脈在足是為三部一部三候是為九候素問三部九候論人有三部部有三候三候者有天有地有人也上部天兩額之動脈足少陽之頷厭也上部地兩頰之動脈足陽明之地倉大迎也上部人耳前之動脈手少陽之和髎也中部天手太陰之太淵經渠也中部地手陽明之合谷也中部人手少陰之神門也下部天足厥陰之五里也下部地足少陰之太谿也下部人足太陰之箕門也下部之天以候肝地以候腎人以候脾胃之氣中部之天以候肺地以候胸中之氣人以候心上部之天以候頭角之氣地以候口齒之氣人以候耳目之氣也下部之天女子則取太衝下部之人胃氣則候於陽明之衝陽仲景謂之趺陽此三部九候之法也難經三部者寸關尺也九候者浮中沉也與素問不同此一部中之三部九候也另是一法臟腑脈象五臟為陰六腑為陽陰陽既殊脈象攸分肝脈弦心脈洪脾脈緩肺脈澀腎脈沉其甚者為臟其微者為腑難經心脈急甚者肝邪干心也微急者膽邪干小腸也心脈大甚者心邪自干心也微大者小腸邪自干小腸也心脈緩甚者脾邪干心也微緩者胃邪干小腸也心脈澀甚者肺邪干心也微澀者大腸邪干小腸也心脈沉甚者腎邪干心也微沉者膀胱邪干小腸也其他臟腑依此類推甚者沉而得之微者浮而得之大抵腑脈浮數臟脈沉遲仲景脈法浮為在表沉為在裡數為在腑遲為在臟是也蓋陽外陰內一定之理腑氣內交臟氣外濟則陰陽平而脈息調腑病則氣不內交是以但浮而不沉臟病則氣不外濟是以但沉而不浮也觀越人十難一脈十變之義大腸小腸俱候於心脈可知欲候大小腸於兩尺之誤四時脈體天地之氣生長於春夏收藏於秋冬人與天地同氣也陽氣生長則脈浮升陰氣收藏則脈沉降是以春之脈升夏之脈浮秋之脈降冬之脈沉素問脈要精微論天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下以春應中規夏應中矩秋應中衡冬應中權是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室升降浮沉隨時變更寸脈本浮而一交秋冬則見沉意尺脈本沉而一交春夏則見浮機此氣化一定毫髮不爽也仲景脈法春弦秋浮冬沉夏洪弦者浮升之象洪者浮之極也浮者金氣方收微有降意而未能遽沉大約春脈沉而微浮夏則全浮秋脈浮而微沉冬則全沉仲景脈法原與經義相同耳真臟脈義土者四維之中氣也脾以陰土而含陽氣故脾陽左升則化肝木胃以陽土而胎陰氣故胃陰右降則化肺金金降於北涼氣化寒是謂腎水木升於南溫氣化熱是謂心火肺肝心腎四象攸分實則脾胃之左右升降而變化者也脾胃者四臟之母母氣虧敗四子夫養脈見真臟則人死焉故四臟之脈必以胃氣為本肝脈弦心脈鉤肺脈毛腎脈石脾胃脈緩其弦鉤毛石而緩者是四臟之有胃氣也其弦鉤毛石而不緩者是謂真臟脈真臟脈見胃氣敗竭必死不救也玉機真臟論脾脈者土也孤臟以灌四旁者也平人氣象論平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死人以水穀為本故人絕水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂真臟脈者真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子累累然色赤黑不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絕如指彈石辟辟然色黑黃不澤毛折乃死諸真臟脈見者皆死不治也五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五臟各以其時自胃而至於手太陰邪氣勝者精氣衰也病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死蓋土位乎中一身之元氣也土生於火而死於水故仲景垂訓以少陰負趺陽為順少陰水勝則火滅而土敗也自醫法失傳後世庸愚乃滋陰瀉陽補水滅火以敗胃氣以此毒天下而民從之良可哀也浮沉大小五臟之脈心肺俱浮腎肝俱沉脾胃居沉浮之間陽浮而陰沉其性然也然陽主降而陰主升陽體雖浮而內含降意則浮中帶沉陰體雖沉而內含升意則沉中帶浮沉而微浮則陰不下走浮而微沉則陽不上飛若使寸脈但浮而不沉則陽氣上逆而不交於陰尺脈但沉而不浮則陰氣下陷而不交於陽水火分離下寒上熱諸病生矣升降陰陽之權全在乎中中者土也己土升則乙木上達而化清陽戊土降則辛金下行而化濁陰陰陽交濟是以寸不但浮而尺不但沉土之所以升降失職者木刑之也木生於水而長於土土氣衝和則肝隨脾升膽隨胃降木榮而不郁土弱而不能達木則木氣鬱塞肝病下陷而膽病上逆木邪橫侵土被其賊脾不能升而胃不能降於是兩關之脈大左關之大者肝脾之鬱而不升也右關之大者膽胃之鬱而不降也膽木化氣於相火膽木右降則相火下蟄而不上炎膽木逆升相火上炎而刑金肺金被克清氣鬱蒸而生上熱於是右寸之脈亦大肝木主升肝木不升生意抑遏而生下熱於是左尺之脈亦大右寸之大者肺金之上逆也左尺之大者肝木之下陷也胃主降濁胃逆則濁氣上填倉廩不納噁心嘔吐之病生焉脾主升清脾陷則清氣下瘀水穀不消脹滿泄利之病生焉肺藏氣而性降肝藏血而性升金逆則氣不清降而上郁木陷則血不溫升而下脫肺主收斂肝主疏泄血升而不至於流溢者賴肺氣之收斂也氣降而不至於固結者賴肝血之疏泄也木陷則血脫於下而肺金失斂則血上溢金逆則氣鬱於上而肝木不升則氣下結推之凡驚悸吐衄盜汗遺精之病皆金氣不能降斂淋癃泄痢噯腐吞酸之病皆木氣不能生髮金逆而莫收斂則君火失根而左寸亦大木陷而行疏泄則相火下拔而右尺亦大大者有餘之象也於其有餘之中得其不足之意則脈之妙解而醫之至數也經所謂大則病進者別有玄機非後世醫書陽盛陰虛之說也二十四脈浮沉浮沉者陰陽之性也難經呼出心與肺吸入腎與肝呼吸之間脾受穀味也其脈在中陽性浮而陰性沉呼出為陽心肺之氣也吸入為陰腎肝之氣也心肺之脈俱浮浮而大散者心也浮而短澀者肺也腎肝之脈俱沉沉而濡實者腎也沉而牢長者肝也脾居陰陽之中其氣在呼吸之交其脈在浮沉之半其位曰關關者陰陽之關門陰自此升而為寸陽自此降而為尺闔闢之權於是在焉故曰關也陽盛則寸浮陰盛則尺沉陰盛於裡陽盛於表仲景脈法浮為在表沉為在裡一定之法也然浮沉可以觀表裡不可以定陰陽三難關以前者陽之動也脈當見九分而浮過者法曰太過減者法曰不及遂上魚為溢此陰乘之脈也關以後者陰之動也脈當見一寸而沉過者法曰太過減者法曰不及遂入尺為覆此陽乘之脈也陽乘陰位則清氣不升故下覆於尺陰乘陽位則濁氣不降故上溢於魚溢者浮之太過而曰陰乘覆者沉之太過而曰陽乘是則浮不可以為陽而沉不可以為陰浮沉之中有虛實焉浮之損小沉之實大是陽虛於表而實於裡也沉之損小浮之實大是陽虛於裡而實於表也浮大晝加沉細夜加浮大晝死沉細夜死診者當於浮沉之中參以虛實也遲數遲數者陰陽之氣也九難數者腑也遲者臟也數則為熱遲則為寒經脈之動應乎漏刻一呼再動一吸再動呼吸定息而脈五動氣之常也過則為數減則為遲臟陰而腑陽數則陽盛而為腑遲而陰盛而為臟陽盛則熱陰盛則寒數之極則為至遲之極則為損一定之法也然遲不盡寒而數不盡熱脈法趺陽脈遲而緩胃氣如經也寸口脈緩而遲緩則陽氣長遲則陰氣盛陰陽相抱營衛俱行剛柔相得名曰強也是遲緩者趺陽寸口之常脈未可以為寒也曰病人脈數數為熱當消穀引食而反吐者以發其汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀胃中虛冷故也是數者陽明之陽虛未可以為熱也凡脈或遲或數乖戾失度則死十四難一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命絕此至之脈也一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絕此損之脈也人之將死脈遲者少脈數者多陽氣絕根浮空欲脫故脈見疾數大概一息七八至以上便不可救虛勞之家最忌此脈若數加常人一倍一息十至以上則死期迫矣滑澀滑澀者陰陽之體也滑則血盛而氣虛澀則血虛而氣盛肝藏血而肺藏氣故肝脈滑而肺脈澀肺性收斂肝性生髮收斂則澀生髮則滑金自上斂木自下發是以肺脈浮澀而肝脈沉滑斂則氣聚發則氣散是以肺脈澀短而肝脈滑長氣陽也而含陰血陰也而抱陽故滑為陽而澀為陰脈法大浮數動滑此名陽也沉澀弱弦微此名陰也以金水之性收藏木火之性生長收則浮澀而生則沉滑長則浮滑而藏則沉澀滑者生長之意澀者收藏之象而俱非平氣脈法脈有弦緊浮滑沉澀名曰殘賊以其氣血之偏澀則氣盛而血病滑則血盛而氣傷也寸應滑而尺應澀肺脈之澀者尺之始基肝脈之滑者寸之初氣尺應澀而變滑則精遺而不藏寸應滑而變澀則氣痞而不通寸過於滑則肺金不斂而痰嗽生尺過於澀則肝木不升而淋痢作是以滑澀之脈均為病氣也大小大小者陰陽之象也陽盛則脈大陰盛則脈小大為陽而小為陰寸大而尺小者氣之常也寸過於大則上熱尺過於小則下寒然有大不可以為陽盛而小不可以為陰盛者脈法脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半產漏下男子則亡血失精蓋陽衰土濕水火不交火炎而金爍則關寸浮大水寒而木鬱則關尺浮大肺金失其收斂肝木行其疏泄此亡血失精半產漏下之原庸工以為陰虛投以滋潤土敗則命殞是大不可以為陽盛也傷寒三日脈浮數而微病人身涼和者此為欲解也蓋邪退而正復則脈微是小不可以為陰盛也凡木火泄露則脈大金水斂藏則脈小陽泄則上熱而下寒陽藏則上清而下溫勞傷虛損之脈最忌浮大陽根下斷浮大無歸則人死矣故大則病進小則病退小脈未可以扶陽大脈未可以助陰當因委而見源窮其大小所由來也長短長短者陰陽之形也長為陽而短為陰陽升於木火故肝脈沉滑而長心脈浮滑而長陰降於金水故肺脈浮澀而短腎脈沉澀而短也人莫不病發於陰進而病愈於陽長陰進則脈短陽長則脈長故長則氣治而短則氣病然不宜過長過長則木旺而金衰矣木者中氣之賊百病之長以木性發達而百病之起多因於木氣之不達生意盤郁而克脾胃是以氣愈鬱而脈愈長木鬱則協水以賊土合火而刑金故但顯肝脈之長而不形肺脈之短金雖剋木而凡人之病則金能剋木者少而木能侮金者多也蓋木氣之所以能達者水土溫而根本暖也水寒土濕生意不遂則木愈鬱而氣愈盛所以肝病則脈長也緩緊緩緊者陰陽之情也緩為陽而緊為陰緩者戊土之氣也脈法趺陽脈遲而緩胃氣如經也曰沖氣和名曰緩營氣和名曰遲曰寸口脈緩而遲緩則陽氣長遲則陰氣盛以土居四象之中具木火之氣而不至於溫熱含金水之體而不至於寒涼雍容和暢是以緩也緩則熱生脈法緩則胃氣實實則谷消而水化也靈樞五癃津液中熱則胃中消穀腸胃充廓故胃緩也然則傷寒陽明之脈必實大而兼緩也緊者寒水之氣也脈法假令亡汗若吐以肺裡寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下利以胃中虛冷故令脈腎也此內寒之緊也曰寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營此外寒之緊也以水為冬氣冬時寒盛冰堅地坼是以緊也緊則痛生曰營衛俱病骨節煩痛當發其汗是外寒之痛也曰趺陽脈緊而浮浮為風緊為寒浮為腸滿緊為腹痛浮緊相搏腹鳴而轉轉即氣動膈氣乃下是內寒之痛也然則傷寒少陰之脈必微細而兼緊也蓋陽盛則緩陰盛則緊緩則生熱緊則生寒寒愈盛則愈緊熱愈盛則愈緩以陽性發泄而陰性閉藏發而不藏所以緩也藏而不發所以緊也石芤石芤者陰陽之虛也陽氣不降則腎脈石陰氣不升則心脈芤石則外虛而內實芤則外實而內虛石者氣虛而不蟄也陽體虛而陰體實水中無氣凝冱而沉結所以石也平人氣象論平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死冬胃微石曰平石多胃少曰腎病但石無胃曰死平腎脈來喘喘累累如鉤按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死蓋坎中之陽生氣之原也陽根下斷陰魄徒存堅實結硬生氣全無是以死也老子柔弱者生之徒堅強者死之徒此之謂也芤者血虛而不守也陰體實而陽體虛火中無血消減而浮空所以芤也脈法趺陽脈浮而芤浮者衛氣虛芤者營氣傷曰脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名曰革芤減相合則名曰革後世芤外又有革脈非是婦人則半產漏下男子則亡血失精曰脈浮而緊按之反芤此為本虛故當戰而汗出也蓋離中之陰收氣之原也陰根上斷陽魂徒存虛飄空洞收氣全無是以病也血陰也而生於陽陽升則化火故溫暖和暢而吐陽魂陽虛血寒則凝瘀而亡脫血脫則火泄而寒增是以失精亡血而脈芤者不可助陰而泄陽蓋芤則營陰外脫而血中之溫氣亦亡也促結促結者陰陽之盛也脈法脈來緩時一止復來者名曰結脈來數時一止復來者名曰促陽盛則促陰盛則結此皆病脈曰脈藹藹如車蓋者名曰陽結也脈累累如循長竿者名曰陰結也陰陽之性實則虛而虛則實實而虛者清空而無障礙所以不結虛而實者壅滿而生阻隔所以脈結陽結則藹藹郁動如車蓋之升沉陰結則累累不平如長竿之勁節以陽性輕清而陰性重濁故促結之象異焉驚悸之家脈多促結以其陰陽之不濟也陽旺於木火陰盛於金水陽虛而生驚者木火下虛陰氣凝澀而不化是以結也陰虛而生悸者金水上虛陽氣鬱迫而不通是以促也脈法其脈浮而數不能食身體重大便反硬名曰陰結此臟腑之結也蓋孤陽獨陰燥濕偏盛寒熱不調其氣必結臟腑經絡本為一氣臟氣結則脈氣必結脈氣結則臟氣必結若夫代止之脈並無郁阻而中斷是營衛之敗竭非促結之謂也弦牢弦者如弦之直弦而有力曰牢弦牢者陰陽之旺也素問玉機真藏論春脈如弦四難牢而長者肝也弦牢者肝家之脈非病也然弦牢之中而有濡弱之象則肝平但有弦牢而無濡弱則肝病矣平人氣象論平肝脈來軟弱招招如揭長竿末梢曰肝平長竿末梢者軟弱之義也蓋木生於水而長於土水土溫和則木氣發達而榮暢水土寒濕則木氣枯槁而弦牢木之為義愈鬱則愈盛弦牢者木盛而土虛也弦為里濕支飲之阻衛陽則木氣抑遏而為弦脈法支飲急弦是也牢為外寒寒邪之束營陰則木氣鬱迫而為牢脈法寒則牢堅是也弦亦為寒脈法脈弦而大弦則為減大則為芤減則為寒芤則為虛金匱脈雙弦者寒也偏弦者飲也以寒水不生木是以寒也弦亦為痛傷寒陽脈澀陰脈弦法當腹中急痛者先用小建中湯以風木而賊土是以痛也脈以胃氣為本木得胃氣則和緩不得胃氣則弦牢平人氣象論平人之常氣稟於胃人無胃氣曰逆逆者死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死所謂無胃氣者但得真藏脈不得胃氣也病肝脈來如循長竿曰肝病死肝脈來急益勁如新張弓弦曰肝死新張弓弦者弦牢之象肝家之真藏脈也濡弱濡者如綿之軟軟而無力曰弱濡弱者陽氣之衰也平人氣象論平肝脈來濡弱招招如揭長竿末梢曰肝平脈法肝者木也其脈微弦濡弱而長肝病自得濡弱者愈濡弱者肝家之脈非病也然軟弱之中而有弱牢之意則肝平但有濡弱而無弦牢則肝病矣玉機真藏論春脈如弦其氣軟弱輕虛而滑端直以長故曰弦端直以長者弦牢之意也蓋木生於水而長於土木氣不達固賴土氣達之土氣不升亦賴木氣升之冬令蟄藏水冰地坼一得春氣鼓盪則閉蟄起而百物生是木能剋土而亦能扶土以乙木之生意即己土之陽左旋而上發者也生意濡弱則土木之氣不能上達而肝脾俱病氣化於戊土而藏於肺血化於己土而藏於肝靈樞決氣脾藏營肝藏血肝脾者營血之原也濡弱則營血虛衰脈法諸濡亡血諸弱發熱血亡則熱發也傷寒脈濡而弱不可汗下以其血虛而陽敗也弦牢者木氣之太過濡弱者木氣之不及太過則侮人不及則人侮均能為病也散伏散伏者陰陽之闔闢也氣闢而不闔則脈散氣闔而不闢則脈伏散者氣泄而不藏也陰性聚而陽性散陽降於尺而化濁陰則脈沉聚陰升於寸而化清陽則脈浮散而聚散之權則在於關關者陰陽之關鎖其散而不至於飛揚者有關以闔之故散而能聚散而不聚則心病矣脈法傷寒咳逆上氣其脈散者死謂其形損故也脈散者病家之大忌散脈一形則氣血之亡脫在近精神之飛走不遠散見於寸猶可挽也散見於尺無可醫矣伏者氣鬱而不發也陽性起而陰性伏陰升於寸而化清陽則脈浮起陽降於尺而化濁陰則脈沉伏而起伏之權則在於關關者陰陽之關鎖其伏而不至於閉結者有關以闢之故伏而能起伏而不起則腎病矣凡積聚癥瘕停痰宿水之疾脈必伏結十八難伏者脈行筋下也浮者脈在肉上行也故脈浮結者外有痼疾脈伏結者內有積聚金匱脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央非但積取如是凡一經將病則一氣先伏肝病者木鬱心病者火鬱腎病者水鬱肺病者金鬱脾病者土鬱鬱則脈伏庚桑子人鬱則為病至理妙言診一氣之欲伏則知一時之將病脈法伏氣之病以意候之此之謂也動代動代者陰陽之起止也氣欲發而不能則為動氣中歇而不屬則為代動者鬱勃而不息也脈法陰陽相搏名曰動陽動則汗出陰動則發熱若數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也關者中氣之變現陰陽之樞機陽自此降而為陰降自此升而為陽陰升於寸則遂其上浮之性不至為動陽降於尺則遂其下沉之性不至為動惟陰欲升脾土虛而不能升陽欲降胃土弱而不能降則二氣鬱於關上而見動形陰陽鬱勃不能升降是以動而不止也鬱勃之久不無勝負陽盛而動於關上則內泄營陰而汗出陰盛而動於關下則外閉衛陽而發熱熱發則汗不出汗出則熱不發汗出而熱發陰陽之勝負乃分方其動時陰陽郁蕩未知將來之孰勝而孰負也動見於土位木氣盤塞而莫達甲木不降乃懸虛而為驚乙木不升乃衝擊而為痛甲乙橫逆而賊戊己則土氣敗矣代者斷續而不聯也靈樞根結一日一夜五十營以營五臟之精不應數者名曰狂生五十動而不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣與之短期與之短期者乍疏乍數也乍疏乍數者斷續之象也蓋呼吸者氣之所以升降也心肺主呼腎肝主吸脾居呼吸之間呼則氣升於心肺吸則氣降於腎肝呼吸定息經脈五動故十息之間五十動內即可以候五臟之氣一臟無氣則脈必代矣十一難脈不滿五十動而一止一臟無氣者何藏也吸者隨陰入呼者因陽出今吸不能至腎至肝而還故知一臟無氣者腎氣先盡也由腎而肝由肝而脾由脾而心由心而肺可類推矣代脈一見死期在近不可治也代為死脈與脾脈代之代不同脾脈代者脾不主時隨四時而更代也此為病脈
