body:
  text: 卷五病不過內外感傷而雜病之傳變百出不窮感傷者百病之綱百病者感傷之目譬如水火源本則合支派攸分雖殊途而同歸實一致而百慮先聖既往此道絶傳博考方書乖訛萬狀縱身若松柏未必後雕況資如蒲柳動輒零謝申之以雜病之侵凌益之以群工之毒藥真輕塵之棲弱草朝露之落薤上矣痛昔親從凋亡手足傷毀荒草頽墳煙籠霧鎖感念存歿情何可言作雜病解雜病解上鼓脹根原鼓脹者中氣之敗也肺主氣腎主水人身中半以上為陽是謂氣分中半以下為陰是謂水分氣盛於上水盛於下陰陽之定位也而氣降則生水水升則化氣陰陽互根氣水循環究其轉運之樞全在中氣中氣一敗則氣不化水而抑鬱於下是謂氣鼓水不化氣而泛濫於上是為水脹靈樞營衛生會上焦如霧中焦如漚下焦如瀆上焦氣盛故如霧露之空瀠下焦水盛故如川瀆之注瀉而氣水變化之原出於中焦中焦者氣水之交氣方升而水方降水欲成氣氣欲成水氣水未分故其形如漚氣之化水由於肺胃水之化氣由於肝脾肺胃右降則陰生故清涼而化水氣不化水者肺胃之不降也肝脾左升則陽生故溫暖而化氣水不化氣者肝脾之不升也氣不化水則左陷於下而為氣鼓水不化氣則右逆於上而為水脹而其根總因土濕而陽敗濕土不運則金木鬱而升降窒故也氣鼓氣從上降而推原其本實自下升坎中之陽氣之根也氣升於肝脾肝脾左旋溫暖而化清陽是氣升於水分也肝脾不升陰分之氣堙鬱而下陷故臍以下腫木性善達其發達而不郁者水溫土燥而陽升也水寒土濕脾陽下陷肝木不達抑遏而克脾土肝脾郁迫而不升運是以凝滯而為脹滿肝氣不達鬱而生熱傳於脾土脾土受之以其濕熱傳於膀胱五行之性病則傳其所勝勢固然也土燥則木達而水清土濕則氣滯不能生水木鬱不能泄水故水道不利加之以熱故淋澀而黃赤脾土既陷胃土必逆脾陷而肝木下郁胃逆則膽火上郁其下熱者肝木之不升也其上熱者膽火之不降也病本則屬濕寒而病標則為濕熱宜瀉濕而行郁補脾陽而達木氣清利膀胱之鬱熱也桂枝薑砂湯茯苓三錢澤瀉三錢桂枝三錢芍藥三錢甘草三錢炙砂仁一錢炒研乾薑三錢煎大半杯入砂仁略煎去渣入西瓜漿一湯匙溫服膀胱濕熱小便紅澀者加梔子清之脾肺濕旺化生郁濁腐敗膠黏不得下行宜用瓜蒂散行其痰飲在下則瀉利而出在上則嘔吐而出去其菀陳然後調之續隨子仁最下痰飲用白者十數粒研碎去油服之痰水即下瓜蒂散瓜蒂二十個研赤小豆三錢研香豉三錢研熱水一杯煮香豉令濃去渣調二末溫服取吐下為度病重人虛者不可服此當用葶藶散水脹水從下升而推原其本實自上降離中之陰水之根也水降於肺胃肺胃右轉清涼而化濁陰是水降於氣分也肺胃不降陽分之水淫泆而上逆故臍以上腫金性喜斂其收斂而不郁者陽明胃土之降也土濕胃逆肺無降路陽分之水不得下行陰分之水反得上泛水入於肺宗氣隔礙則為喘滿水入於經衛氣壅阻則為腫脹水生於肺而統於腎藏於膀胱而泄於肝腎與膀胱之府相為表裡飲入於胃脾陽蒸動化為霧氣而上歸於肺肺金清肅霧氣灑揚充灌於經絡熏澤於皮膚氤氳郁靄化為雨露及乎中焦以下則注集滂沛勢如江漢矣膀胱者水之壑也肺氣化水傳於膀胱肝氣疏泄水竅清通是以腫脹不作膀胱之竅清則開而熱則閉靈樞三焦者入絡膀胱約下焦實則閉癃虛則遺溺其虛而遺溺者相火之下虛也其實而閉癃者非相火之下實也以腎主蟄藏腎氣能藏則相火祕固而膀胱清腎氣不藏則相火泄露而膀胱熱相火蟄藏膀胱清利是謂之實膀胱之熱者相火泄於腎藏而陷於膀胱也相火藏於腎水原不泄露其泄而不藏者過在乙木木性疏泄疏泄之令暢則但能泄水而不至泄火水寒土濕生氣鬱遏疏泄之令不行而愈欲疏泄故相火不得祕藏泄而不通故水道不能清利相火之陷其原在肝肝氣之陷其原在脾肝脾郁陷合相火而生下熱傳於己土己土以其濕熱傳於膀胱是以淋澀而赤黃也膀胱閉癃水不歸壑故逆行於胸腹浸淫於經絡而腫脹作焉水熱穴論其本在腎其標在肺皆積水也故水病下為胕腫大腹上為喘呼不得臥者標本俱病其本之在臟者宜瀉之於膀胱其標之在肺者宜瀉之於汗孔汗溺之行總以燥土疏木為主水病之作雖在肺腎兩臟而土濕木鬱乃其根本也苓桂浮萍湯茯苓三錢澤瀉三錢半夏三錢杏仁三錢甘草二錢浮萍三錢桂枝三錢煎大半杯熱服覆衣取汗中氣虛加人參寒加乾薑肺熱加麥冬貝母苓桂阿膠湯茯苓三錢澤瀉三錢甘草二錢桂枝三錢阿膠三錢煎大半杯熱服小便不清加西瓜漿熱加梔子中虛加人參寒加乾薑乙木遏陷疏泄不行陽敗土濕不能制伏水邪故病腫脹瀉濕燥土疏木行水是定法也後世八味加減之方地黃助脾之濕附子益肝之熱肝脾未至極敗服之可效肝脾病深則不效而反益其害最誤人也氣位於上水位於下氣之在上雖壅滿郁遏而不至於脹惟下陷而不升則病氣鼓水之在下雖停瘀凝結而弗至於腫惟上逆而不降則病水脹腫在身半以上者水脹也脹在身半以下者氣鼓也其一身俱至腫脹者氣病於下而水病於上也氣水交病則氣中亦有積水水中不無滯氣總之氣不離水水不離氣氣滯則水凝水積則氣聚氣病於下者其水道必不利水病於上者其氣道必不通仲景金匱水氣之法腰以上腫當發其汗汗發則氣通而水亦泄腰以下腫當利小便便利則水行而氣亦達矣噎膈根原噎膈者陽衰土濕上下之竅俱閉也脾陽左升則下竅能開胃陰右降則上竅不閉下竅開故舊谷善出上竅開故新谷善納新舊遞嬗出納無阻氣化循環所以無病其上下之開全在中氣中氣虛敗濕土湮塞則肝脾遏陷下竅閉澀而不出肺胃沖逆上竅梗阻而不納是故便結而溺癃飲礙而食格也緣氣之為性實則清空虛則滯寒胃主降濁脾主升清胃降則濁氣下傳上竅清空而無礙是以善納脾升則清氣上行下竅洞達而莫壅是以善出胃逆則肺金不降濁氣鬱塞而不納脾陷則肝木不升清氣澀結而不出以陽衰土濕中氣不運故脾陷而杜其下竅胃逆而窒其上竅升降之樞軸俱廢出納之機針皆息也其糟粕之不出全因脾陷而肝鬱而穀食之不納則不止胃逆而肺壅兼有甲木之邪焉甲木逆行克賊戊土土木搏結肺無下行之路霧氣堙瘀化生痰涎胸膈滯塞故食噎不下肺津化痰不能下潤水穀二竅枯稿失滋而乙木之疏泄莫遂故便溺難澀總緣中氣不治所以升降反作出納無靈也苓桂半夏湯茯苓三錢澤瀉三錢甘草二錢桂枝三錢半夏三錢乾薑三錢生薑三錢芍藥三錢煎大半杯溫服噎病胸膈滯塞霧氣淫蒸而化痰飲上脘不開加以痰涎膠黏故食阻不下法宜重用半夏以降胃氣痰盛者加茯苓橘皮行其瘀濁生薑取汁多用益善痰飲極旺用瓜蒂散吐其宿痰下其停飲胸膈洗蕩腐敗清空則飲食漸下矣胸膈之痞緣肺胃上逆濁氣不降而其中全是少陽甲木之邪蓋胃逆則肺膽俱無降路膽木盤結不得下行經氣鬱迫是以胸脅痛楚當以甘草緩其迫急芍藥瀉其木邪柴胡鱉甲散其結郁若兼風木枯燥則加阿膠當歸滋木清風其痛自瘥其大便燥結糞粒堅硬緣土濕胃逆肺郁痰盛不能化生津液以滋大腸大腸以陽明燥金之府枯稿失滋自應難澀而陰凝氣閉下竅不開重以飲食非多消化不速谷滓有限未能充滿胃腸順行而下蓋以肝木鬱陷關竅堵塞疏泄之令不行是以便難此宜以乾薑砂仁溫中破滯益脾陽而開腸竅以桂枝達木鬱而行疏泄乾澀難下者重用肉蓯蓉以滑腸竅白蜜亦佳木枯血燥不能疏泄加阿膠當歸滋其風木其小便紅澀緣肺郁痰盛不能生水以滲膀胱而土濕木鬱疏泄不行故水道不利此宜苓澤桂枝瀉濕疏木以通前竅甚者用豬苓湯加桂枝豬茯滑澤瀉濕燥土桂枝阿膠疏木清風水道自利噎家痰多溲少全是土濕濕土莫運肝不升達是以溺癃肺不降斂是以痰盛瀉濕以苓澤為主佐以利肺疏肝之品則痰消而溲長矣下竅閉塞濁無泄路痞郁胸膈食自難下下竅續開胸膈濁氣漸有去路上脘自開再以疏利之品去其胸中腐敗食無不下之理而上下之開總以溫中燥土為主土氣溫燥胃不上逆則肺降而噎開脾不下陷則肝升而便利矣庸工以為陰虛燥旺用地黃牛乳滋潤之藥更可誅者至用大黃噎病之人百不一生尚可壽及一年者若服湯藥則數月死矣醫法失傳千古不得解人能悟此理則病去年增不得死矣反胃根原反胃者陽衰土濕下脘不開也飲食容納賴於胃陰之降水穀消磨藉乎脾陽之升中氣健旺則胃降而善納脾升而善磨水穀化消關門洞啓精華之上奉者清空無滯是以痰涎不生渣滓之下達者傳送無阻是以便溺不澀濕盛陽虧中氣虛敗戊土偏衰則能消而不能受己土偏弱則能受而不能消以陽含陰則性降降則化陰而司受盛故胃以陽土而主納陰含陽則氣升升則化陽而司消腐故脾以陰土而主磨陽性開陰性閉戊土善納則胃陽上盛而竅開己土不磨則脾陰下旺而竅閉水穀善納上竅常開所以能食欲食不磨下竅常閉所以善吐蓋土性回運氣化無停新故乘除頃刻莫間飲食不磨勢難久駐下行無路則逆而上湧自然之理也其便結者糟粕之傳送無多也隧竅閉澀而渣滓有限不能遽行蓄積既久而後破溢而下下而又閉閉而又下零星斷續不相聯屬及其遲日延時傳諸魄門則糞粒堅硬形如彈丸緣大腸以燥金之府而肺津化痰不能下潤故燥澀而艱難也仲景金匱於反胃嘔吐垂大半夏之法補中降逆而潤腸燥反胃之聖方也若與茯苓四逆合用其效更神矣薑苓半夏湯人參三錢半夏三錢乾薑三錢茯苓三錢白蜜半杯河水揚之二百四十遍煎大半杯入白蜜溫服反胃與噎膈同理但上脘不閉耳全以溫中燥濕降逆開結為主土燥陽回飲食消化自然不吐穀精下潤渣滓盛滿傳送無阻大便自易濕氣滲泄必由便溺若肝氣不能疏泄加桂枝阿膠疏木清風利水滑腸之法依噎膈諸方無有異也消渴根原消渴者足厥陰之病也厥陰風木與少陽相火相為表裡風木之性專欲疏泄土濕脾陷乙木遏抑疏泄不遂而強欲疏泄則相火失其蟄藏手少陽三焦以相火主令足少陽膽從相火化氣手少陽陷於膀胱故下病淋癃足少陽逆於胸膈故上病消渴緣風火合邪津血耗傷是以燥渴也淋因肝脾之陷消因膽胃之逆脾陷而乙木不升是以病淋胃逆而甲木不降是以病消脾陷胃逆二氣不交則消病於上而淋病於下但是脾陷則淋而不消但是胃逆則消而不淋淋而不消者水藏而木不能泄也消而不淋者木泄而水不能藏也木不能泄則肝氣抑鬱而生熱膀胱熱澀故溲便不通水不能藏則腎陽泄露而生寒腎藏寒滑故水泉不止肝木生於腎水而胎心火火之熱者木之溫氣所化木之溫者水之陽根所發水主蟄藏木主疏泄木虛則遏抑子氣於母家故疏泄不行而病淋澀木旺則盜泄母氣於子家故蟄藏失政而善溲溺素問氣厥論心移熱於肺肺消肺消者飲一溲二死不治此上下俱寒上寒則少飲下寒則多溲飲一溲二是精溺之各半也是以必死金匱男子消渴小便反多飲一斗小便一斗此下寒上熱下寒則善溲上熱則善飲飲一溲一是溺多而精少也則猶可治渴欲飲水小便不利者是消淋之兼病者也腎氣丸地黃二兩八錢山萸一兩四錢山藥一兩四錢丹皮一兩茯苓一兩澤瀉一兩桂枝三錢五分附子三錢五分煉蜜丸梧子大酒下十五丸日再服不知漸加金匱消渴飲一斗小便一斗上傷燥熱下病濕寒燥熱在肝肺之經濕寒在脾腎之藏腎氣丸茯苓澤瀉瀉濕燥土地黃丹桂清風疏木附子溫腎水之寒薯蕷山萸斂腎精之泄消渴之神方也肝主疏泄木愈鬱而愈欲泄泄而不通則小便不利泄而失藏則水泉不止腎氣丸能縮小便之太過亦利小便之不通金匱小便一斗者主之小便不利者亦主之以其瀉濕而燥土清風而疏木也豬苓湯豬苓三錢茯苓三錢澤瀉三錢滑石三錢研阿膠三錢煎大半杯入阿膠消化溫服治上消下淋者上渴而下淋者土濕木鬱而生風燥豬茯滑澤瀉濕燥土阿膠滋木清風解渴通淋之良法也若木鬱不能疏泄宜加桂枝以達木氣若消淋兼作而發熱脈浮者是土濕木鬱而感風邪當以五苓發其汗也桂附苓烏湯茯苓三錢澤瀉三錢桂枝三錢乾薑三錢附子三錢龍骨三錢煅研牡蠣三錢煅研首烏三錢蒸煎大半杯溫服治飲一溲二者素問飲一溲二水寒土濕木氣疏泄宜苓澤瀉濕燥土薑附暖水溫中桂枝首烏達木榮肝龍骨牡蠣斂精攝溺病之初起可以救藥久則不治顛狂根原顛狂者即驚悸之重病也肝為木其氣風其志怒其聲呼心為火其氣熱其志喜其聲言肺為金其氣燥其志悲其聲哭腎為水其氣寒其志恐其聲呻脾為土其氣濕其志憂其聲歌氣之方升而未升則怒已升則為喜氣之方降而未降則悲已降則為恐蓋陷於重淵之下志意幽淪是以恐作方其半陷則淒涼而為悲悲者恐之先機也升於九天之上神氣暢達是以喜生方其半升則拂鬱而為怒怒者喜之未遂也凡人一臟之氣偏盛則一臟之志偏見而一臟之聲偏發顛病者安靜而多悲恐肺腎之氣旺也狂病者躁動而多喜怒肝心之氣旺也肺腎為陰肝心為陽二十難曰重陰者顛重陽者狂正此義也而金水之陰旺則因於陽明之濕寒木火之陽盛則因於太陰之濕熱緣胃土右降金水所從而下行濕則不降金水右泄而生寒金旺則其志悲水旺則其志恐也脾土左升木火所從而上行濕則不升木火左鬱而生熱木旺則其志怒火旺則其志喜也濕寒動則寢食皆廢悲恐俱作面目黃瘦腿膝清涼身靜而神迷便堅而溺澀此皆金水之旺也濕熱動則眠食皆善喜怒兼生面目紅肥臂肘溫暖身動而神慧便調而水利此皆木火之旺也顛緣於陰旺狂緣於陽旺陰陽相判本不同氣而顛者歷時而小狂狂者積日而微顛陽勝則狂生陰復則顛作勝復相乘而顛狂迭見此其陰陽之俱偏者也苓甘薑附龍骨湯半夏三錢甘草二錢乾薑三錢附子三錢茯苓三錢麥冬三錢去心龍骨三錢牡蠣三錢煎大半杯溫服有痰者加蜀漆治顛病悲恐失正者丹皮柴胡犀角湯丹皮三錢柴胡三錢犀角一錢研汁生地三錢芍藥三錢茯苓三錢甘草二錢炙煎大半杯溫服有痰者加蜀漆治狂病喜怒乖常者勞傷中氣土濕木鬱則生驚悸濕旺痰生迷其神智喜怒悲恐緣情而發動而失節乃病顛狂顛狂之家必有停痰痰者顛狂之標濕者真狂之本顛起於驚狂生於悸拔本塞原之法不在痰若宿痰膠固以瓜蒂散上下湧泄令臟腑上下清空然後燥土瀉濕以拔其本痰飲根原痰飲者肺腎之病也而根原於土濕肺腎為痰飲之標脾胃乃痰飲之本蓋肺主藏氣肺氣清降則化水腎主藏水腎水溫升則化氣陽衰土濕則肺氣壅滯不能化水腎水凝瘀不能化氣氣不化水則鬱蒸於上而為痰水不化氣則停積於下而為飲大凡陽虛土敗金水堙菀無不有宿痰留飲之疾清道堵塞肺氣不布由是壅嗽發喘息短胸盛眠食非舊喜怒乖常蓋痰飲伏留腐敗壅阻礙氣血環周之路格精神交濟之關諸病皆起變化無恆隨其本氣所虧而發而總由脾陽之敗緣足太陰脾以濕土主令手太陰肺從濕土化氣濕旺脾虧水穀消遲脾肺之氣鬱而不宣淫生痰涎歲月增加久而一身精氣盡化敗濁微陽絶根則人死矣高年之人平素陽虛一旦昏憒痰鳴垂頭閉目二三日即死此陽氣敗脫痰證之無醫者也其餘百病未至於此悉宜燥土瀉濕絶其淫泆生化之源去其瘀塞停滯之物使之精氣播宣津液流暢乃可扶衰起危長生不老耳薑苓半夏湯茯苓三錢澤瀉三錢甘草二錢半夏三錢橘皮三錢生薑三錢煎大半杯溫服百病之生悉由土濕是以多有痰證而鼓脹噎膈虛勞吐衄嗽喘驚悸之家更甚原因土濕陽虛氣滯津凝法宜燥土瀉濕利氣行郁小半夏加茯苓橘皮是定法也在上之痰半成濕熱在下之飲純屬濕寒上下殊方溫清異制大要以溫燥水土為主上熱者加知母石膏下寒者佐乾薑附子痰之陳宿纏綿膠固難行者加枳實開之飲之停瘀臟腑者上在胸膈用十棗湯瀉其氣分下在臍腹用豬苓湯瀉於水道流溢經絡者用五苓散瀉之汗孔上脘之痰可從吐出中脘之痰可從便下若經絡之飲非使之化氣成津瀉於汗尿別無去路也一切痰飲用瓜蒂散吐下之功效最捷續隨子仁驅逐痰飲亦良物也咳嗽根原咳嗽者肺胃之病也胃土右轉肺金順下霧氣降灑津液流通是以無痰呼吸安靜上下無阻是以不嗽胃土上逆肺無降路霧氣堙塞故痰涎淫生呼吸壅礙則咳嗽發作其多作於秋冬者風寒外閉裡氣愈郁故也而胃之所以不降全緣陽明之陽虛太陰以己土而生濕陽明從庚金而化燥燥敵其濕則胃降而脾升濕奪其燥則脾陷而胃逆以燥為陽而濕為陰陽性運而陰性滯理自然也素問咳論其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳是咳嗽之證因於胃逆而肺寒故仲景治咳必用乾薑細辛其燥熱為嗽者金燥而火炎也手陽明以燥金主令燥氣旺則手太陰化氣於庚金而不化氣於濕土一當胃逆膽升刑以相火則壅嗽生焉然上雖燥熱而下則依舊濕寒也蓋肺胃順降則相火蟄藏而下溫肺胃逆升則相火浮動而上熱上熱則下寒以其火升而不降也緣足太陰之濕盛則辛金從令而化濕是生濕嗽手陽明之燥盛則戊土從令而化燥是生燥咳燥則上熱濕則下寒究之濕為本而燥為標寒為原而熱為委悟先聖咳嗽之義自得之矣薑苓五味細辛湯茯苓三錢甘草二錢乾薑三錢半夏三錢細辛三錢五味一錢研煎大半杯溫服咳證緣土濕胃逆肺金不降氣滯痰生竅隧阻礙呼吸不得順布稍感風寒閉其皮毛肺氣愈郁咳嗽必作其肺家或有上熱而非脾腎濕寒不成此病岐伯之論仲景之法不可易也其甚者則為齁喘可加橘皮杏仁以利肺氣若肺郁生熱加麥冬石膏清其心肺若膽火刑金加芍藥貝母以清膽肺勞嗽吐血加柏葉以斂肺氣若感冒風寒嚏噴流涕頭痛惡寒加生薑蘇葉以解表邪肺癰根原肺癰者濕熱之鬱蒸也陽衰土濕肺胃不降氣滯痰生胸膈瘀寒濕鬱為熱淫泆熏蒸濁瘀臭敗腐而為膿始萌尚可救藥膿成肺敗則死此緣濕旺肺郁風閉皮毛衛氣收斂營郁為熱熱邪內閉蒸其痰涎而化癰膿故也蓋風中於表則腠理疏泄而汗出熱蒸於裡則經陽遏閉而惡寒衛陽外斂呼氣有出而不入營陰內遏吸氣有入而不出營衛不交風熱兼作風邪外傷其皮毛皮毛者肺之合也濕土鬱滿肺氣不降而風襲皮毛泄其衛氣衛氣愈泄而愈斂皮毛始開而終閉肺氣壅塞內外不得泄路痞悶喘促痰嗽彌增口乾咽燥而不作渴少飲湯水則津液沸騰多吐濁沫熱邪內傷其津血津血與痰涎鬱蒸腐化膿穢吐如米粥久而肺臟潰爛是以死也病生肺部而根原於胃逆其胸膈之痛則是膽木之邪以胃土不降肺膽俱無下行之路膽以甲木而化相火甲木克戊土則膈上作疼相火刑辛金則胸中生熱是宜並治其標本也蘇葉橘甘桔湯蘇葉三錢甘草二錢桔梗三錢杏仁三錢茯苓三錢貝母三錢橘皮三錢生薑三錢煎大半杯溫服胃逆胸滿重加半夏肺癰胸膈濕熱鬱蒸痰涎而化癰膿痰盛宜逐膿成當瀉膠痰堵塞以甘遂葶藶之屬驅之膿血腐瘀以丹皮桃仁之類排之劇者用仲景二白散吐下膿穢以求藏真勝於養癰遺害者也二白散桔梗三錢貝母三分巴豆一分去皮炒研如脂為末飲服半錢匕虛者減之膿在膈上則吐在膈下則泄下多飲冷水一杯則止葶藶大棗瀉肺湯葶藶炒黃研彈子大大棗十二枚水三杯煮棗取二杯去棗入葶藶煮取一杯頓服膿未成則痰下膿已成則膿下
