body:
  text: 卷二內外感傷百變不窮溯委窮源不過六氣六氣了徹百病莫逃義至簡而法至精也仲景既沒此義遂晦寒熱錯訛燥濕乖謬零素雪於寒泉飄溫風於陽谷以水益水而愈深以火益火而彌熱生靈夭札念之疚心作六氣解六氣解六氣名目厥陰風木足厥陰肝乙木手厥陰心主相火少陰君火手少陰心丁火足少陰腎癸水少陽相火手少陽三焦相火足少陽膽甲木太陰濕土足太陰脾己土手太陰肺辛金陽明燥金手陽明大腸庚金足陽明胃戊土太陽寒水足太陽膀胱壬水手太陽小腸丙火六氣從化天有六氣地有五行六氣者風熱暑濕燥寒五行者木火土金水在天成象在地成形六氣乃五行之魂五行即六氣之魄人為天地之中氣秉天氣而生六腑秉地氣而生五臟六氣五行皆備於人身內傷者病於人氣之偏外感者因天地之氣偏而人氣感之內外感傷總此六氣其在天者初之氣厥陰風木也在人則肝之經應之二之氣少陰君火也在人則心之經應之三之氣少陽相火也在人則三焦之經應之四之氣太陰濕土也在人則脾之經應之五之氣陽明燥金也在人則大腸之經應之六之氣太陽寒水也在人則膀胱之經應之天人同氣也經有十二六氣統焉足厥陰以風木主令手厥陰火也從母化氣而為風手少陽以相火主令足少陽木也從子化氣而為暑手少陰以君火主令足少陰水也從妻化氣而為熱足太陽以寒水主令手太陽火也從夫化氣而為寒足太陽以濕土主令手太陰金也從母化氣而為濕手陽明以燥金主令足陽明土也從子化氣而為燥蓋癸水上升而化丁火故手少陰以君火司氣而足少陰癸水在從化之例丙火下降而化壬水故足太陽以寒水當權而手太陽丙火在奉令之條木之化火也木氣方盛而火氣初萌母強子弱故手厥陰以相火而化氣於風木火氣既旺而木氣已虛子壯母衰故足少陽以甲木而化氣於相火土之化金也土氣方盛而金氣初萌母強子弱故手太陰以辛金而化氣於濕土金氣方旺而土氣已虛子壯母衰故足陽明以戊土而化氣於燥金母氣用事子弱未能司權則子從母化子氣用事母虛不能當令則母從子化所謂將來者進成功者退自然之理也六氣偏見人之六氣不病則不見凡一經病則一經之氣見平人六氣調和無風無火無濕無燥無熱無寒故一氣不至獨見病則或風或火或濕或燥或寒或熱六氣不相交濟是以一氣獨見如厥陰病則風盛少陰病則熱盛少陽病則暑盛太陰病則濕盛陽明病則燥盛太陽病則寒盛也以此氣之偏盛定緣彼氣之偏虛如厥陰風盛者土金之虛也少陰熱盛少陽暑盛者金水之虛也太陰濕盛者水木之虛也陽明燥盛者木火之虛也太陽寒盛者火土之虛也以六氣之性實則克其所勝而侮所不勝虛則己所不勝者乘之而己所能勝者亦來侮之也究之一氣之偏盛亦緣於虛厥陰能生則陽氣左升而木榮其風盛者生意之不遂也少陰能長則君火顯達而上清其熱盛者長氣之不旺也陽明能收則陰氣右降而金肅其燥盛者收令之失政也太陽能藏則相火閉蟄而下暖其寒盛者臟氣之不行也土為四維之中氣木火之能生長者太陰己土之陽升也金水之能收藏者陽明戊土之陰降也中氣旺則戊己轉運而土和中氣衰則脾胃濕盛而不運土生於火而火滅於水土燥則剋水土濕則水氣泛濫侮土而滅火水泛土濕木氣不達則生意盤塞但能賊土不能生火以培土此土氣所以困敗也血藏於肝而化於脾太陰土燥則肝血枯而膽火炎未嘗不病但足太陰脾以濕土主令足陽明胃從燥金化氣濕為本氣而燥為化氣是以燥氣不敵濕氣之旺陰易盛而陽易衰土燥為病者除陽明傷寒承氣證外不多見一切內外感傷雜病盡緣土濕也本氣衰旺經有十二司化者六經從化者六經從化者不司氣化總以司化者為主故十二經統於六氣病則或見司化者之本氣或見從化者之本氣或司化者而見從化之氣或從化者而見司化之氣全視乎本氣之衰旺焉手少陰以君火司化足少陰之水從令而化熱者常也而足少陰之病寒是從化者自見其本氣以水性原寒手少陰之病寒是司化者而見從化之氣以君火原從水化也足太陽以寒水司化手太陽之火從令而化寒者常也而手太陽之病熱是從化者自見其本氣以火性原熱足太陽之病熱是司化者而見從化之氣以寒水原從火化也足厥陰以風木司化手厥陰之火從令而化風手少陽以相火司化足少陽之木從令而化暑者常也而手厥陰之病暑足少陽之病風是從化者自見其本氣以火性生暑而木性生風也足太陰以濕土司化手太陰之金從令而化濕手陽明以燥金司化足陽明之土從令而化燥者常也而手太陰之病燥足陽明之病濕是從化者自見其本氣以金性本燥而土性本濕也大抵足太陽雖以寒化而最易病熱手少陰雖以熱化而最易病寒厥陰原以風化而風盛者固多少陽雖以火化而火敗者非少金性本燥而手太陰從土化濕者常有七八土性本濕而足陽明從金化燥者未必二三也厥陰風木風者厥陰木氣之所化也在天為風在地為木在人為肝足厥陰以風木主令手厥陰心主以相火而化氣於風木緣木實生火風木方盛子氣初胎而火令未旺也冬水閉藏一得春風鼓動陽從地起生意乃萌然土氣不升固賴木氣以升之而木氣不達實賴土氣以達焉蓋厥陰肝木生於腎水而長於脾土水土溫和則肝木發榮木靜而風恬水寒土濕不能生長木氣則木鬱而風生木以發達為性己土濕陷抑遏乙木發達之氣生意不遂故鬱怒而克脾土風動而生疏泄凡腹痛下利亡汗失血之證皆風木之疏泄也肝藏血而華色主筋而榮爪風動則血耗而色枯爪脆而筋急凡眥黑唇青爪斷筋縮之證皆風木之枯燥也及其傳化乘除千變不窮故風木者五臟之賊百病之長凡病之起無不因於木氣之郁以肝木主生而人之生氣不足者十常八九木氣抑鬱而不生是以病也木為水火之中氣病則土木鬱迫水火不交外燥而內濕下寒而上熱手厥陰火也木氣暢遂則厥陰心主從令而化風木氣抑鬱則厥陰心主自現其本氣是以厥陰之病下之則寒濕俱盛上之則風熱兼作其氣然也少陽相火暑者少陽相火之所化也在天為暑在地為火在人為三焦手少陽以相火主令足少陽膽以甲木而化氣於相火緣火生於木相火既旺母氣傳子而木令已衰也三焦之火隨太陽膀胱之經下行以溫水藏出膕中貫腨腸而入外踝君火升於足而降於手相火升於手而降於足少陽之火降水得此火而後通調故三焦獨主水道素問靈蘭祕典三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣蓋水性閉蟄而火性疏泄閉蟄則善藏疏泄則善出靈樞本輸三焦者入絡膀胱約下焦實則閉癃虛則遺溺相火下蟄水臟溫暖而水腑清利則出不至於遺溺藏不至於閉癃而水道調矣水之所以善藏者三焦之火祕於腎臟也此火一泄陷於膀胱實則下熱而閉癃虛則下寒而遺溺耳手之陽清足之陽濁清則升而濁則降手少陽病則不升足少陽病則不降凡上熱之證皆甲木之不降於三焦無關也相火本自下行其不下行而逆升者由於戊土之不降戊土與辛金同主降斂土降而金斂之相火所以下潛也戊土不降辛金逆行收氣失政故相火上炎足少陽雖從三焦化火而原屬甲木病則兼現其本氣相火逆行則克庚金甲木上侵則賊戊土手足陽明其氣本燥木火雙刑則燥熱鬱發故少陽之病多傳陽明然少陽之氣陰方長而陽方消其火雖盛而亦易衰陰消陽長則壯陰長陽消則病病於相火之衰者十之八九內傷驚悸之證皆相火之衰也病於相火之旺者十之一二而已傷寒少陽有之少陰君火熱者少陰君火之所化也在天為熱在地為火在人為心少陰以君火主令手少陰心火也足少陰腎水也水火異氣而以君火統之緣火位於上而生於下坎中之陽火之根也坎陽升則上交離位而化火火升於水是以癸水化氣於丁火水化而為火則寒從熱化故少陰之氣水火併統而獨以君火名也君火雖降於手而實升於足陽盛則手少陰主令於上而癸水亦成溫泉陰盛則足少陰司氣於下而丁火遂為寒灰以丁火雖司氣化而制勝之權終在癸水所恃者生土以鎮之但土雖剋水而百病之作率由土濕濕則不能剋水而反被水侮土能剋水者惟傷寒陽明承氣一證其餘則寒水侮土者十九不止土潰則火敗故少陰一病必寒水泛濫而火土俱負其勢然也至於上熱者此相火之逆也火中有液癸水之根相火上逆災及宮城心液消亡是以熱作凡少陰病熱乃受纍於相火實非心家之過而方其上熱必有下寒以水火分離而不交也見心家之熱當顧及腎家之寒蓋水火本交彼此相交則為一氣不交則離析分崩逆為冰炭究之火不勝水則上熱不敵下寒之劇不問可知也血根於心而藏於肝氣根於腎而藏於肺心火上熱則清心家之血腎水下寒則暖腎家之氣故補肝之血則宜溫補心之血則宜清補肺之氣則宜涼補腎之氣則宜暖此定法也太陰濕土濕者太陰土氣之所化也在天為濕在地為土在人為脾太陰以濕土主令辛金從土而化濕陽明以燥金主令戊土從金而化燥己土之濕為本氣戊土之燥為子氣故胃家之燥不敵脾家之濕病則土燥者少而土濕者多也太陰主升己土升則癸水與乙木皆升土之所以升者脾陽之發生也陽虛則土濕而不升己土不升則水木陷矣火金在上水木在下火金降於戊土水木升於己土戊土不降則火金上逆己土不升則水木下陷其原總由於濕盛也子華子陰陽交則生濕濕者水火之中氣上濕則化火而為熱下濕則化水而為寒然上亦有濕寒下亦有濕熱濕旺氣鬱津液不行火盛者熏蒸而生熱痰火衰者泛濫而生寒飲此濕寒之在上者濕旺水鬱膀胱不利火衰者流溢而為白淫火盛者梗澀而為赤濁此濕熱之在下者便黃者土色之下傳便赤者木氣之下陷緣相火在水一線陽根溫升而化乙木木中溫氣生火之母升則上達而化火陷則下鬱而生熱木氣不達侵逼土位以其鬱熱傳於己土己土受之於是浸淫於膀胱五行之性病則傳其所勝其勢然也陰易盛而陽易衰故濕氣恆長而燥氣恆消陰盛則病陽絶則死理之至淺未嘗難知後世庸愚補陰助濕瀉火伐陽病家無不夭枉於滋潤此古今之大禍也陽明燥金燥者陽明金氣之所化也在天為燥在地為金在人為大腸陽明以燥金主令胃土從令而化燥太陰以濕土主令肺金從令而化濕胃土之燥子氣而非本氣子氣不敵本氣之旺故陰盛之家胃土恆濕肺金之濕母氣而非本氣母氣不敵本氣之旺故陽盛之家肺金恆燥太陰性濕陽明性燥燥濕調停在乎中氣旺則辛金化氣於濕土而肺不傷燥戊土化氣於燥金而胃不傷濕中氣衰則陰陽不交而燥濕偏見濕勝其燥則飲少而食減溺澀而便滑燥勝其濕則疾飢而善渴水利而便堅陰易進而陽易退濕勝者常多燥勝者常少辛金化濕者十之八九戊土化燥者百不二三陽明雖燥病則太陰每勝而陽明每負土燥而水虧者傷寒陽明承氣證外絶無而僅有是以仲景垂法以少陰負趺陽者為順緣火勝則土燥水勝則土濕燥則剋水濕則反為水侮水負則生土負則死故少陰宜負而趺陽宜勝以土能勝水則中氣不敗未有中氣不敗而人死者燥為寒熱之中氣上燥則化火而為熱下燥則化水而為寒反胃噎膈之家便若羊矢其胃則濕而腸則燥濕為陰邪陰性親下故根起於脾土而標見於膝踝燥為陽邪陽性親上故根起於大腸而標見於肘腕所謂陰邪居下陽邪居上一定之位也然上之燥亦因於下之濕中風之家血枯筋縮其膝踝是濕而肘腕未嘗非燥使己土不濕則木榮血暢骨弱筋柔風自何來醫家識燥濕之消長則仲景堂奧可階而升矣太陽寒水寒者太陽水氣之所化也在天為寒在地為水在人為膀胱太陽以寒水主令足太陽膀胱水也手太陽小腸火也火水異氣而以寒水統之緣水位於下而生於上離中之陰水之根也離陰降而下交坎位而化水水降於火是以丙火化氣於壬水火化而為水則熱從寒化故太陽之氣水火併統而獨以寒水名也水性本寒少陽三焦之火隨太陽而下行水得此火應當不寒不知水之不寒者癸水而非壬水也蓋水以蟄藏為性火祕於內水斂於外是謂平人木火主裡曰內而生長之故里氣常溫金水主表自外而收藏之故表氣常清血生於木火故血溫而內發氣化於金水故氣清而外斂人之經脈厥陰在裡春氣之內生也次則少陰夏氣之內長也次則陽明秋氣之外收也太陽在表冬氣之外藏也陽藏則外清而內溫陽泄則內寒用外熱外易寒水而為熱火內易溫泉而為寒冰外愈熱而內愈寒生氣絶根是以死也癸水溫而壬水寒則治癸水寒而壬水熱則病癸水病則必寒壬水病則多熱以丁火化於癸水故少陰之臟最易病寒壬水化於丙火故太陽之腑最易病熱是以病寒者獨責癸水而不責壬水病熱者獨責壬水而不責癸水也六氣治法仲景傷寒以六經立法從六氣也六氣之性情形狀明白昭揭醫必知此而後知六經之證六經之變化雖多總不外乎六氣此義魏晉而後絶無解者先聖之法一線莫傳凌夷至於今日不堪問矣治厥陰風木法桂枝苓膠湯甘草桂枝白芍茯苓當歸阿膠生薑大棗上熱加黃芩下寒加乾薑附子治少陰君火法黃連丹皮湯黃連白芍生地丹皮少陰病水勝火負最易生寒若有下寒當用椒附治少陽相火法柴胡芍藥湯柴胡黃芩甘草半夏人參生薑大棗白芍治太陰濕土法術甘苓澤湯甘草茯苓白朮澤瀉治陽明燥金法百合五味湯百合石膏麥冬五味治太陽寒水法甘薑附湯甘草茯苓乾薑附子太陽病最易化生濕熱以化氣於丙火而受制於濕土也若有濕熱當用梔膏之類
