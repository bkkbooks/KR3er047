body:
  text: 卷四人不能有生而無死而死多不盡其年外有伐性之斧內有腐腸之藥重以萬念紛馳百感憂勞往往未壯而衰未老而病顧保煉不謹既失之東隅而醫藥無瘥冀挽之桑榆古聖不作醫法中乖貴陰賤陽反經背道輕則飲藥而病加重乃逢醫而人廢金將軍且將玉碎石學士未必瓦全嘆豎子之侵陵痛鬼伯之催促書窮燭滅百慨俱集作勞傷解勞傷解中氣脾為己土以太陰而主升胃為戊土以陽明而主降升降之權則在陰陽之交是謂中氣胃主受盛脾主消化中氣旺則胃降而善納脾升而善磨水穀腐熟精氣滋生所以無病脾升則腎肝亦升故水木不郁胃降則心肺亦降金火不滯火降則水不下寒水升則火不上熱平人下溫而上清者以中氣之善運也中氣衰則升降窒腎水下寒而精病心火上炎而神病肝木左鬱而血病肺金右滯而氣病神病則驚怯而不寧精病則遺泄而不祕血病則凝瘀而不流氣病則痞塞而不宣四維之病悉因於中氣中氣者和濟水火之機升降金木之軸道家謂之黃婆嬰兒奼女之交非媒不得其義精矣醫書不解滋陰瀉火伐削中氣故病不皆死而藥不一生蓋足太陰脾以濕土主令足陽明胃從燥金化氣是以陽明之燥不敵太陰之濕及其病也胃陽衰而脾陰旺十人之中濕居八九而不止也胃主降濁脾主升清濕則中氣不運升降反作清陽下陷濁陰上逆人之衰老病死莫不由此以故醫家之藥首在中氣中氣在二土之交土生於火而火死於水火盛則土燥水盛則土濕瀉水補火扶陽抑陰使中氣輪轉清濁復位卻病延年之法莫妙於此矣黃芽湯人參三錢甘草二錢炙茯苓二錢乾薑二錢煎大半杯溫服中氣之治崇陽補火則宜參薑培土瀉水則宜甘苓其有心火上炎荒悸煩亂則加黃連白芍以清心腎水下寒遺泄滑溏則加附子川椒以溫腎肝血左郁凝澀不行則加桂枝丹皮以舒肝肺氣右滯痞悶不通則加陳皮杏仁以理肺四維之病另有專方此四維之根本也陰陽中氣升降是生陰陽陰陽二氣上下回周陰位於下而下自左升則為清陽陽位於上而上自右降則為濁陰清陽生髮於木火則不至於下陷濁陰收藏於金水則不至於上逆清氣之下陷者陽噓於上也濁氣之不逆者陰吸於下也濁氣不逆則陽降而化陰陽根下潛而不上飛清氣不陷則陰升而化陽陰根上祕而不下走彼此互根上下環抱是曰平人而清氣之左升賴乎陰中之陽生陽生則浮動而親上權在己土濁陰之右降賴乎陽中之陰生陰生則沉靜而親下者性也是以金收而水藏而金水之收藏全賴胃土之降胃土右降金收於西而水藏於北陽氣蟄封此木火生長之根本也胃土不降金水失收藏之政君相二火泄露而升炎心液消耗則上熱而病陰虛人知其金水之虧而不知其胃土之弱胃以陽體而含陰魄旺則氣化而陰生以氣統於肺而實化於胃肺氣清降而産陰精即胃土之右轉而變化者也是宜降肺胃以助收藏未可徒滋心液也地魄湯甘草二錢炙半夏三錢制麥冬三錢去心芍藥三錢五味子一錢研元參三錢牡蠣三錢煆研煎大半杯溫服水為陰而陰生於肺胃胃逆而肺金不斂君相升泄則心液消亡而陰無生化之原麥冬芍藥雙清君相之火半夏五味降攝肺胃之逆元參清金而益水牡蠣斂神而藏精若熱傷肺氣不能化水則用人參黃耆益氣生水以培陰精之原此補陰之法也陰虛陽盛於上而生於下水中之氣是曰陽根陽氣長養爰生木火陽性浮動其根一生則浮動而親上者性也是以木生而火長而木火之生長全賴脾土之升脾土左升木生於東而火長於南純陽之位陰氣萌滋此金水收藏之根本也脾土不升木火失生長之政一陽淪陷腎氣澌亡則下寒而病陽虛人知其木火之衰而不知其脾土之弱脾以陰體而抱陰魂旺則血生而神化以血藏於肝而實生於脾肝血溫升而化陽神即脾土之左旋而變化者也是宜升肝脾以助生長不止徒溫腎氣也天魂湯甘草二錢桂枝三錢茯苓三錢乾薑三錢人參三錢附子三錢煎大半杯溫服火為陽而陽升於肝脾脾陷而肝木不生溫氣頽敗則陽無生化之源脾陷之根因於土濕土濕之由原於水寒甘草茯苓培土而瀉濕乾薑附子暖脾而溫腎人參桂枝達木而扶陽若肝血虛弱不能生火則用歸地首烏以培陽神之原以火清則神發血者神魂之母也夫純陽則仙純陰則鬼陽盛則壯陰盛則病病於陰虛者千百之一病於陽虛者盡人皆是也後世醫術乖訛乃開滋陰之門率以陽虛之人而投補陰之藥禍流今古甚可恨也陰脫陽自右降降於坎府而化濁陰則又含陽氣是謂陽根陽性溫和而升散陰氣左升而不陷者有此坎陽以闢之也其升散之權全在於脾脾氣不升則精血馳走而陰脫二十難曰脫陰者目盲目者陽明所發陽根於坎坎水陰也而中抱陽氣坎陽溫升而生肝木肝藏血而含魂魂即血中溫氣之漸靈者溫化而為熱則魂化而為神陽神發露上開雙竅而為兩目目乃陽神之所出入而遊行也陰脫者陽根澌敗精血失藏魂神不能發露是以目盲凡人之清旦目盲者是其陰氣亡脫定主死期不遠名為脫陰而實以陽根之敗素問所謂目受血而能視者亦是此理後人不解經義眼科書數千百部悉以滋陰涼血瀉火伐陽敗其神明以致眼病之家逢醫則盲醫理玄奧非上智不解乃以俗腐庸妄之徒無知造孽以禍生靈可恨極矣烏肝湯甘草二錢人參三錢茯苓三錢乾薑三錢附子三錢炮首烏三錢蒸芍藥三錢桂枝三錢煎大杯溫服陽脫陰自左升升於離位而化清陽則又含陰精是謂陰根陰性清肅而降斂陽氣右降而不逆者有此離陰以翕之也其降斂之機全在於胃胃氣不降則神氣飛騰而陽脫二十難曰脫陽者見鬼仙為純陽鬼為純陰人居陰陽之半仙鬼之交陽脫則人將為鬼同氣相感是以見之凡人之白晝見鬼者是其陽氣亡脫亦將續登鬼録矣兔髓湯甘草二錢人參三錢五味一錢半夏三錢龍骨二錢煅研元參三錢附子三錢牡蠣三錢煅研煎大半杯溫服陽脫則白日見鬼陰脫則清旦目盲陰陽既脫無方可醫於其將脫之前當見機而預防也精神神胎於魂而發於心而實根於坎陽精孕於魄而藏於腎而實根於離陰陰根上抱是以神發而不飛揚陽根下蟄是以精藏而不馳走陽神發達恃木火之生長而究賴太陰之升陰精閉蟄資金水之收藏而終籍陽明之降太陰陽明所以降金水以吸陽神升木火以噓陰精者也陽明不降則火金浮升而神飄於上太陰不升則水木沉陷而精遺於下蓋陽中有陰則神清而善發陰中有陽則精溫而能藏脾陷則精不交神胃逆則神不交精陽神飛蕩故生驚悸陰精馳走故病遺泄陰升陽降權在中氣中氣衰敗升降失職金水廢其收藏木火鬱其生長此精神所以分離而病作也培養中氣降肺胃以助金水之收藏升肝脾以益木火之生長則精祕而神安矣神驚神發於心而交於腎則神清而不搖神不交精是生驚悸其原由於膽胃之不降乙木上行而生君火甲木下行而化相火升則為君而降則為相雖異體而殊名實一本而同原也相火之降賴乎胃土胃氣右轉陽隨土蟄相火下根是以膽壯而神謐相火即君火之佐相火下祕則君火根深而不飛動是以心定而神安胃土不降相火失根虛浮驚怯神宇不寧緣君相同氣臣敗而君危故魂搖而神蕩也陽神祕藏則甘寢而善記陽泄而不藏故善忘而不寐也胃土之不降由於脾土之濕足陽明化氣於燥金性清降而收斂金收而水藏之故陽蟄於坎府濕則胃土上郁收令不行故火泄而陽飛也火炎於上腎水沉寒陰凝氣結久而彌堅歷年增長狀如懷子是謂奔豚奔豚者腎肝之陰氣聚而不散者也水寒木枯鬱而生風搖撼不已則心下悸動悸見臍下則根本振搖奔豚發矣奔豚上騰侮土陵心發作欲死最為劇證數年之後漸而火敗土崩則人死矣大凡脾腎寒濕無不有驚悸之證驚悸不愈必生奔豚積塊此皆中氣虧損陰盛陽虛之病也庸工不解以為心血不足乃以歸脾補心之方清涼滋潤助陰伐陽百不一生最可傷也少陽相火其性甚烈而驚悸之家則陽敗而火熄非少陽之旺也其相火極旺如小建中炙甘草兩證乃少陽傷寒將傳陽明故以芍藥生地瀉膽胃之燥熱內傷中此證頗少也金鼎湯甘草二錢茯苓三錢半夏三錢桂枝三錢芍藥三錢龍骨二錢牡蠣三錢煎大半杯溫服驚悸之證土濕胃逆相火不藏應用茯苓去濕半夏降胃桂枝達肝芍藥斂膽龍骨牡蠣藏精聚神以蟄陽根陽降根深則魂謐神安驚悸不作矣其上熱者倍芍藥以清膽火下寒者加附子以溫腎水若病重年深奔豚凝結少腹氣塊堅硬澌寒此陰邪已盛緩用附子當燥土去濕調其脾胃後以溫燥之藥熬膏貼之詳具奔豚證中精遺精藏於腎而交於心則精溫而不走精不交神乃病遺泄其原由於肝脾之不升丙火下行而化壬水癸水上行而化丁火壬水主藏陽歸地下者壬水之蟄藏也壬水非寒則不藏陰陽之性熱則發揚而寒則凝閉自然之理壬水蟄藏陽祕於內則癸水溫暖溫氣左升是生乙木升而不已積溫成熱是謂丁火水之生木而化火者以其溫也木火生長陽氣發達陰精和煦故不陷流壬水失藏則陽泄而腎寒水寒不能生木木氣下郁則生疏泄木以疏泄為性愈鬱則愈欲泄以其生意不遂時欲發舒之故也遇夜半陽生木鬱欲動則夢交接木能疏泄而水不蟄藏是以流溢不止也甚有木鬱而生下熱宗筋常舉精液時流庸工以為相火之旺用知母黃柏瀉之是益其癸水之寒而增其乙木之陷也乙木之升權在己土木生於水而實長於土土運則木達以脾陽升布寒去溫回冰泮春生百卉榮華故也蓋戊土西降則化辛金北行則化癸水己土東升則化乙木南行則化丁火金水之收藏實胃陰之右轉木火之生長即脾陽之左旋也土濕陽衰生氣不達是以木陷而不升人知壬水之失藏而不知乙木之不生知乙木之不生而不知己土之弗運乃以清涼固澀之品敗其脾陽而遏其生氣病隨藥增愈難挽矣玉池湯甘草二錢茯苓三錢桂枝三錢芍藥三錢龍骨二錢牡蠣三錢附子三錢砂仁一錢炒研去皮煎大半杯溫服遺精之證腎寒脾濕木鬱風動甘草茯苓培土瀉濕桂枝芍藥疏木清風附子砂仁暖水行郁龍骨牡蠣藏精斂神水土暖燥木氣升達風靜郁消遺泄自止其濕旺木鬱而生下熱倍茯苓白芍加澤瀉丹皮瀉脾濕而清肝熱不可謬用清涼滋潤敗其脾腎之陽蓋腎精遺失泄其陽根久而溫氣亡脫水愈寒而土愈濕火土雙虧中氣必敗未有失精之家陰虛而生燥熱者其木鬱下熱脾陽未虧清其肝火不至為害若脾陽已虧誤用清潤則土敗而人亡矣仲景金匱亡血失精之義後人一絲不解也靈雪丹甘草薄荷甘遂朝腦陽起石紫蘇葉各三錢共研碗盛紙糊口細錐紙上密刺小孔另用碟覆碗上碗邊寬餘半指黑豆麵固濟沙鍋底鋪粗沙加水坐碗沙上出水一寸炭火煮五香水耗常添熱水水冷取出入麝香少許研細蟾酥少許人乳浸化蔥涕官粉煉蜜為丸緑豆大瓷瓶封收津水研半丸掌上塗玉塵頭約一兩時塵頂蘇麻便是藥力透徹祕精不泄甚有良功若遺泄不止勢在危急先煉此藥封之日落研塗一夜不走腎精保固徐用湯丸氣血氣統於肺血藏於肝而總化於中氣胃陽右轉而化氣氣降則精生降化於陽也脾陰左旋而生血血升則神化陽生於陰也精未結而魄先凝故魄舍於肺氣魄者腎精之始基也神未發而魂先見故魂舍於肝血魂者心神之初氣也氣陽也而含陰魄是以清涼而降斂血陰也而吐陽魂是以溫暖而升發及其魂升而神化則又降而為氣魄降而精生則又升而為血蓋精血溫升則蒸騰而化神氣神氣清降則灑陳而化精血精血神氣實一物也悉由於中氣之變化耳火金上熱則神氣飛揚而不守水木下寒則精血泄溢而莫藏故補養神氣則宜清涼而滋益精血則宜溫暖氣秉辛金清涼之性清則調暢熱則鬱蒸暢則沖虛鬱則滯塞滯塞而不降故病上逆血秉乙木溫暖之性溫則流行寒則凝瘀行則鮮明瘀則腐敗腐敗而不升故病下陷氣滯之家胸膈脹滿痰嗽喘逆半緣上中之虛熱血瘀之人紫黑成塊杯碗傾泄多因中下之虛寒下寒則肺氣之降於肝部者亦遂陷泄而不升上熱則肝血之升於肺家者亦遂逆流而不降此氣血致病之原也氣滯肺主藏氣凡臟腑經絡之氣皆肺家之所播宣也氣以清降為性以心火右轉則化肺氣肺氣方化而已胎陰魄故其性清肅而降斂實則順降虛則逆升降則沖虛升則窒塞君相之火下根癸水肺氣斂之也肺氣上逆收令不行君相升泄而刑辛金則生上熱凡痞悶噯喘吐衄痰嗽之證皆緣肺氣不降而肺氣不降之原則生於胃胃土逆升濁氣填塞故肺無下降之路肺胃不降君相升炎火不根水必生下寒氣滯之證其上宜涼其下宜暖涼則金收暖則水藏清肺熱而降胃逆固是定法但不可以寒涼之劑瀉陽根而敗胃氣蓋胃逆之由全因土濕土濕則中氣不運是以陽明不降但用清潤之藥滋中濕而益下寒則肺胃愈逆上熱彌增無有愈期也下氣湯甘草二錢半夏三錢五味一錢茯苓三錢杏仁三錢泡去皮尖貝母二錢去心芍藥二錢橘皮二錢煎大半杯溫服治滯在胸膈右肋者氣積肺藏氣而性收斂氣病則積聚而不散而肝氣之積聚較多於肺肺氣積聚則痞塞於心胸肝氣積聚則滯結於臍腹蓋氣在上焦則宜降而既降於下則又宜升升者肝之所司以肝木主升生氣旺則氣升生氣不足故氣陷而下郁也而肝氣之下郁總由太陰之弱以氣秉金令但能降而不能升降而不至於下陷者恃肝木之善達肝木之善達者脾土之左旋也氣盛於肺胃而虛於肝脾故肺氣可瀉而肝氣不可瀉氣積胸膈右肋宜瀉肺胃以降之氣積臍腹左脅宜補肝脾以升之此化積調氣之法也達郁湯桂枝三錢鱉甲三錢醋炙焦研甘草二錢茯苓三錢乾薑三錢砂仁一錢煎大半杯溫服治積在臍腹左脅者肺胃積氣在胸膈右脅肝脾積氣在臍腹左脅皆中氣虛敗之病也補之則愈悶破之則愈結蓋其本益虛其標益實破之其本更虛補之其標更實是以俱不能效善治者肺胃之積瀉多而補少肝脾之積補多而瀉少半補而半行之補不至於壅閉行不至於削伐正氣漸旺則積聚消磨矣血瘀肝主藏血凡臟腑經絡之血皆肝家之所灌注也血以溫升為性緣腎水左旋則生肝血肝血方生而已抱陽魂故其性溫和而升散實則直升虛則遏陷升則流暢陷則凝瘀蓋血中溫氣化火之本而溫氣之原則根於坎中之陽坎陽虛虧不能生髮乙木溫氣衰損故木陷而血瘀久而失其華鮮是以紅變而紫紫變而黑木主五色凡肌膚枯稿目眥青黑者皆是肝血之瘀而肝血不升之原則在於脾脾土滯陷生氣遏抑故肝無上達之路肝脾不升原因陽衰陰旺多生下寒而溫氣抑鬱火胎淪陷往往變而為熱然熱在於肝而脾腎兩家則全是濕寒不可專用清潤至於溫氣頽敗下熱不作者十之六七未可慨論也血瘀之證其下宜溫而上宜清溫則木生清則火長若木鬱而為熱乃變溫而為清而脾腎之藥則純宜溫燥無有二法以脾陷之由全因土濕土濕之故全因水寒腎寒脾濕則中氣不運是以太陰不升水土濕寒中氣堙郁君相失根半生上熱若誤認陰虛滋濕生寒夭枉人命百不一救也破瘀湯甘草二錢茯苓三錢丹皮三錢桂枝三錢丹參三錢桃仁三錢泡去皮尖乾薑三錢首烏三錢蒸煎大半杯溫服血脫肝藏血而性疏泄血病則脫亡而不守未脫之先溫氣虛虧凝瘀不流瘀少則結積而不下瘀多則注泄而莫藏凡便溺流漓崩漏不禁紫黑成塊腐敗不鮮者皆陽虛而木陷血瘀而弗容也蓋木性善達水土寒濕生氣不達是以血瘀木鬱風動疏泄不斂是以血脫而肺血之脫亡較多於肝肝血下脫則遺泄於便溺肺血上流則吐衄於口鼻以血在下焦則宜升而既升於上則又宜降降者肺之所司緣肺金主收收氣盛則血降收氣不足故血湧而上溢也而肺血之上溢總由陽明之虛以血秉木氣但能升而不能降升而不至於上溢者恃肺金之善斂肺金之收斂者胃土之右轉也血盛於肝脾而虛於肺胃其脫於便溺則由肝脾之寒其説於口鼻或緣肺胃之熱而陽衰土濕中氣頽敗實為脫血之根若專用清涼滋潤助陰伐陽以敗中氣人隨藥殞百不一生此非血病之必死皆粗工之罪也衄血肺竅一鼻肺氣降斂則血不上溢肺氣逆行收斂失政是以為衄其原因於胃土之不降靈樞百病始生卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血衄血者陽絡之傷則營血逆流而衛氣不能斂也肺主衛氣其性收斂血升而不溢者賴衛氣斂之而衛氣之斂由於肺降降則收令行也而肺氣之降機在胃土胃土上壅肺無降路收令失政君相升泄肺金被刑營血不斂故病鼻衄而火炎金傷不皆實熱多有中下濕寒胃逆而火瀉者至於並無上熱而鼻衄時作則全因土敗而胃逆未可清金而瀉火也外感傷寒之衄亦非關火盛緣寒傷營血營鬱而衛閉衛氣壅遏蓄而莫容逆循鼻竅以瀉積鬱衛氣升發故沖營血而為衄證衄則衛郁瀉而表病解原非火旺金刑之故也仙露湯麥冬三錢五味一錢貝母二錢半夏三錢柏葉三錢甘草二錢芍藥三錢杏仁三錢煎大半杯溫服衄血之證火泄金刑氣傷血沸宜清金斂肺以回逆流而必並降胃氣降胃必用半夏近世誤以血證為陰虛半夏性燥不宜血家非通人之論也若上熱非盛而衄證時作則全因中下濕寒當加乾薑茯苓溫燥之藥若大衄之後氣泄陽亡厥逆寒冷宜加參耆薑附以續微陽清潤之藥切不可用吐血血斂於肺而降於胃肺氣能收則鼻不衄胃氣善降則口不吐肺氣莫收經絡之血乃從鼻衄胃氣莫降臟腑之血因自口吐而肺氣之斂亦因胃氣之降吐衄之證總以降胃為主胃氣不降原於土濕土濕之由原於寒水之旺水寒土濕中氣堙郁血不流行故凝瘀而紫黑蓄積莫容勢必外脫土鬱而無下行之路是以上自口出凡嘔吐瘀血紫黑成塊皆土敗陽虛中下濕寒之證瘀血去後寒濕愈增往往食減而不消飲少而不化一旦土崩而陽絶則性命傾殞故大吐瘀血之家多至於死其血色紅鮮者則緣肺熱然始因上熱而究變中寒以血藏於肝而肝木生火心火之熱即血中之溫氣所化血去而血中之溫氣亡泄是以大失血後寒栗而戰搖也而其上熱之時推其中下亦是濕寒蓋君相之火隨戊土下降而歸坎水則上清而下暖胃土不降則君相升泄非戊土之逆而火何以升非己土之濕而胃何以逆非癸水之寒而土何以濕胃逆火泄升炎於上而坎陽絶根其腎水必寒寒水泛濫其脾土必濕理自然也若夫零星咯吐見於痰唾之中者其證稍緩以血去非多則氣泄有限雖亦中下寒濕而一時不至困敗但一遭庸手久服清潤敗其中氣則亦歸死亡耳血證是虛勞大病半死半生十僅救五而唐後醫書皆滋陰瀉火今古雷同百不救一實可哀也靈雨湯甘草二錢人參二錢茯苓三錢半夏三錢乾薑三錢柏葉三錢丹皮三錢煎大半杯溫服治大吐瘀血者吐血之證中下濕寒凝瘀上湧用人參甘草補中培土茯苓乾薑去濕溫寒柏葉清金斂血丹皮疏木行瘀自是不易之法尤當重用半夏以降胃逆血本下行肺胃既逆血無下行之路陳菀腐敗勢必上湧舊血既去新血又瘀逆行上竅遂成熟路再投清潤之藥助其寒濕中氣敗亡速之死矣若溫中燥土令其陽回濕去復以半夏降逆使胃氣下行瘀血既吐鮮血自不再來若下寒甚者蜀椒附子亦當大用其零星咯吐紅鮮不凝雖有上熱亦非實火稍加麥冬貝母略清肺熱總以瀉濕培土為主不可過用苦寒也白茅湯人參二錢甘草二錢茯苓三錢半夏三錢麥冬三錢去心茅根三錢芍藥三錢五味子一錢煎大半杯溫服治零星吐鮮血者血之零吐紅鮮者雖緣土濕胃逆而肺家不無上熱瀉濕降逆之中自宜加清肺之藥若相火極旺則加黃芩而倍芍藥仲景三黃瀉心湯是治相火之極旺者但此等頗少未易輕用若上熱不敵下寒之劇當大溫水土清潤諸法切不可用也便血血生於脾藏於肝肝脾陽旺血溫而升故不下泄水寒土濕脾陷土鬱風動而行疏泄之令則後脫於大便陽氣收斂則土溫而水暖其脾濕而腎寒者庚金之收令不行也後世以為腸風而用清潤脾陽愈敗而愈陷無有止期也其肝脾陽敗紫黑瘀腐當補火燥土以回殘陽暖血溫肝而升郁陷若痔漏脫肛之治亦依此法通之桂枝黃土湯甘草二錢白朮三錢附子三錢阿膠三錢地黃三錢黃芩二錢桂枝二錢灶中黃土三錢煎大半杯溫服便血之證亦因水土寒濕木鬱風動之故仲景黃土湯朮甘附子培土溫寒膠地黃芩清風瀉火相火黃土燥濕扶脾法莫善矣此加桂枝以達木鬱亦甚精密溺血水寒土濕脾陷木鬱風動而行疏泄穀道不收則後泄於大腸水道不斂則前淋於小便陽氣蟄藏則土溫而水暖其脾濕而腎寒者壬水之藏令不行也水性蟄藏木性疏泄水欲藏而不能藏是以流漓而不止木欲泄而不能泄是以梗澀而不利緣木愈鬱則愈欲泄愈欲泄則愈郁郁生下熱小便赤數雖火盛之極而實以脾腎之陽虛瀉濕燥土升木達郁自是主法寒者溫之熱者清之然熱在乙木不在脾土在肝則宜清涼至於脾家但宜溫燥雖肝熱極盛不可瀉其脾土也寧波湯甘草二錢桂枝三錢芍藥三錢阿膠三錢茯苓三錢澤瀉三錢梔子三錢發灰三錢豬脂煎研煎大半杯溫服溺血與便血同理而木鬱較甚故梗澀痛楚苓澤甘草培土瀉濕桂枝芍藥達木清風阿膠發灰滋肝行瘀梔子利水瀉熱膀胱之熱若瘀血紫黑纍塊堅阻加丹皮桃仁之類行之此定法也
